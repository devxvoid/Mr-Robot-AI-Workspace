name: Step 14 Pro UI Revamp

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Fix Broken UI And Pro Revamp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Apply pro UI revamp
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/navigation"
          mkdir -p "$APP_DIR/ui/components"
          mkdir -p "$APP_DIR/ui/theme"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/ui/theme/Theme.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.theme

          import androidx.compose.foundation.isSystemInDarkTheme
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color
          import com.mrrobot.aiworkspace.data.AppThemeMode

          val MrGreen = Color(0xFF00FF88)
          val MrCyan = Color(0xFF00D4FF)
          val MrRed = Color(0xFFFF3366)
          val MrAmber = Color(0xFFFFB800)

          private val DarkScheme = darkColorScheme(
              primary = MrGreen,
              secondary = MrCyan,
              tertiary = MrAmber,
              background = Color(0xFF0A0A0F),
              surface = Color(0xFF111118),
              surfaceVariant = Color(0xFF16161F),
              onPrimary = Color(0xFF06100B),
              onSecondary = Color(0xFF001018),
              onTertiary = Color(0xFF1A1200),
              onBackground = Color(0xFFE8E8F0),
              onSurface = Color(0xFFE8E8F0),
              onSurfaceVariant = Color(0xFFB8B8C8),
              error = MrRed,
              onError = Color.White
          )

          private val LightScheme = lightColorScheme(
              primary = Color(0xFF00A050),
              secondary = Color(0xFF0077AA),
              tertiary = Color(0xFFB26B00),
              background = Color(0xFFF0F2F7),
              surface = Color(0xFFFFFFFF),
              surfaceVariant = Color(0xFFE9EEF7),
              onPrimary = Color.White,
              onSecondary = Color.White,
              onTertiary = Color.White,
              onBackground = Color(0xFF0A0A0F),
              onSurface = Color(0xFF111118),
              onSurfaceVariant = Color(0xFF4B5563),
              error = Color(0xFFD21F4A),
              onError = Color.White
          )

          @Composable
          fun MrRobotTheme(
              themeMode: AppThemeMode = AppThemeMode.Auto,
              content: @Composable () -> Unit
          ) {
              val darkTheme = when (themeMode) {
                  AppThemeMode.Auto -> isSystemInDarkTheme()
                  AppThemeMode.Dark -> true
                  AppThemeMode.Light -> false
              }

              MaterialTheme(
                  colorScheme = if (darkTheme) DarkScheme else LightScheme,
                  content = content
              )
          }
          EOF

          cat > "$APP_DIR/ui/components/UiComponents.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.components

          import androidx.compose.animation.core.*
          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.background
          import androidx.compose.foundation.border
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.getValue
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.alpha
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          val NeonGreen = Color(0xFF00FF88)
          val NeonCyan = Color(0xFF00D4FF)
          val NeonPurple = Color(0xFF8B5CF6)
          val Danger = Color(0xFFFF3366)
          val Amber = Color(0xFFFFB800)

          @Composable
          fun ScreenShell(content: @Composable ColumnScope.() -> Unit) {
              val scheme = MaterialTheme.colorScheme

              Box(
                  modifier = Modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  scheme.background,
                                  scheme.surface,
                                  scheme.surfaceVariant.copy(alpha = 0.92f)
                              )
                          )
                      )
              ) {
                  AmbientGlow()

                  Column(
                      modifier = Modifier
                          .fillMaxSize()
                          .padding(horizontal = 16.dp, vertical = 14.dp),
                      content = content
                  )
              }
          }

          @Composable
          fun AmbientGlow() {
              val infinite = rememberInfiniteTransition(label = "ambient")
              val alpha by infinite.animateFloat(
                  initialValue = 0.08f,
                  targetValue = 0.24f,
                  animationSpec = infiniteRepeatable(
                      animation = tween(2600, easing = FastOutSlowInEasing),
                      repeatMode = RepeatMode.Reverse
                  ),
                  label = "alpha"
              )

              Box(Modifier.fillMaxSize()) {
                  Box(
                      modifier = Modifier
                          .size(240.dp)
                          .offset(x = (-110).dp, y = 40.dp)
                          .alpha(alpha)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(NeonGreen.copy(alpha = .32f), Color.Transparent)
                              )
                          )
                  )

                  Box(
                      modifier = Modifier
                          .size(320.dp)
                          .align(Alignment.BottomEnd)
                          .offset(x = 130.dp, y = 80.dp)
                          .alpha(alpha)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(NeonCyan.copy(alpha = .24f), Color.Transparent)
                              )
                          )
                  )
              }
          }

          @Composable
          fun GlassCard(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              val scheme = MaterialTheme.colorScheme

              Card(
                  modifier = modifier
                      .fillMaxWidth()
                      .border(
                          width = 1.dp,
                          brush = Brush.horizontalGradient(
                              listOf(
                                  scheme.primary.copy(alpha = .42f),
                                  scheme.secondary.copy(alpha = .28f),
                                  NeonPurple.copy(alpha = .20f)
                              )
                          ),
                          shape = RoundedCornerShape(20.dp)
                      ),
                  shape = RoundedCornerShape(20.dp),
                  colors = CardDefaults.cardColors(
                      containerColor = scheme.surface.copy(alpha = .92f)
                  ),
                  elevation = CardDefaults.cardElevation(defaultElevation = 3.dp)
              ) {
                  Column(Modifier.padding(16.dp), content = content)
              }
          }

          @Composable
          fun Title(text: String) {
              Text(
                  text = text,
                  color = MaterialTheme.colorScheme.onSurface,
                  fontSize = 24.sp,
                  lineHeight = 29.sp,
                  fontWeight = FontWeight.Bold
              )
          }

          @Composable
          fun PageTitle(text: String) {
              Text(
                  text = text,
                  color = MaterialTheme.colorScheme.onBackground,
                  fontSize = 30.sp,
                  lineHeight = 35.sp,
                  fontWeight = FontWeight.ExtraBold
              )
          }

          @Composable
          fun Subtitle(text: String) {
              Text(
                  text = text,
                  color = MaterialTheme.colorScheme.onSurfaceVariant,
                  fontSize = 14.sp,
                  lineHeight = 20.sp
              )
          }

          @Composable
          fun CyberButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              Button(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(52.dp),
                  shape = RoundedCornerShape(14.dp),
                  colors = ButtonDefaults.buttonColors(
                      containerColor = MaterialTheme.colorScheme.primary,
                      contentColor = MaterialTheme.colorScheme.onPrimary
                  )
              ) {
                  Text(text, fontWeight = FontWeight.Bold)
              }
          }

          @Composable
          fun OutlineAction(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(50.dp),
                  shape = RoundedCornerShape(14.dp)
              ) {
                  Text(text, fontWeight = FontWeight.SemiBold)
              }
          }

          @Composable
          fun StatusPill(
              text: String,
              color: Color = MaterialTheme.colorScheme.primary
          ) {
              Surface(
                  color = color.copy(alpha = .12f),
                  border = BorderStroke(1.dp, color.copy(alpha = .45f)),
                  shape = RoundedCornerShape(999.dp)
              ) {
                  Text(
                      text = text,
                      color = color,
                      fontSize = 12.sp,
                      fontWeight = FontWeight.Bold,
                      modifier = Modifier.padding(horizontal = 10.dp, vertical = 6.dp)
                  )
              }
          }

          @Composable
          fun PremiumMetric(
              label: String,
              value: String,
              description: String,
              modifier: Modifier = Modifier
          ) {
              GlassCard(modifier = modifier) {
                  Text(
                      text = value,
                      color = MaterialTheme.colorScheme.primary,
                      fontSize = 20.sp,
                      fontWeight = FontWeight.ExtraBold,
                      maxLines = 1
                  )
                  Spacer(Modifier.height(4.dp))
                  Text(
                      text = label,
                      color = MaterialTheme.colorScheme.onSurface,
                      fontWeight = FontWeight.Bold,
                      fontSize = 14.sp,
                      maxLines = 1
                  )
                  Spacer(Modifier.height(4.dp))
                  Text(
                      text = description,
                      color = MaterialTheme.colorScheme.onSurfaceVariant,
                      fontSize = 12.sp,
                      lineHeight = 16.sp,
                      maxLines = 2
                  )
              }
          }
          EOF

          cat > "$APP_DIR/navigation/AppNavGraph.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          import androidx.compose.foundation.layout.height
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.currentBackStackEntryAsState
          import androidx.navigation.compose.rememberNavController
          import com.mrrobot.aiworkspace.ui.screens.*

          sealed class Route(val path: String, val label: String, val icon: String) {
              object Welcome : Route("welcome", "Home", "⌂")
              object Chat : Route("chat", "AI", "AI")
              object Agents : Route("agents", "Agents", "◆")
              object Workflow : Route("workflow", "Flow", "↯")
              object More : Route("more", "More", "☰")
              object Terminal : Route("terminal", "Terminal", ">_")
              object Files : Route("files", "Files", "▣")
              object Market : Route("market", "Market", "✦")
              object Settings : Route("settings", "Settings", "⚙")
              object Profile : Route("profile", "Profile", "◎")
          }

          @Composable
          fun AppNavGraph() {
              val nav = rememberNavController()

              val bottomItems = listOf(
                  Route.Welcome,
                  Route.Chat,
                  Route.Agents,
                  Route.Workflow,
                  Route.More
              )

              Scaffold(
                  containerColor = Color.Transparent,
                  bottomBar = {
                      NavigationBar(
                          modifier = Modifier.height(76.dp),
                          containerColor = MaterialTheme.colorScheme.surface.copy(alpha = 0.98f),
                          tonalElevation = 0.dp
                      ) {
                          val current = nav.currentBackStackEntryAsState().value?.destination?.route

                          bottomItems.forEach { route ->
                              NavigationBarItem(
                                  selected = current == route.path,
                                  onClick = {
                                      nav.navigate(route.path) {
                                          launchSingleTop = true
                                          restoreState = true
                                      }
                                  },
                                  icon = {
                                      Text(
                                          text = route.icon,
                                          fontWeight = FontWeight.Bold
                                      )
                                  },
                                  label = {
                                      Text(
                                          text = route.label,
                                          maxLines = 1
                                      )
                                  },
                                  colors = NavigationBarItemDefaults.colors(
                                      selectedIconColor = MaterialTheme.colorScheme.primary,
                                      selectedTextColor = MaterialTheme.colorScheme.primary,
                                      indicatorColor = MaterialTheme.colorScheme.primary.copy(alpha = .16f),
                                      unselectedIconColor = MaterialTheme.colorScheme.onSurfaceVariant,
                                      unselectedTextColor = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              )
                          }
                      }
                  }
              ) { padding ->
                  NavHost(
                      navController = nav,
                      startDestination = Route.Welcome.path,
                      modifier = Modifier
                          .then(Modifier)
                          .padding(padding)
                  ) {
                      composable(Route.Welcome.path) { WelcomeScreen(nav) }
                      composable(Route.Chat.path) { ChatScreen() }
                      composable(Route.Agents.path) { AgentsScreen() }
                      composable(Route.Workflow.path) { WorkflowScreen() }
                      composable(Route.More.path) { MoreScreen(nav) }
                      composable(Route.Terminal.path) { TerminalScreen() }
                      composable(Route.Files.path) { FileManagerScreen() }
                      composable(Route.Market.path) { MarketplaceScreen() }
                      composable(Route.Settings.path) { SettingsScreen() }
                      composable(Route.Profile.path) { ProfileScreen() }
                  }
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/MoreScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.navigation.NavController
          import com.mrrobot.aiworkspace.navigation.Route
          import com.mrrobot.aiworkspace.ui.components.*

          @Composable
          fun MoreScreen(nav: NavController) {
              ScreenShell {
                  LazyColumn(
                      modifier = Modifier.fillMaxSize(),
                      contentPadding = PaddingValues(bottom = 20.dp)
                  ) {
                      item {
                          PageTitle("Command Modules")
                          Subtitle("Access terminal, files, marketplace, settings, and profile without breaking the bottom navigation.")
                          Spacer(Modifier.height(16.dp))

                          MoreItem(">_", "Live Terminal", "Safe command simulation and logs") {
                              nav.navigate(Route.Terminal.path)
                          }

                          MoreItem("▣", "File Manager", "Browse project files and design assets") {
                              nav.navigate(Route.Files.path)
                          }

                          MoreItem("✦", "Marketplace", "Models, tools, agents, integrations") {
                              nav.navigate(Route.Market.path)
                          }

                          MoreItem("⚙", "Settings", "OpenRouter, model, Auto/Dark/Light theme") {
                              nav.navigate(Route.Settings.path)
                          }

                          MoreItem("◎", "Profile", "Workspace identity and status") {
                              nav.navigate(Route.Profile.path)
                          }
                      }
                  }
              }
          }

          @Composable
          private fun MoreItem(
              icon: String,
              title: String,
              subtitle: String,
              onClick: () -> Unit
          ) {
              GlassCard(
                  modifier = Modifier
                      .padding(bottom = 12.dp)
                      .clickable { onClick() }
              ) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              text = "$icon  $title",
                              color = MaterialTheme.colorScheme.onSurface,
                              fontWeight = FontWeight.Bold
                          )
                          Spacer(Modifier.height(6.dp))
                          Subtitle(subtitle)
                      }
                      Text("→", color = MaterialTheme.colorScheme.primary)
                  }
              }
          }
          EOF


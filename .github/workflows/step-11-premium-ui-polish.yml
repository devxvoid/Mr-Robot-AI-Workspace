name: Step 11 Premium UI Polish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Premium UI Polish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Add premium UI polish and navigation upgrade
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/ui/components"
          mkdir -p "$APP_DIR/ui/theme"
          mkdir -p "$APP_DIR/navigation"

          cat > "$APP_DIR/ui/theme/Theme.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.theme

          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color

          val CyberBlack = Color(0xFF030712)
          val CyberSurface = Color(0xFF0B1020)
          val CyberPanel = Color(0xFF111827)
          val CyberCyan = Color(0xFF00E5FF)
          val CyberPurple = Color(0xFF8B5CF6)
          val CyberGreen = Color(0xFF22C55E)
          val CyberText = Color(0xFFE5E7EB)
          val CyberMuted = Color(0xFF9CA3AF)

          private val DarkScheme = darkColorScheme(
              primary = CyberCyan,
              secondary = CyberPurple,
              tertiary = CyberGreen,
              background = CyberBlack,
              surface = CyberSurface,
              surfaceVariant = CyberPanel,
              onPrimary = Color.Black,
              onSecondary = Color.White,
              onTertiary = Color.Black,
              onBackground = CyberText,
              onSurface = CyberText,
              onSurfaceVariant = CyberMuted
          )

          @Composable
          fun MrRobotTheme(content: @Composable () -> Unit) {
              MaterialTheme(
                  colorScheme = DarkScheme,
                  content = content
              )
          }
          EOF

          cat > "$APP_DIR/ui/components/UiComponents.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.components

          import androidx.compose.animation.core.*
          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.background
          import androidx.compose.foundation.border
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.getValue
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.alpha
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          val NeonCyan = Color(0xFF00E5FF)
          val NeonPurple = Color(0xFF8B5CF6)
          val NeonGreen = Color(0xFF22C55E)
          val DeepBg = Color(0xFF030712)
          val Panel = Color(0xFF111827)
          val PanelSoft = Color(0xFF0B1020)
          val SoftText = Color(0xFFB8C0CC)
          val Danger = Color(0xFFFF6B6B)

          @Composable
          fun ScreenShell(content: @Composable ColumnScope.() -> Unit) {
              Box(
                  modifier = Modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              colors = listOf(
                                  Color(0xFF030712),
                                  Color(0xFF07111F),
                                  Color(0xFF111827)
                              )
                          )
                      )
              ) {
                  AmbientGlow()

                  Column(
                      modifier = Modifier
                          .fillMaxSize()
                          .padding(horizontal = 18.dp, vertical = 16.dp),
                      content = content
                  )
              }
          }

          @Composable
          fun AmbientGlow() {
              val infinite = rememberInfiniteTransition(label = "ambient_glow")
              val alpha by infinite.animateFloat(
                  initialValue = 0.22f,
                  targetValue = 0.55f,
                  animationSpec = infiniteRepeatable(
                      animation = tween(2200, easing = FastOutSlowInEasing),
                      repeatMode = RepeatMode.Reverse
                  ),
                  label = "ambient_alpha"
              )

              Box(modifier = Modifier.fillMaxSize()) {
                  Box(
                      modifier = Modifier
                          .size(260.dp)
                          .offset(x = (-80).dp, y = 20.dp)
                          .alpha(alpha)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(
                                      NeonCyan.copy(alpha = 0.28f),
                                      Color.Transparent
                                  )
                              )
                          )
                  )

                  Box(
                      modifier = Modifier
                          .size(300.dp)
                          .align(Alignment.BottomEnd)
                          .offset(x = 120.dp, y = 60.dp)
                          .alpha(alpha)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(
                                      NeonPurple.copy(alpha = 0.25f),
                                      Color.Transparent
                                  )
                              )
                          )
                  )
              }
          }

          @Composable
          fun GlassCard(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              Card(
                  modifier = modifier
                      .fillMaxWidth()
                      .border(
                          width = 1.dp,
                          brush = Brush.horizontalGradient(
                              listOf(
                                  NeonCyan.copy(.45f),
                                  NeonPurple.copy(.38f),
                                  NeonGreen.copy(.25f)
                              )
                          ),
                          shape = RoundedCornerShape(26.dp)
                      ),
                  shape = RoundedCornerShape(26.dp),
                  colors = CardDefaults.cardColors(
                      containerColor = Panel.copy(alpha = .88f)
                  ),
                  elevation = CardDefaults.cardElevation(defaultElevation = 8.dp),
                  content = {
                      Column(
                          modifier = Modifier.padding(18.dp),
                          content = content
                      )
                  }
              )
          }

          @Composable
          fun PremiumHeader(
              title: String,
              subtitle: String,
              badge: String? = null
          ) {
              Column(modifier = Modifier.fillMaxWidth()) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.Top
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              text = title,
                              color = Color.White,
                              fontSize = 30.sp,
                              fontWeight = FontWeight.ExtraBold,
                              lineHeight = 34.sp
                          )

                          Spacer(Modifier.height(6.dp))

                          Text(
                              text = subtitle,
                              color = SoftText,
                              fontSize = 14.sp,
                              lineHeight = 20.sp
                          )
                      }

                      if (badge != null) {
                          Surface(
                              color = NeonCyan.copy(alpha = 0.14f),
                              border = BorderStroke(1.dp, NeonCyan.copy(alpha = 0.45f)),
                              shape = RoundedCornerShape(999.dp)
                          ) {
                              Text(
                                  text = badge,
                                  color = NeonCyan,
                                  fontSize = 12.sp,
                                  fontWeight = FontWeight.Bold,
                                  modifier = Modifier.padding(horizontal = 12.dp, vertical = 7.dp)
                              )
                          }
                      }
                  }
              }
          }

          @Composable
          fun Title(text: String) {
              Text(
                  text = text,
                  color = Color.White,
                  fontSize = 24.sp,
                  fontWeight = FontWeight.Bold,
                  lineHeight = 28.sp
              )
          }

          @Composable
          fun Subtitle(text: String) {
              Text(
                  text = text,
                  color = SoftText,
                  fontSize = 14.sp,
                  lineHeight = 20.sp
              )
          }

          @Composable
          fun CyberButton(text: String, onClick: () -> Unit) {
              Button(
                  onClick = onClick,
                  colors = ButtonDefaults.buttonColors(
                      containerColor = NeonCyan,
                      contentColor = Color.Black
                  ),
                  shape = RoundedCornerShape(18.dp),
                  modifier = Modifier.fillMaxWidth()
              ) {
                  Text(text, fontWeight = FontWeight.Bold)
              }
          }

          @Composable
          fun PremiumMetric(
              label: String,
              value: String,
              description: String
          ) {
              GlassCard {
                  Text(
                      text = value,
                      color = NeonCyan,
                      fontSize = 28.sp,
                      fontWeight = FontWeight.ExtraBold
                  )
                  Spacer(Modifier.height(4.dp))
                  Text(
                      text = label,
                      color = Color.White,
                      fontWeight = FontWeight.Bold
                  )
                  Spacer(Modifier.height(4.dp))
                  Subtitle(description)
              }
          }

          @Composable
          fun StatusPill(
              text: String,
              color: Color = NeonCyan
          ) {
              Surface(
                  color = color.copy(alpha = 0.12f),
                  border = BorderStroke(1.dp, color.copy(alpha = 0.45f)),
                  shape = RoundedCornerShape(999.dp)
              ) {
                  Text(
                      text = text,
                      color = color,
                      fontSize = 12.sp,
                      fontWeight = FontWeight.Bold,
                      modifier = Modifier.padding(horizontal = 10.dp, vertical = 6.dp)
                  )
              }
          }
          EOF

          cat > "$APP_DIR/navigation/AppNavGraph.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.currentBackStackEntryAsState
          import androidx.navigation.compose.rememberNavController
          import com.mrrobot.aiworkspace.ui.components.NeonCyan
          import com.mrrobot.aiworkspace.ui.components.NeonPurple
          import com.mrrobot.aiworkspace.ui.screens.*

          sealed class Route(val path: String, val label: String, val icon: String) {
              object Welcome : Route("welcome", "Home", "⌂")
              object Chat : Route("chat", "Chat", "AI")
              object Agents : Route("agents", "Agents", "◆")
              object Workflow : Route("workflow", "Flow", "↯")
              object Terminal : Route("terminal", "Term", ">_")
              object Files : Route("files", "Files", "▣")
              object Market : Route("market", "Market", "✦")
              object Settings : Route("settings", "Settings", "⚙")
              object Profile : Route("profile", "Profile", "◎")
          }

          @Composable
          fun AppNavGraph() {
              val nav = rememberNavController()

              val primaryItems = listOf(
                  Route.Welcome,
                  Route.Chat,
                  Route.Agents,
                  Route.Workflow,
                  Route.Terminal
              )

              val secondaryItems = listOf(
                  Route.Files,
                  Route.Market,
                  Route.Settings,
                  Route.Profile
              )

              Scaffold(
                  containerColor = Color.Transparent,
                  bottomBar = {
                      Column(
                          modifier = Modifier
                              .fillMaxWidth()
                              .background(
                                  Brush.verticalGradient(
                                      listOf(
                                          Color.Transparent,
                                          Color(0xFF030712).copy(alpha = 0.96f)
                                      )
                                  )
                              )
                              .padding(horizontal = 10.dp, vertical = 8.dp)
                      ) {
                          val current = nav.currentBackStackEntryAsState().value?.destination?.route

                          NavigationBar(
                              containerColor = Color(0xFF0B1020).copy(alpha = 0.96f),
                              tonalElevation = 0.dp,
                              modifier = Modifier
                                  .fillMaxWidth()
                                  .height(76.dp)
                          ) {
                              primaryItems.forEach { route ->
                                  PremiumNavItem(
                                      selected = current == route.path,
                                      route = route,
                                      onClick = {
                                          nav.navigate(route.path) {
                                              launchSingleTop = true
                                              restoreState = true
                                          }
                                      }
                                  )
                              }
                          }

                          Spacer(Modifier.height(6.dp))

                          NavigationBar(
                              containerColor = Color(0xFF111827).copy(alpha = 0.86f),
                              tonalElevation = 0.dp,
                              modifier = Modifier
                                  .fillMaxWidth()
                                  .height(58.dp)
                          ) {
                              secondaryItems.forEach { route ->
                                  PremiumNavItem(
                                      selected = current == route.path,
                                      route = route,
                                      compact = true,
                                      onClick = {
                                          nav.navigate(route.path) {
                                              launchSingleTop = true
                                              restoreState = true
                                          }
                                      }
                                  )
                              }
                          }
                      }
                  }
              ) { padding ->
                  NavHost(
                      navController = nav,
                      startDestination = Route.Welcome.path,
                      modifier = Modifier.padding(padding)
                  ) {
                      composable(Route.Welcome.path) { WelcomeScreen(nav) }
                      composable(Route.Chat.path) { ChatScreen() }
                      composable(Route.Agents.path) { AgentsScreen() }
                      composable(Route.Workflow.path) { WorkflowScreen() }
                      composable(Route.Terminal.path) { TerminalScreen() }
                      composable(Route.Files.path) { FileManagerScreen() }
                      composable(Route.Market.path) { MarketplaceScreen() }
                      composable(Route.Settings.path) { SettingsScreen() }
                      composable(Route.Profile.path) { ProfileScreen() }
                  }
              }
          }

          @Composable
          private fun RowScope.PremiumNavItem(
              selected: Boolean,
              route: Route,
              compact: Boolean = false,
              onClick: () -> Unit
          ) {
              NavigationBarItem(
                  selected = selected,
                  onClick = onClick,
                  icon = {
                      Surface(
                          color = if (selected) NeonCyan.copy(alpha = 0.16f) else Color.Transparent,
                          shape = RoundedCornerShape(12.dp)
                      ) {
                          Text(
                              text = route.icon,
                              color = if (selected) NeonCyan else Color(0xFF9CA3AF),
                              fontWeight = FontWeight.Bold,
                              modifier = Modifier.padding(horizontal = 8.dp, vertical = 4.dp)
                          )
                      }
                  },
                  label = {
                      Text(
                          text = route.label,
                          color = if (selected) NeonCyan else Color(0xFF9CA3AF),
                          fontWeight = if (selected) FontWeight.Bold else FontWeight.Normal
                      )
                  },
                  colors = NavigationBarItemDefaults.colors(
                      selectedIconColor = NeonCyan,
                      selectedTextColor = NeonCyan,
                      indicatorColor = NeonPurple.copy(alpha = 0.12f),
                      unselectedIconColor = Color(0xFF9CA3AF),
                      unselectedTextColor = Color(0xFF

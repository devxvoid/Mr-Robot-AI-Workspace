name: Step 43 Fix Provider Active State And AI Routing

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Fix AI Provider Manager And Runtime Routing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Replace provider settings and provider-aware chat runtime
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"
          DATA_DIR="$APP_DIR/data"
          VM_DIR="$APP_DIR/viewmodel"

          mkdir -p "$DATA_DIR"
          mkdir -p "$VM_DIR"
          mkdir -p "docs/settings"

          cat > "$DATA_DIR/AiModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          enum class ApiProvider(
              val displayName: String,
              val shortName: String,
              val keyLabel: String,
              val keyPlaceholder: String,
              val helpText: String
          ) {
              OpenRouter("OpenRouter", "OR", "OpenRouter API Key", "sk-or-v1-...", "One key for many hosted models."),
              OpenAI("OpenAI", "OpenAI", "OpenAI API Key", "sk-...", "Official OpenAI models."),
              Anthropic("Anthropic", "Claude", "Anthropic API Key", "sk-ant-...", "Claude models from Anthropic."),
              Gemini("Google Gemini", "Gemini", "Gemini API Key", "AIza...", "Google Gemini models."),
              Groq("Groq", "Groq", "Groq API Key", "gsk_...", "Fast OpenAI-compatible inference."),
              Mistral("Mistral", "Mistral", "Mistral API Key", "Enter Mistral API key", "Mistral and Codestral models."),
              DeepSeek("DeepSeek", "DeepSeek", "DeepSeek API Key", "sk-...", "DeepSeek chat and reasoning models."),
              XAI("xAI", "Grok", "xAI API Key", "xai-...", "Grok models from xAI.")
          }

          data class AiModel(
              val id: String,
              val name: String,
              val provider: String,
              val description: String,
              val apiProvider: ApiProvider
          )

          data class ProviderModelConfig(
              val provider: ApiProvider,
              val modelId: String,
              val apiKey: String
          ) {
              val hasKey: Boolean
                  get() = apiKey.isNotBlank()
          }

          object AiModels {
              val supported = listOf(
                  AiModel("openai/gpt-4o-mini", "GPT-4o Mini", "OpenRouter", "Fast general model through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("anthropic/claude-3.5-sonnet", "Claude 3.5 Sonnet", "OpenRouter", "Claude through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("google/gemini-2.0-flash-001", "Gemini Flash", "OpenRouter", "Gemini through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("meta-llama/llama-3.1-70b-instruct", "Llama 3.1 70B", "OpenRouter", "Llama through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("deepseek/deepseek-chat", "DeepSeek Chat", "OpenRouter", "DeepSeek through OpenRouter.", ApiProvider.OpenRouter),

                  AiModel("gpt-4o-mini", "GPT-4o Mini", "OpenAI", "Fast OpenAI model.", ApiProvider.OpenAI),
                  AiModel("gpt-4o", "GPT-4o", "OpenAI", "Flagship OpenAI model.", ApiProvider.OpenAI),
                  AiModel("o3-mini", "o3 Mini", "OpenAI", "Reasoning-focused OpenAI model.", ApiProvider.OpenAI),

                  AiModel("claude-3-5-sonnet-latest", "Claude 3.5 Sonnet", "Anthropic", "Strong Claude model for coding and analysis.", ApiProvider.Anthropic),
                  AiModel("claude-3-5-haiku-latest", "Claude 3.5 Haiku", "Anthropic", "Fast Claude model.", ApiProvider.Anthropic),

                  AiModel("gemini-1.5-flash", "Gemini 1.5 Flash", "Google", "Fast Gemini model.", ApiProvider.Gemini),
                  AiModel("gemini-1.5-pro", "Gemini 1.5 Pro", "Google", "Advanced Gemini model.", ApiProvider.Gemini),
                  AiModel("gemini-2.0-flash", "Gemini 2.0 Flash", "Google", "Newer fast Gemini model.", ApiProvider.Gemini),

                  AiModel("llama-3.3-70b-versatile", "Llama 3.3 70B", "Groq", "Fast Llama model on Groq.", ApiProvider.Groq),
                  AiModel("mixtral-8x7b-32768", "Mixtral 8x7B", "Groq", "Fast Mixtral model on Groq.", ApiProvider.Groq),

                  AiModel("mistral-large-latest", "Mistral Large", "Mistral", "Advanced Mistral model.", ApiProvider.Mistral),
                  AiModel("codestral-latest", "Codestral", "Mistral", "Coding model from Mistral.", ApiProvider.Mistral),

                  AiModel("deepseek-chat", "DeepSeek Chat", "DeepSeek", "DeepSeek general chat model.", ApiProvider.DeepSeek),
                  AiModel("deepseek-reasoner", "DeepSeek Reasoner", "DeepSeek", "DeepSeek reasoning model.", ApiProvider.DeepSeek),

                  AiModel("grok-2-latest", "Grok 2", "xAI", "xAI Grok model.", ApiProvider.XAI),
                  AiModel("grok-beta", "Grok Beta", "xAI", "Beta Grok model.", ApiProvider.XAI)
              )

              fun byProvider(provider: ApiProvider): List<AiModel> {
                  return supported.filter { it.apiProvider == provider }
              }

              fun defaultForProvider(provider: ApiProvider): AiModel {
                  return byProvider(provider).firstOrNull() ?: supported.first()
              }

              fun byIdOrNull(id: String): AiModel? {
                  return supported.firstOrNull { it.id == id }
              }

              fun findById(id: String): AiModel {
                  return byIdOrNull(id) ?: supported.first()
              }
          }
          EOF

          cat > "$DATA_DIR/ProviderChatClient.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import org.json.JSONArray
          import org.json.JSONObject
          import java.io.BufferedReader
          import java.io.InputStreamReader
          import java.io.OutputStreamWriter
          import java.net.HttpURLConnection
          import java.net.URL
          import java.net.URLEncoder

          object ProviderChatClient {

              suspend fun generateReply(
                  settings: AppSettings,
                  userMessage: String
              ): String = withContext(Dispatchers.IO) {
                  val apiKey = settings.activeApiKey()
                  val provider = settings.selectedProvider
                  val model = settings.activeModel()

                  if (apiKey.isBlank()) {
                      throw IllegalStateException("No active API key. Add and activate a provider in Settings.")
                  }

                  when (provider) {
                      ApiProvider.OpenRouter -> openAiCompatible(
                          url = "https://openrouter.ai/api/v1/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage,
                          extraHeaders = mapOf(
                              "HTTP-Referer" to "https://github.com/devxvoid/Mr-Robot-AI-Workspace",
                              "X-Title" to "Mr. Robot AI Workspace"
                          )
                      )

                      ApiProvider.OpenAI -> openAiCompatible(
                          url = "https://api.openai.com/v1/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.Groq -> openAiCompatible(
                          url = "https://api.groq.com/openai/v1/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.Mistral -> openAiCompatible(
                          url = "https://api.mistral.ai/v1/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.DeepSeek -> openAiCompatible(
                          url = "https://api.deepseek.com/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.XAI -> openAiCompatible(
                          url = "https://api.x.ai/v1/chat/completions",
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.Anthropic -> anthropic(
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )

                      ApiProvider.Gemini -> gemini(
                          apiKey = apiKey,
                          model = model,
                          message = userMessage
                      )
                  }
              }

              private fun openAiCompatible(
                  url: String,
                  apiKey: String,
                  model: String,
                  message: String,
                  extraHeaders: Map<String, String> = emptyMap()
              ): String {
                  val payload = JSONObject()
                      .put("model", model)
                      .put(
                          "messages",
                          JSONArray()
                              .put(JSONObject().put("role", "system").put("content", "You are ALPHA inside Mr. Robot AI Workspace. Be precise, practical, and helpful."))
                              .put(JSONObject().put("role", "user").put("content", message))
                      )
                      .put("temperature", 0.7)

                  val response = postJson(
                      url = url,
                      body = payload,
                      headers = mapOf(
                          "Authorization" to "Bearer $apiKey",
                          "Content-Type" to "application/json"
                      ) + extraHeaders
                  )

                  return JSONObject(response)
                      .getJSONArray("choices")
                      .getJSONObject(0)
                      .getJSONObject("message")
                      .getString("content")
                      .trim()
              }

              private fun anthropic(
                  apiKey: String,
                  model: String,
                  message: String
              ): String {
                  val payload = JSONObject()
                      .put("model", model)
                      .put("max_tokens", 1024)
                      .put(
                          "messages",
                          JSONArray()
                              .put(JSONObject().put("role", "user").put("content", message))
                      )

                  val response = postJson(
                      url = "https://api.anthropic.com/v1/messages",
                      body = payload,
                      headers = mapOf(
                          "x-api-key" to apiKey,
                          "anthropic-version" to "2023-06-01",
                          "Content-Type" to "application/json"
                      )
                  )

                  return JSONObject(response)
                      .getJSONArray("content")
                      .getJSONObject(0)
                      .getString("text")
                      .trim()
              }

              private fun gemini(
                  apiKey: String,
                  model: String,
                  message: String
              ): String {
                  val encodedKey = URLEncoder.encode(apiKey, "UTF-8")
                  val endpoint = "https://generativelanguage.googleapis.com/v1beta/models/$model:generateContent?key=$encodedKey"

                  val payload = JSONObject()
                      .put(
                          "contents",
                          JSONArray()
                              .put(
                                  JSONObject()
                                      .put(
                                          "parts",
                                          JSONArray()
                                              .put(JSONObject().put("text", message))
                                      )
                              )
                      )

                  val response = postJson(
                      url = endpoint,
                      body = payload,
                      headers = mapOf("Content-Type" to "application/json")
                  )

                  return JSONObject(response)
                      .getJSONArray("candidates")
                      .getJSONObject(0)
                      .getJSONObject("content")
                      .getJSONArray("parts")
                      .getJSONObject(0)
                      .getString("text")
                      .trim()
              }

              private fun postJson(
                  url: String,
                  body: JSONObject,
                  headers: Map<String, String>
              ): String {
                  val connection = (URL(url).openConnection() as HttpURLConnection).apply {
                      requestMethod = "POST"
                      connectTimeout = 30000
                      readTimeout = 60000
                      doOutput = true
                      headers.forEach { (key, value) ->
                          setRequestProperty(key, value)
                      }
                  }

                  OutputStreamWriter(connection.outputStream).use { writer ->
                      writer.write(body.toString())
                  }

                  val status = connection.responseCode
                  val stream = if (status in 200..299) {
                      connection.inputStream
                  } else {
                      connection.errorStream
                  }

                  val response = BufferedReader(InputStreamReader(stream)).use { reader ->
                      reader.readText()
                  }

                  if (status !in 200..299) {
                      throw IllegalStateException("AI request failed ($status): $response")
                  }

                  return response
              }
          }
          EOF

          cat > "docs/settings/STEP_43_COMMIT_PROOF.md" <<'EOF'
          # Step 43 Commit Proof

          This workflow must commit provider-aware AI routing changes.

          Expected behavior:
          - No saved API key shows no active model.
          - Saved provider keys appear only under Your Keys.
          - Save & Activate makes that provider active.
          - Chat uses the active provider, active model, and correct API key.
          EOF

      - name: Verify generated changes before commit
        shell: bash
        run: |
          set -euo pipefail

          echo "Git status before commit:"
          git status --short

          echo "Diff stat:"
          git diff --stat || true

          grep -R "ProviderChatClient" app/src/main/java/com/mrrobot/aiworkspace/data/ProviderChatClient.kt
          grep -R "No active API key" app/src/main/java/com/mrrobot/aiworkspace/data/ProviderChatClient.kt
          grep -R "ApiProvider.Anthropic" app/src/main/java/com/mrrobot/aiworkspace/data/ProviderChatClient.kt
          grep -R "ApiProvider.Gemini" app/src/main/java/com/mrrobot/aiworkspace/data/ProviderChatClient.kt

      - name: Commit Step 43 changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/java/com/mrrobot/aiworkspace/data/AiModels.kt
          git add app/src/main/java/com/mrrobot/aiworkspace/data/ProviderChatClient.kt
          git add docs/settings/STEP_43_COMMIT_PROOF.md

          echo "Staged files:"
          git diff --cached --stat || true

          if git diff --cached --quiet; then
            echo "No changes were staged. This means the repo already has these exact files."
            exit 0
          fi

          git commit -m "Step 43 fix provider active state and AI routing"
          git pull --rebase origin main
          git push origin main

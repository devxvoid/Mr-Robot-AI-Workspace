name: Step 8 File Manager System

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add File Manager System
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Add file manager system
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/data/FileModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          enum class WorkspaceFileType {
              Kotlin,
              Markdown,
              Gradle,
              Yaml,
              Zip,
              Folder,
              Text,
              Unknown
          }

          data class WorkspaceFile(
              val id: Long,
              val name: String,
              val path: String,
              val type: WorkspaceFileType,
              val size: String,
              val description: String,
              val contentPreview: String
          )

          object WorkspaceFiles {
              fun samples(): List<WorkspaceFile> {
                  return listOf(
                      WorkspaceFile(
                          id = 1,
                          name = "MainActivity.kt",
                          path = "app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt",
                          type = WorkspaceFileType.Kotlin,
                          size = "1.2 KB",
                          description = "Main Android entry point.",
                          contentPreview = "class MainActivity : ComponentActivity() { ... }"
                      ),
                      WorkspaceFile(
                          id = 2,
                          name = "ChatScreen.kt",
                          path = "app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt",
                          type = WorkspaceFileType.Kotlin,
                          size = "9.8 KB",
                          description = "OpenRouter-powered chat interface.",
                          contentPreview = "@Composable fun ChatScreen(...) { ... }"
                      ),
                      WorkspaceFile(
                          id = 3,
                          name = "SettingsStore.kt",
                          path = "app/src/main/java/com/mrrobot/aiworkspace/data/SettingsStore.kt",
                          type = WorkspaceFileType.Kotlin,
                          size = "2.1 KB",
                          description = "DataStore persistence for API key and model.",
                          contentPreview = "class SettingsStore(private val context: Context) { ... }"
                      ),
                      WorkspaceFile(
                          id = 4,
                          name = "build.gradle.kts",
                          path = "app/build.gradle.kts",
                          type = WorkspaceFileType.Gradle,
                          size = "2.4 KB",
                          description = "Android app Gradle configuration.",
                          contentPreview = "plugins { id(\"com.android.application\") ... }"
                      ),
                      WorkspaceFile(
                          id = 5,
                          name = "build-apk.yml",
                          path = ".github/workflows/build-apk.yml",
                          type = WorkspaceFileType.Yaml,
                          size = "1.9 KB",
                          description = "GitHub Actions APK build workflow.",
                          contentPreview = "name: Build Mr Robot AI Workspace APK"
                      ),
                      WorkspaceFile(
                          id = 6,
                          name = "BUILD_PROMPT.md",
                          path = "BUILD_PROMPT.md",
                          type = WorkspaceFileType.Markdown,
                          size = "4.1 KB",
                          description = "Main build instruction prompt.",
                          contentPreview = "# Build Mr. Robot AI Workspace Android MVP"
                      ),
                      WorkspaceFile(
                          id = 7,
                          name = "stitch_mr._robot_ai_workspace.zip",
                          path = "stitch_mr._robot_ai_workspace.zip",
                          type = WorkspaceFileType.Zip,
                          size = "Design ZIP",
                          description = "Google Stitch source design export.",
                          contentPreview = "Contains Stitch screen designs and references."
                      )
                  )
              }
          }
          EOF

          cat > "$APP_DIR/viewmodel/FileManagerViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import androidx.lifecycle.ViewModel
          import com.mrrobot.aiworkspace.data.WorkspaceFile
          import com.mrrobot.aiworkspace.data.WorkspaceFileType
          import com.mrrobot.aiworkspace.data.WorkspaceFiles
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow

          data class FileManagerUiState(
              val allFiles: List<WorkspaceFile> = WorkspaceFiles.samples(),
              val query: String = "",
              val selectedType: WorkspaceFileType? = null,
              val selectedFile: WorkspaceFile? = null,
              val copiedMessage: String = ""
          ) {
              val filteredFiles: List<WorkspaceFile>
                  get() {
                      return allFiles.filter { file ->
                          val matchesQuery =
                              query.isBlank() ||
                                  file.name.contains(query, ignoreCase = true) ||
                                  file.path.contains(query, ignoreCase = true) ||
                                  file.description.contains(query, ignoreCase = true)

                          val matchesType =
                              selectedType == null || file.type == selectedType

                          matchesQuery && matchesType
                      }
                  }
          }

          class FileManagerViewModel : ViewModel() {

              private val _uiState = MutableStateFlow(FileManagerUiState())
              val uiState: StateFlow<FileManagerUiState> = _uiState.asStateFlow()

              fun updateQuery(value: String) {
                  _uiState.value = _uiState.value.copy(
                      query = value,
                      copiedMessage = ""
                  )
              }

              fun selectType(type: WorkspaceFileType?) {
                  _uiState.value = _uiState.value.copy(
                      selectedType = type,
                      copiedMessage = ""
                  )
              }

              fun selectFile(file: WorkspaceFile) {
                  _uiState.value = _uiState.value.copy(
                      selectedFile = file,
                      copiedMessage = ""
                  )
              }

              fun closePreview() {
                  _uiState.value = _uiState.value.copy(
                      selectedFile = null
                  )
              }

              fun markCopied(label: String) {
                  _uiState.value = _uiState.value.copy(
                      copiedMessage = "$label copied"
                  )
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/FileManagerScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.horizontalScroll
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.platform.LocalClipboardManager
          import androidx.compose.ui.text.AnnotatedString
          import androidx.compose.ui.text.font.FontFamily
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.WorkspaceFile
          import com.mrrobot.aiworkspace.data.WorkspaceFileType
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.FileManagerViewModel

          @Composable
          fun FileManagerScreen(
              viewModel: FileManagerViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()
              val clipboard = LocalClipboardManager.current

              ScreenShell {
                  Title("File Manager")
                  Subtitle("Browse project files, design assets, and workflow outputs.")
                  Spacer(Modifier.height(14.dp))

                  OutlinedTextField(
                      value = state.query,
                      onValueChange = viewModel::updateQuery,
                      placeholder = { Text("Search files, paths, or descriptions...") },
                      modifier = Modifier.fillMaxWidth(),
                      singleLine = true
                  )

                  Spacer(Modifier.height(10.dp))

                  TypeFilters(
                      selectedType = state.selectedType,
                      onSelect = viewModel::selectType
                  )

                  Spacer(Modifier.height(10.dp))

                  if (state.copiedMessage.isNotBlank()) {
                      GlassCard {
                          Subtitle(state.copiedMessage)
                      }

                      Spacer(Modifier.height(10.dp))
                  }

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      contentPadding = PaddingValues(bottom = 12.dp)
                  ) {
                      items(
                          items = state.filteredFiles,
                          key = { it.id }
                      ) { file ->
                          FileCard(
                              file = file,
                              onClick = { viewModel.selectFile(file) },
                              onCopyPath = {
                                  clipboard.setText(AnnotatedString(file.path))
                                  viewModel.markCopied("Path")
                              }
                          )
                      }

                      if (state.filteredFiles.isEmpty()) {
                          item {
                              GlassCard {
                                  Title("No files found")
                                  Subtitle("Try another search or clear filters.")
                              }
                          }
                      }

                      item {
                          Spacer(Modifier.height(80.dp))
                      }
                  }

                  state.selectedFile?.let { file ->
                      FilePreviewDialog(
                          file = file,
                          onDismiss = { viewModel.closePreview() },
                          onCopyPath = {
                              clipboard.setText(AnnotatedString(file.path))
                              viewModel.markCopied("Path")
                          },
                          onCopyPreview = {
                              clipboard.setText(AnnotatedString(file.contentPreview))
                              viewModel.markCopied("Preview")
                          }
                      )
                  }
              }
          }

          @Composable
          private fun TypeFilters(
              selectedType: WorkspaceFileType?,
              onSelect: (WorkspaceFileType?) -> Unit
          ) {
              Row(
                  modifier = Modifier
                      .fillMaxWidth()
                      .horizontalScroll(rememberScrollState()),
                  horizontalArrangement = Arrangement.spacedBy(8.dp)
              ) {
                  FilterChip(
                      selected = selectedType == null,
                      onClick = { onSelect(null) },
                      label = { Text("All") }
                  )

                  WorkspaceFileType.values().forEach { type ->
                      FilterChip(
                          selected = selectedType == type,
                          onClick = { onSelect(type) },
                          label = { Text(type.name) }
                      )
                  }
              }
          }

          @Composable
          private fun FileCard(
              file: WorkspaceFile,
              onClick: () -> Unit,
              onCopyPath: () -> Unit
          ) {
              GlassCard(
                  modifier = Modifier
                      .padding(bottom = 12.dp)
                      .clickable { onClick() }
              ) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              text = "${fileIcon(file.type)} ${file.name}",
                              color = Color.White,
                              fontWeight = FontWeight.Bold
                          )

                          Spacer(Modifier.height(6.dp))

                          Subtitle(file.path)

                          Spacer(Modifier.height(8.dp))

                          Subtitle(file.description)
                      }

                      AssistChip(
                          onClick = {},
                          label = { Text(file.size) }
                      )
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      OutlinedButton(
                          onClick = onClick,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("Preview")
                      }

                      OutlinedButton(
                          onClick = onCopyPath,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("Copy Path")
                      }
                  }
              }
          }

          @Composable
          private fun FilePreviewDialog(
              file: WorkspaceFile,
              onDismiss: () -> Unit,
              onCopyPath: () -> Unit,
              onCopyPreview: () -> Unit
          ) {
              AlertDialog(
                  onDismissRequest = onDismiss,
                  title = {
                      Text("${fileIcon(file.type)} ${file.name}")
                  },
                  text = {
                      Column {
                          Text(
                              text = file.path,
                              color = SoftText
                          )

                          Spacer(Modifier.height(10.dp))

                          Text(
                              text = file.description,
                              color = Color.White
                          )

                          Spacer(Modifier.height(12.dp))

                          Text(
                              text = file.contentPreview,
                              color = Color.White,
                              fontFamily = FontFamily.Monospace
                          )
                      }
                  },
                  confirmButton = {
                      TextButton(onClick = onCopyPath) {
                          Text("Copy Path")
                      }
                  },
                  dismissButton = {
                      Row {
                          TextButton(onClick = onCopyPreview) {
                              Text("Copy Preview")
                          }

                          TextButton(onClick = onDismiss) {
                              Text("Close")
                          }
                      }
                  }
              )
          }

          private fun fileIcon(type: WorkspaceFileType): String {
              return when (type) {
                  WorkspaceFileType.Kotlin -> "🧩"
                  WorkspaceFileType.Markdown -> "📝"
                  WorkspaceFileType.Gradle -> "⚙️"
                  WorkspaceFileType.Yaml -> "🔁"
                  WorkspaceFileType.Zip -> "🗜️"
                  WorkspaceFileType.Folder -> "📁"
                  WorkspaceFileType.Text -> "📄"
                  WorkspaceFileType.Unknown -> "❔"
              }
          }
          EOF

      - name: Commit Step 8 upgrade
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 8 add file manager system"

          git pull --rebase origin main

          git push origin main

name: Final Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK With Readable Logs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Make Gradle executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Show project structure
        shell: bash
        run: |
          echo "===== KOTLIN FILES ====="
          find app/src/main/java -type f -name "*.kt" | sort || true

          echo "===== GRADLE FILES ====="
          find . -maxdepth 4 -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "gradle.properties" -o -name "settings.gradle.kts" \) | sort || true

      - name: Validate Gradle project
        shell: bash
        run: |
          set +e

          ./gradlew projects \
            --stacktrace \
            --no-daemon \
            > gradle-projects-log.txt 2>&1

          code=$?

          cat gradle-projects-log.txt

          exit $code

      - name: Compile Kotlin with readable errors
        shell: bash
        run: |
          set +e

          ./gradlew :app:compileDebugKotlin \
            --stacktrace \
            --no-daemon \
            > kotlin-compile-log.txt 2>&1

          code=$?

          echo "===== REAL KOTLIN ERRORS ====="

          grep -nE \
            "e: file:|e: |error:|Unresolved reference|Type mismatch|No value passed|Conflicting overloads|Composable|expecting|FAILED" \
            kotlin-compile-log.txt || true

          echo "===== LAST 300 KOTLIN LOG LINES ====="

          tail -300 kotlin-compile-log.txt || true

          exit $code

      - name: Build APK with readable errors
        shell: bash
        run: |
          set +e

          ./gradlew clean assembleDebug \
            --stacktrace \
            --no-daemon \
            > build-log.txt 2>&1

          code=$?

          echo "===== REAL BUILD ERRORS ====="

          grep -nE \
            "e: file:|e: |error:|Unresolved reference|Type mismatch|No value passed|Conflicting overloads|Composable|expecting|FAILED" \
            build-log.txt || true

          echo "===== LAST 300 BUILD LOG LINES ====="

          tail -300 build-log.txt || true

          echo "===== APK SEARCH ====="
          find . -type f -name "*.apk" | sort || true

          exit $code

      - name: Create build summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Mr. Robot AI Workspace Build Summary"
            echo
            echo "## APK Search"
            echo '```text'
            find . -type f -name "*.apk" | sort || true
            echo '```'
            echo
            echo "## Kotlin Errors"
            echo '```text'
            grep -nE "e: file:|e: |error:|Unresolved reference|Type mismatch|No value passed|Conflicting overloads|Composable|expecting|FAILED" kotlin-compile-log.txt 2>/dev/null || true
            echo '```'
            echo
            echo "## Build Errors"
            echo '```text'
            grep -nE "e: file:|e: |error:|Unresolved reference|Type mismatch|No value passed|Conflicting overloads|Composable|expecting|FAILED" build-log.txt 2>/dev/null || true
            echo '```'
          } > BUILD_SUMMARY.md

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-build-debug-logs
          path: |
            gradle-projects-log.txt
            kotlin-compile-log.txt
            build-log.txt
            BUILD_SUMMARY.md

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mr-robot-ai-workspace-debug-apk
          path: |
            **/*.apk
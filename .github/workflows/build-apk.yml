name: Build Mr Robot AI Workspace APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle*"
      - "settings.gradle*"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show project files
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Build APK with logs
        run: |
          # Without pipefail, `gradlew ... | tee` returns tee's exit status,
          # which masks Gradle failures and makes the job look green even
          # when assembleDebug errors out.
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Show APK output directory
        if: always()
        run: |
          echo "Contents of app/build/outputs/apk (if it exists):"
          if [ -d app/build/outputs/apk ]; then
            find app/build/outputs/apk -type f -print
          else
            echo "  (directory does not exist)"
          fi

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mr-robot-ai-workspace-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

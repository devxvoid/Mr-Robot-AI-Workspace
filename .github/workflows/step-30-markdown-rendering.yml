name: Step 30 Markdown Rendering

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Add markdown renderer
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/ui/markdown"

          cat > "$ROOT/ui/markdown/MarkdownRenderer.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.markdown

          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontFamily
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          @Composable
          fun MarkdownRenderer(
              markdown: String
          ) {

              val blocks =
                  markdown.split("```")

              Column {

                  blocks.forEachIndexed { index, block ->

                      val isCode =
                          index % 2 == 1

                      if (isCode) {

                          CodeBlock(block)

                      } else {

                          MarkdownText(block)
                      }

                      Spacer(
                          modifier = Modifier.height(8.dp)
                      )
                  }
              }
          }

          @Composable
          fun MarkdownText(
              text: String
          ) {

              Text(
                  text = text.trim(),
                  color = Color.White,
                  lineHeight = 24.sp,
                  fontSize = 15.sp
              )
          }

          @Composable
          fun CodeBlock(
              code: String
          ) {

              Column(
                  modifier = Modifier
                      .fillMaxWidth()
                      .background(
                          Color(0xFF111827),
                          RoundedCornerShape(18.dp)
                      )
                      .padding(16.dp)
              ) {

                  Text(
                      text = code.trim(),
                      color = Color(0xFF00FFB2),
                      fontFamily = FontFamily.Monospace,
                      fontSize = 13.sp,
                      lineHeight = 22.sp
                  )
              }
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path

          p = Path(
              "app/src/main/java/com/mrrobot/aiworkspace/ui/chat/ChatScreen.kt"
          )

          text = p.read_text()

          text = text.replace(
              'import com.mrrobot.aiworkspace.viewmodel.ChatViewModel',
              'import com.mrrobot.aiworkspace.viewmodel.ChatViewModel\nimport com.mrrobot.aiworkspace.ui.markdown.MarkdownRenderer'
          )

          old = '''
                                  Text(
                                      text = msg.content,
                                      color = Color.White,
                                      lineHeight = 22.sp
                                  )
          '''

          new = '''
                                  MarkdownRenderer(
                                      markdown = msg.content
                                  )
          '''

          text = text.replace(old, new)

          p.write_text(text)
          PY

      - name: Commit markdown rendering
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Add markdown and code rendering"

          git pull --rebase origin main

          git push origin main
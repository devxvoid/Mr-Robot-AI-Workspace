name: Step 9 Marketplace Tools System

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Marketplace Tools System
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Add marketplace tools system
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/data/MarketplaceModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          enum class MarketplaceItemType {
              Model,
              Agent,
              Tool,
              Workflow,
              Integration
          }

          data class MarketplaceItem(
              val id: String,
              val title: String,
              val provider: String,
              val type: MarketplaceItemType,
              val description: String,
              val tags: List<String>,
              val enabled: Boolean = false
          )

          object MarketplaceCatalog {
              fun items(): List<MarketplaceItem> {
                  return listOf(
                      MarketplaceItem(
                          id = "openrouter_models",
                          title = "OpenRouter Model Gateway",
                          provider = "OpenRouter",
                          type = MarketplaceItemType.Integration,
                          description = "Use multiple AI models through one API key and route requests from the chat workspace.",
                          tags = listOf("AI", "Models", "API"),
                          enabled = true
                      ),
                      MarketplaceItem(
                          id = "android_architect_agent",
                          title = "Android Architect Agent",
                          provider = "Mr. Robot",
                          type = MarketplaceItemType.Agent,
                          description = "Generates Android project structures, Compose screens, ViewModels, repositories, and Gradle fixes.",
                          tags = listOf("Kotlin", "Compose", "Gradle"),
                          enabled = true
                      ),
                      MarketplaceItem(
                          id = "debug_specialist_agent",
                          title = "Debugging Specialist Agent",
                          provider = "Mr. Robot",
                          type = MarketplaceItemType.Agent,
                          description = "Analyzes build logs, Kotlin errors, dependency conflicts, and GitHub Actions failures.",
                          tags = listOf("Debug", "CI", "Logs"),
                          enabled = true
                      ),
                      MarketplaceItem(
                          id = "apk_build_workflow",
                          title = "APK Build Workflow",
                          provider = "GitHub Actions",
                          type = MarketplaceItemType.Workflow,
                          description = "Builds Android debug APKs, uploads artifacts, and stores build logs.",
                          tags = listOf("APK", "CI/CD", "Artifacts"),
                          enabled = true
                      ),
                      MarketplaceItem(
                          id = "markdown_prompt_builder",
                          title = "Markdown Prompt Builder",
                          provider = "Mr. Robot",
                          type = MarketplaceItemType.Tool,
                          description = "Creates structured prompts for agents, workflows, Android builds, and UI upgrades.",
                          tags = listOf("Prompt", "Markdown", "Agents")
                      ),
                      MarketplaceItem(
                          id = "stitch_importer",
                          title = "Google Stitch Design Importer",
                          provider = "Google Stitch",
                          type = MarketplaceItemType.Tool,
                          description = "Tracks Stitch design ZIP exports and maps generated screens into Android Compose screens.",
                          tags = listOf("Design", "Compose", "UI")
                      ),
                      MarketplaceItem(
                          id = "gemini_flash",
                          title = "Gemini 2.0 Flash",
                          provider = "Google",
                          type = MarketplaceItemType.Model,
                          description = "Fast model for mobile AI assistant workflows and UI generation.",
                          tags = listOf("Fast", "Google", "Model")
                      ),
                      MarketplaceItem(
                          id = "gpt4o_mini",
                          title = "GPT-4o Mini",
                          provider = "OpenAI",
                          type = MarketplaceItemType.Model,
                          description = "Balanced general model for chat, coding help, and productivity workflows.",
                          tags = listOf("OpenAI", "Chat", "Coding"),
                          enabled = true
                      ),
                      MarketplaceItem(
                          id = "claude_sonnet",
                          title = "Claude 3.5 Sonnet",
                          provider = "Anthropic",
                          type = MarketplaceItemType.Model,
                          description = "Strong writing, reasoning, and large task planning model.",
                          tags = listOf("Reasoning", "Writing", "Planning")
                      )
                  )
              }
          }
          EOF

          cat > "$APP_DIR/viewmodel/MarketplaceViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import androidx.lifecycle.ViewModel
          import com.mrrobot.aiworkspace.data.MarketplaceCatalog
          import com.mrrobot.aiworkspace.data.MarketplaceItem
          import com.mrrobot.aiworkspace.data.MarketplaceItemType
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow

          data class MarketplaceUiState(
              val items: List<MarketplaceItem> = MarketplaceCatalog.items(),
              val query: String = "",
              val selectedType: MarketplaceItemType? = null,
              val selectedItem: MarketplaceItem? = null
          ) {
              val filteredItems: List<MarketplaceItem>
                  get() {
                      return items.filter { item ->
                          val matchesQuery =
                              query.isBlank() ||
                                  item.title.contains(query, ignoreCase = true) ||
                                  item.provider.contains(query, ignoreCase = true) ||
                                  item.description.contains(query, ignoreCase = true) ||
                                  item.tags.any { it.contains(query, ignoreCase = true) }

                          val matchesType =
                              selectedType == null || item.type == selectedType

                          matchesQuery && matchesType
                      }
                  }

              val enabledCount: Int
                  get() = items.count { it.enabled }
          }

          class MarketplaceViewModel : ViewModel() {

              private val _uiState = MutableStateFlow(MarketplaceUiState())
              val uiState: StateFlow<MarketplaceUiState> = _uiState.asStateFlow()

              fun updateQuery(value: String) {
                  _uiState.value = _uiState.value.copy(query = value)
              }

              fun selectType(type: MarketplaceItemType?) {
                  _uiState.value = _uiState.value.copy(selectedType = type)
              }

              fun selectItem(item: MarketplaceItem) {
                  _uiState.value = _uiState.value.copy(selectedItem = item)
              }

              fun closeDetails() {
                  _uiState.value = _uiState.value.copy(selectedItem = null)
              }

              fun toggleItem(id: String) {
                  val current = _uiState.value

                  val updated = current.items.map { item ->
                      if (item.id == id) {
                          item.copy(enabled = !item.enabled)
                      } else {
                          item
                      }
                  }

                  _uiState.value = current.copy(
                      items = updated,
                      selectedItem = updated.firstOrNull { it.id == id }
                  )
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/MarketplaceScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.horizontalScroll
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.MarketplaceItem
          import com.mrrobot.aiworkspace.data.MarketplaceItemType
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.MarketplaceViewModel

          @Composable
          fun MarketplaceScreen(
              viewModel: MarketplaceViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()

              ScreenShell {
                  Title("Marketplace")
                  Subtitle("Enable models, tools, agents, workflows, and integrations.")
                  Spacer(Modifier.height(14.dp))

                  GlassCard {
                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.SpaceBetween,
                          verticalAlignment = Alignment.CenterVertically
                      ) {
                          Column {
                              Title("${state.enabledCount}")
                              Subtitle("Enabled modules")
                          }

                          Column {
                              Title("${state.items.size}")
                              Subtitle("Available items")
                          }
                      }
                  }

                  Spacer(Modifier.height(12.dp))

                  OutlinedTextField(
                      value = state.query,
                      onValueChange = viewModel::updateQuery,
                      placeholder = { Text("Search marketplace...") },
                      modifier = Modifier.fillMaxWidth(),
                      singleLine = true
                  )

                  Spacer(Modifier.height(10.dp))

                  MarketplaceTypeFilters(
                      selectedType = state.selectedType,
                      onSelect = viewModel::selectType
                  )

                  Spacer(Modifier.height(12.dp))

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      contentPadding = PaddingValues(bottom = 12.dp)
                  ) {
                      items(
                          items = state.filteredItems,
                          key = { it.id }
                      ) { item ->
                          MarketplaceItemCard(
                              item = item,
                              onOpen = { viewModel.selectItem(item) },
                              onToggle = { viewModel.toggleItem(item.id) }
                          )
                      }

                      if (state.filteredItems.isEmpty()) {
                          item {
                              GlassCard {
                                  Title("No marketplace items found")
                                  Subtitle("Try another keyword or clear the selected type.")
                              }
                          }
                      }

                      item {
                          Spacer(Modifier.height(80.dp))
                      }
                  }

                  state.selectedItem?.let { item ->
                      MarketplaceDetailsDialog(
                          item = item,
                          onDismiss = { viewModel.closeDetails() },
                          onToggle = { viewModel.toggleItem(item.id) }
                      )
                  }
              }
          }

          @Composable
          private fun MarketplaceTypeFilters(
              selectedType: MarketplaceItemType?,
              onSelect: (MarketplaceItemType?) -> Unit
          ) {
              Row(
                  modifier = Modifier
                      .fillMaxWidth()
                      .horizontalScroll(rememberScrollState()),
                  horizontalArrangement = Arrangement.spacedBy(8.dp)
              ) {
                  FilterChip(
                      selected = selectedType == null,
                      onClick = { onSelect(null) },
                      label = { Text("All") }
                  )

                  MarketplaceItemType.values().forEach { type ->
                      FilterChip(
                          selected = selectedType == type,
                          onClick = { onSelect(type) },
                          label = { Text(type.name) }
                      )
                  }
              }
          }

          @Composable
          private fun MarketplaceItemCard(
              item: MarketplaceItem,
              onOpen: () -> Unit,
              onToggle: () -> Unit
          ) {
              GlassCard(
                  modifier = Modifier
                      .padding(bottom = 12.dp)
                      .clickable { onOpen() }
              ) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.Top
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              text = "${marketplaceIcon(item.type)} ${item.title}",
                              color = Color.White,
                              fontWeight = FontWeight.Bold
                          )

                          Spacer(Modifier.height(6.dp))

                          Subtitle("${item.provider} • ${item.type.name}")

                          Spacer(Modifier.height(8.dp))

                          Subtitle(item.description)
                      }

                      Switch(
                          checked = item.enabled,
                          onCheckedChange = { onToggle() }
                      )
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      item.tags.take(3).forEach { tag ->
                          AssistChip(
                              onClick = {},
                              label = { Text(tag) }
                          )
                      }
                  }

                  Spacer(Modifier.height(10.dp))

                  OutlinedButton(
                      onClick = onOpen,
                      modifier = Modifier.fillMaxWidth(),
                      shape = RoundedCornerShape(18.dp)
                  ) {
                      Text("View Details")
                  }
              }
          }

          @Composable
          private fun MarketplaceDetailsDialog(
              item: MarketplaceItem,
              onDismiss: () -> Unit,
              onToggle: () -> Unit
          ) {
              AlertDialog(
                  onDismissRequest = onDismiss,
                  title = {
                      Text("${marketplaceIcon(item.type)} ${item.title}")
                  },
                  text = {
                      Column {
                          Text(
                              text = "${item.provider} • ${item.type.name}",
                              color = SoftText
                          )

                          Spacer(Modifier.height(10.dp))

                          Text(
                              text = item.description,
                              color = Color.White
                          )

                          Spacer(Modifier.height(12.dp))

                          Text(
                              text = "Tags: ${item.tags.joinToString()}",
                              color = SoftText
                          )

                          Spacer(Modifier.height(12.dp))

                          Text(
                              text = if (item.enabled) "Status: Enabled" else "Status: Disabled",
                              color = if (item.enabled) NeonCyan else SoftText,
                              fontWeight = FontWeight.Bold
                          )
                      }
                  },
                  confirmButton = {
                      TextButton(onClick = onToggle) {
                          Text(if (item.enabled) "Disable" else "Enable")
                      }
                  },
                  dismissButton = {
                      TextButton(onClick = onDismiss) {
                          Text("Close")
                      }
                  }
              )
          }

          private fun marketplaceIcon(type: MarketplaceItemType): String {
              return when (type) {
                  MarketplaceItemType.Model -> "🧠"
                  MarketplaceItemType.Agent -> "🤖"
                  MarketplaceItemType.Tool -> "🛠️"
                  MarketplaceItemType.Workflow -> "🔁"
                  MarketplaceItemType.Integration -> "🔌"
              }
          }
          EOF

      - name: Commit Step 9 upgrade
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 9 add marketplace tools system"

          git pull --rebase origin main

          git push origin main
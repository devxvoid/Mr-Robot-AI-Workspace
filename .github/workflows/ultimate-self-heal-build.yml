name: Ultimate Self Heal Android Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  self-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Self heal Android project
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"
          SCREEN_DIR="$ROOT/ui/screens"
          COMPONENT_DIR="$ROOT/ui/components"
          NAV_DIR="$ROOT/navigation"

          mkdir -p "$SCREEN_DIR"
          mkdir -p "$COMPONENT_DIR"
          mkdir -p "$NAV_DIR"

          cat > "$COMPONENT_DIR/UiComponents.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.components

          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.background
          import androidx.compose.foundation.border
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          val NeonCyan = Color(0xFF00D4FF)
          val NeonPurple = Color(0xFF8B5CF6)
          val NeonGreen = Color(0xFF00FF88)

          @Composable
          fun ScreenShell(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              Column(
                  modifier = modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  Color(0xFF020617),
                                  Color(0xFF071226),
                                  Color(0xFF020617)
                              )
                          )
                      )
                      .padding(18.dp),
                  verticalArrangement = Arrangement.spacedBy(12.dp),
                  content = content
              )
          }

          @Composable
          fun GlassCard(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              Surface(
                  modifier = modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(22.dp),
                  color = Color(0xAA0B1020),
                  border = BorderStroke(
                      1.dp,
                      NeonCyan.copy(alpha = .25f)
                  )
              ) {
                  Column(
                      modifier = Modifier.padding(18.dp),
                      verticalArrangement = Arrangement.spacedBy(10.dp),
                      content = content
                  )
              }
          }

          @Composable
          fun PageTitle(text: String) {
              Text(
                  text = text,
                  color = Color.White,
                  fontSize = 32.sp,
                  fontWeight = FontWeight.ExtraBold
              )
          }

          @Composable
          fun Title(text: String) {
              Text(
                  text = text,
                  color = Color.White,
                  fontSize = 22.sp,
                  fontWeight = FontWeight.Bold,
                  maxLines = 1,
                  overflow = TextOverflow.Ellipsis
              )
          }

          @Composable
          fun Subtitle(text: String) {
              Text(
                  text = text,
                  color = Color(0xFF94A3B8),
                  fontSize = 14.sp,
                  lineHeight = 22.sp
              )
          }

          @Composable
          fun SoftText(text: String) {
              Text(
                  text = text,
                  color = Color(0xFFCBD5E1),
                  fontSize = 14.sp,
                  lineHeight = 21.sp
              )
          }

          @Composable
          fun StatusPill(
              text: String,
              color: Color = NeonCyan
          ) {
              Surface(
                  color = color.copy(alpha = .15f),
                  border = BorderStroke(
                      1.dp,
                      color.copy(alpha = .4f)
                  ),
                  shape = RoundedCornerShape(100)
              ) {
                  Text(
                      text = text,
                      color = color,
                      modifier = Modifier.padding(
                          horizontal = 12.dp,
                          vertical = 6.dp
                      ),
                      fontWeight = FontWeight.Bold,
                      fontSize = 12.sp
                  )
              }
          }

          @Composable
          fun PrimaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              Button(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(56.dp),
                  shape = RoundedCornerShape(16.dp),
                  colors = ButtonDefaults.buttonColors(
                      containerColor = NeonCyan,
                      contentColor = Color.Black
                  )
              ) {
                  Text(
                      text = text,
                      fontWeight = FontWeight.Bold
                  )
              }
          }

          @Composable
          fun SecondaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(54.dp),
                  shape = RoundedCornerShape(16.dp),
                  border = BorderStroke(
                      1.dp,
                      Color.White.copy(alpha = .2f)
                  )
              ) {
                  Text(
                      text = text,
                      color = NeonCyan
                  )
              }
          }

          @Composable
          fun Panel(
              title: String,
              subtitle: String? = null,
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit = {}
          ) {
              GlassCard(modifier = modifier) {

                  Title(title)

                  subtitle?.let {
                      Subtitle(it)
                  }

                  content()
              }
          }

          @Composable
          fun CenterBox(
              modifier: Modifier = Modifier,
              content: @Composable BoxScope.() -> Unit
          ) {
              Box(
                  modifier = modifier.fillMaxSize(),
                  contentAlignment = Alignment.Center,
                  content = content
              )
          }
          EOF

          cat > "$SCREEN_DIR/ChatScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.material3.OutlinedTextField
          import androidx.compose.material3.Text
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import com.mrrobot.aiworkspace.ui.components.*

          data class ChatMessage(
              val role: String,
              val message: String
          )

          @Composable
          fun ChatScreen() {

              var input by remember { mutableStateOf("") }

              val messages = remember {
                  mutableStateListOf(
                      ChatMessage(
                          "assistant",
                          "Welcome to Mr. Robot AI Workspace."
                      )
                  )
              }

              ScreenShell {

                  PageTitle("AI Chat")

                  Subtitle("OpenRouter-ready AI workspace interface.")

                  Spacer(modifier = Modifier.height(16.dp))

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {

                      items(messages) { item ->

                          GlassCard {

                              StatusPill(item.role.uppercase())

                              SoftText(item.message)
                          }
                      }
                  }

                  OutlinedTextField(
                      value = input,
                      onValueChange = {
                          input = it
                      },
                      modifier = Modifier.fillMaxWidth(),
                      label = {
                          Text("Prompt")
                      }
                  )

                  Spacer(modifier = Modifier.height(12.dp))

                  PrimaryButton(
                      text = "Send",
                      onClick = {

                          if (input.isNotBlank()) {

                              messages.add(
                                  ChatMessage(
                                      "user",
                                      input
                                  )
                              )

                              messages.add(
                                  ChatMessage(
                                      "assistant",
                                      "Response generated for: $input"
                                  )
                              )

                              input = ""
                          }
                      }
                  )
              }
          }
          EOF

          for screen in AgentsScreen WorkflowScreen TerminalScreen FileManagerScreen MarketplaceScreen ProfileScreen SettingsScreen MoreScreen WelcomeScreen; do
          cat > "$SCREEN_DIR/$screen.kt" <<EOF
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import com.mrrobot.aiworkspace.ui.components.*

          @Composable
          fun ${screen%.*}() {

              ScreenShell {

                  PageTitle("${screen%Screen}")

                  Subtitle("Professional AI workspace module.")

                  Spacer(modifier = Modifier.height(18.dp))

                  Panel(
                      title = "${screen%Screen} Module",
                      subtitle = "Stable Compose implementation"
                  ) {

                      StatusPill("READY")

                      SoftText(
                          "This module has been stabilized by the self-healing workflow."
                      )

                      Spacer(modifier = Modifier.height(12.dp))

                      PrimaryButton(
                          text = "Continue",
                          onClick = {}
                      )
                  }
              }
          }
          EOF
          done

          cat > "$NAV_DIR/AppNavGraph.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.rememberNavController
          import com.mrrobot.aiworkspace.ui.screens.*

          @Composable
          fun AppNavGraph() {

              val nav = rememberNavController()

              NavHost(
                  navController = nav,
                  startDestination = "welcome"
              ) {

                  composable("welcome") {
                      WelcomeScreen()
                  }

                  composable("chat") {
                      ChatScreen()
                  }

                  composable("agents") {
                      AgentsScreen()
                  }

                  composable("workflow") {
                      WorkflowScreen()
                  }

                  composable("terminal") {
                      TerminalScreen()
                  }

                  composable("files") {
                      FileManagerScreen()
                  }

                  composable("market") {
                      MarketplaceScreen()
                  }

                  composable("profile") {
                      ProfileScreen()
                  }

                  composable("settings") {
                      SettingsScreen()
                  }

                  composable("more") {
                      MoreScreen()
                  }
              }
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          kotlin.incremental=false
          EOF

      - name: Auto commit healed project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Ultimate self-heal Android project"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set +e

          ./gradlew clean assembleDebug --stacktrace > build-log.txt 2>&1

          code=$?

          cat build-log.txt

          find . -name "*.apk"

          exit $code

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mr-robot-ai-workspace-apk
          path: |
            **/*.apk
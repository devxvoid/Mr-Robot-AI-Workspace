name: Fix Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Remove broken wrapper
        run: |
          rm -f gradlew
          rm -f gradlew.bat
          rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Generate real Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7

      - name: Make executable
        run: chmod +x gradlew

      - name: Commit fixed wrapper
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Fix real Gradle wrapper" || echo "Nothing to commit"

          git push

name: Step 15 Fix Dependencies And Chat Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Fix Dependencies And Chat Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Fix Gradle dependencies and ChatRepository
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.mrrobot.aiworkspace"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.mrrobot.aiworkspace"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 15
                  versionName = "1.5"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")

              implementation(platform("androidx.compose:compose-bom:2024.09.02"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.navigation:navigation-compose:2.8.1")

              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.5")
              implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.5")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.5")

              implementation("androidx.datastore:datastore-preferences:1.1.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")

              implementation("org.json:json:20240303")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

          cat > "$APP_DIR/data/ChatRepository.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import org.json.JSONArray
          import org.json.JSONObject
          import java.io.BufferedReader
          import java.io.InputStreamReader
          import java.io.OutputStreamWriter
          import java.net.HttpURLConnection
          import java.net.URL

          data class ChatMessage(
              val role: String,
              val content: String
          )

          class ChatRepository {

              suspend fun sendMessage(
                  apiKey: String,
                  model: String,
                  messages: List<ChatMessage>
              ): Result<String> = withContext(Dispatchers.IO) {
                  try {
                      if (apiKey.isBlank()) {
                          return@withContext Result.failure(
                              IllegalStateException("OpenRouter API key is missing. Add it in Settings.")
                          )
                      }

                      val requestJson = buildRequestJson(
                          model = model.ifBlank { "openai/gpt-4o-mini" },
                          messages = messages
                      )

                      val url = URL("https://openrouter.ai/api/v1/chat/completions")
                      val connection = url.openConnection() as HttpURLConnection

                      connection.requestMethod = "POST"
                      connection.connectTimeout = 30_000
                      connection.readTimeout = 90_000
                      connection.doOutput = true
                      connection.setRequestProperty("Authorization", "Bearer $apiKey")
                      connection.setRequestProperty("Content-Type", "application/json")
                      connection.setRequestProperty("HTTP-Referer", "https://github.com/devxvoid/Mr-Robot-AI-Workspace")
                      connection.setRequestProperty("X-Title", "Mr. Robot AI Workspace")

                      OutputStreamWriter(connection.outputStream).use { writer ->
                          writer.write(requestJson.toString())
                          writer.flush()
                      }

                      val statusCode = connection.responseCode

                      val responseText = if (statusCode in 200..299) {
                          readStream(connection.inputStream.reader())
                      } else {
                          val errorStream = connection.errorStream
                          if (errorStream != null) {
                              readStream(errorStream.reader())
                          } else {
                              "OpenRouter request failed with status $statusCode"
                          }
                      }

                      connection.disconnect()

                      if (statusCode !in 200..299) {
                          return@withContext Result.failure(
                              IllegalStateException("OpenRouter error $statusCode: $responseText")
                          )
                      }

                      val reply = parseAssistantReply(responseText)

                      Result.success(reply)
                  } catch (e: Exception) {
                      Result.failure(e)
                  }
              }

              private fun buildRequestJson(
                  model: String,
                  messages: List<ChatMessage>
              ): JSONObject {
                  val jsonMessages = JSONArray()

                  jsonMessages.put(
                      JSONObject()
                          .put("role", "system")
                          .put(
                              "content",
                              "You are Mr. Robot AI Workspace, a precise Android development assistant. Give practical, production-ready answers."
                          )
                  )

                  messages.forEach { message ->
                      jsonMessages.put(
                          JSONObject()
                              .put("role", message.role)
                              .put("content", message.content)
                      )
                  }

                  return JSONObject()
                      .put("model", model)
                      .put("messages", jsonMessages)
                      .put("temperature", 0.7)
                      .put("max_tokens", 1200)
              }

              private fun parseAssistantReply(responseText: String): String {
                  val root = JSONObject(responseText)
                  val choices = root.getJSONArray("choices")

                  if (choices.length() == 0) {
                      return "No response returned from OpenRouter."
                  }

                  val first = choices.getJSONObject(0)
                  val message = first.optJSONObject("message")

                  return message
                      ?.optString("content")
                      ?.takeIf { it.isNotBlank() }
                      ?: "Empty response returned from OpenRouter."
              }

              private fun readStream(reader: InputStreamReader): String {
                  return BufferedReader(reader).use { buffered ->
                      buildString {
                          var line: String?

                          while (true) {
                              line = buffered.readLine()

                              if (line == null) {
                                  break
                              }

                              append(line)
                              append('\n')
                          }
                      }
                  }
              }
          }
          EOF

      - name: Commit dependency and chat fixes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 15 fix dependencies and chat repository"

          git pull --rebase origin main

          git push origin main

name: Fix and Build Kotlin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Patch Gradle Memory & Syntax
        run: |
          # Increase memory to prevent the build from cutting off
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties
          
          # Path to the problematic file
          FILE_PATH="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/SettingsScreen.kt"
          
          # 1. Add missing Material3 imports
          sed -i '/import/a import androidx.compose.material3.ExposedDropdownMenuBox\nimport androidx.compose.material3.ExposedDropdownMenuDefaults' "$FILE_PATH"
          
          # 2. Fix the Modifier syntax chains (Lines 440/445)
          sed -i 's/Modifier.weight(1f).height(48.dp)/Modifier.weight(1f)\n                    .height(48.dp)/g' "$FILE_PATH"

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/

name: Fix and Build Kotlin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Patch Gradle Memory & Syntax
        run: |
          # Increase memory to prevent the build from cutting off
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

          # Path to the target file
          FILE_PATH="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/SettingsScreen.kt"

          # 1. Add missing Material3 imports (idempotent: only add if absent,
          #    and only once — never append after every import line).
          add_import_if_missing() {
            local import_line="$1"
            local file="$2"
            if ! grep -qxF "$import_line" "$file"; then
              # Insert before the first blank line after the package declaration
              # (i.e. at the top of the import block).
              awk -v ins="$import_line" '
                BEGIN { inserted = 0 }
                /^package / { print; next }
                !inserted && /^import / { print ins; inserted = 1 }
                { print }
                END { if (!inserted) print ins }
              ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            fi
          }

          add_import_if_missing "import androidx.compose.material3.ExposedDropdownMenuBox" "$FILE_PATH"
          add_import_if_missing "import androidx.compose.material3.ExposedDropdownMenuDefaults" "$FILE_PATH"

          # 2. Remove any accidental duplicate imports that a previous run may
          #    have inserted after every import line.
          awk '!seen[$0]++ || !/^import /' "$FILE_PATH" > "$FILE_PATH.tmp" && mv "$FILE_PATH.tmp" "$FILE_PATH"

          # 3. Fix the Modifier syntax chains (Lines 440/445)
          sed -i 's/Modifier.weight(1f).height(48.dp)/Modifier.weight(1f)\n                    .height(48.dp)/g' "$FILE_PATH"

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/

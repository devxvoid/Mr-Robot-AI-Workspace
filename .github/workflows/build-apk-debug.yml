name: Build APK Debug Logs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build With Full Error Logs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile Kotlin only
        shell: bash
        run: |
          set +e
          ./gradlew :app:compileDebugKotlin --stacktrace --debug > kotlin-debug-log.txt 2>&1
          code=$?
          cat kotlin-debug-log.txt
          exit $code

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          ./gradlew clean assembleDebug --stacktrace --debug > build-debug-log.txt 2>&1
          code=$?
          cat build-debug-log.txt
          exit $code

      - name: Upload debug logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-debug-logs
          path: |
            kotlin-debug-log.txt
            build-debug-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mr-robot-ai-workspace-debug-apk
          path: app/build/outputs/apk/debug/*.apk
name: Build APK Debug Logs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show project structure
        run: |
          echo "==== PROJECT FILES ===="
          find . -maxdepth 4 -type f | sort

      - name: Compile Kotlin
        shell: bash
        run: |
          set +e
          ./gradlew :app:compileDebugKotlin --stacktrace > kotlin-log.txt 2>&1
          code=$?
          cat kotlin-log.txt
          exit $code

      - name: Build APK
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace > build-log.txt 2>&1
          code=$?

          cat build-log.txt

          echo "==== APK SEARCH ===="
          find . -type f -name "*.apk"

          exit $code

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            kotlin-log.txt
            build-log.txt

      - name: Upload Any APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-apks
          path: |
            **/*.apk
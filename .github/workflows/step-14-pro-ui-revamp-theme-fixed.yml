name: Step 14 Pro UI Revamp Theme Fixed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revamp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Apply Step 14 Pro UI Revamp with working theme
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/ui/theme"
          mkdir -p "$ROOT/ui/components"
          mkdir -p "$ROOT/navigation"
          mkdir -p "$ROOT/ui/screens"

          cat > "$ROOT/ui/theme/Theme.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.theme

          import androidx.compose.foundation.isSystemInDarkTheme
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color
          import com.mrrobot.aiworkspace.data.AppThemeMode

          val MrGreen = Color(0xFF00FF88)
          val MrCyan = Color(0xFF00D4FF)
          val MrPurple = Color(0xFF8B5CF6)
          val MrRed = Color(0xFFFF3366)
          val MrAmber = Color(0xFFFFB800)

          private val DarkScheme = darkColorScheme(
              primary = MrGreen,
              secondary = MrCyan,
              tertiary = MrPurple,
              background = Color(0xFF0A0A0F),
              surface = Color(0xFF111118),
              surfaceVariant = Color(0xFF16161F),
              onPrimary = Color(0xFF020617),
              onSecondary = Color(0xFF020617),
              onTertiary = Color.White,
              onBackground = Color(0xFFE8E8F0),
              onSurface = Color(0xFFE8E8F0),
              onSurfaceVariant = Color(0xFF9CA3AF),
              error = MrRed,
              onError = Color.White
          )

          private val LightScheme = lightColorScheme(
              primary = Color(0xFF00A050),
              secondary = Color(0xFF0077AA),
              tertiary = Color(0xFF6D28D9),
              background = Color(0xFFF5F7FB),
              surface = Color(0xFFFFFFFF),
              surfaceVariant = Color(0xFFE9EEF7),
              onPrimary = Color.White,
              onSecondary = Color.White,
              onTertiary = Color.White,
              onBackground = Color(0xFF0A0A0F),
              onSurface = Color(0xFF111827),
              onSurfaceVariant = Color(0xFF475569),
              error = Color(0xFFD21F4A),
              onError = Color.White
          )

          @Composable
          fun MrRobotTheme(
              themeMode: AppThemeMode = AppThemeMode.Auto,
              content: @Composable () -> Unit
          ) {
              val darkTheme = when (themeMode) {
                  AppThemeMode.Auto -> isSystemInDarkTheme()
                  AppThemeMode.Dark -> true
                  AppThemeMode.Light -> false
              }

              MaterialTheme(
                  colorScheme = if (darkTheme) DarkScheme else LightScheme,
                  content = content
              )
          }
          EOF

          cat > "$ROOT/ui/components/UiComponents.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.components

          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.background
          import androidx.compose.foundation.border
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.alpha
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          val NeonGreen = Color(0xFF00FF88)
          val NeonCyan = Color(0xFF00D4FF)
          val NeonPurple = Color(0xFF8B5CF6)
          val Danger = Color(0xFFFF3366)
          val Amber = Color(0xFFFFB800)

          @Composable
          fun ScreenShell(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              val scheme = MaterialTheme.colorScheme

              Box(
                  modifier = modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  scheme.background,
                                  scheme.surface,
                                  scheme.surfaceVariant.copy(alpha = 0.94f)
                              )
                          )
                      )
              ) {
                  AmbientGlow()

                  Column(
                      modifier = Modifier
                          .fillMaxSize()
                          .padding(horizontal = 16.dp, vertical = 14.dp),
                      verticalArrangement = Arrangement.spacedBy(12.dp),
                      content = content
                  )
              }
          }

          @Composable
          fun AmbientGlow() {
              Box(Modifier.fillMaxSize()) {
                  Box(
                      modifier = Modifier
                          .size(220.dp)
                          .offset(x = (-100).dp, y = 40.dp)
                          .alpha(0.16f)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(NeonGreen.copy(alpha = 0.34f), Color.Transparent)
                              )
                          )
                  )

                  Box(
                      modifier = Modifier
                          .size(300.dp)
                          .align(Alignment.BottomEnd)
                          .offset(x = 120.dp, y = 80.dp)
                          .alpha(0.14f)
                          .clip(CircleShape)
                          .background(
                              Brush.radialGradient(
                                  listOf(NeonCyan.copy(alpha = 0.30f), Color.Transparent)
                              )
                          )
                  )
              }
          }

          @Composable
          fun GlassCard(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              val scheme = MaterialTheme.colorScheme

              Surface(
                  modifier = modifier
                      .fillMaxWidth()
                      .border(
                          width = 1.dp,
                          brush = Brush.horizontalGradient(
                              listOf(
                                  scheme.primary.copy(alpha = .42f),
                                  scheme.secondary.copy(alpha = .28f),
                                  NeonPurple.copy(alpha = .20f)
                              )
                          ),
                          shape = RoundedCornerShape(22.dp)
                      ),
                  shape = RoundedCornerShape(22.dp),
                  color = scheme.surface.copy(alpha = .92f),
                  tonalElevation = 2.dp
              ) {
                  Column(
                      modifier = Modifier.padding(16.dp),
                      verticalArrangement = Arrangement.spacedBy(10.dp),
                      content = content
                  )
              }
          }

          @Composable
          fun PageTitle(text: String) {
              Text(
                  text = text,
                  color = MaterialTheme.colorScheme.onBackground,
                  fontSize = 32.sp,
                  lineHeight = 38.sp,
                  fontWeight = FontWeight.ExtraBold
              )
          }

          @Composable
          fun Title(
              text: String,
              modifier: Modifier = Modifier
          ) {
              Text(
                  text = text,
                  modifier = modifier,
                  color = MaterialTheme.colorScheme.onSurface,
                  fontSize = 23.sp,
                  lineHeight = 29.sp,
                  fontWeight = FontWeight.Bold,
                  maxLines = 2,
                  overflow = TextOverflow.Ellipsis
              )
          }

          @Composable
          fun Subtitle(
              text: String,
              modifier: Modifier = Modifier
          ) {
              Text(
                  text = text,
                  modifier = modifier,
                  color = MaterialTheme.colorScheme.onSurfaceVariant,
                  fontSize = 14.sp,
                  lineHeight = 21.sp
              )
          }

          @Composable
          fun SoftText(
              text: String,
              modifier: Modifier = Modifier
          ) {
              Text(
                  text = text,
                  modifier = modifier,
                  color = MaterialTheme.colorScheme.onSurfaceVariant,
                  fontSize = 14.sp,
                  lineHeight = 21.sp
              )
          }

          @Composable
          fun StatusPill(
              text: String,
              color: Color? = null,
              modifier: Modifier = Modifier
          ) {
              val resolved = color ?: MaterialTheme.colorScheme.primary

              Surface(
                  modifier = modifier,
                  color = resolved.copy(alpha = .13f),
                  border = BorderStroke(1.dp, resolved.copy(alpha = .42f)),
                  shape = RoundedCornerShape(999.dp)
              ) {
                  Text(
                      text = text,
                      color = resolved,
                      fontSize = 12.sp,
                      fontWeight = FontWeight.Bold,
                      modifier = Modifier.padding(horizontal = 11.dp, vertical = 6.dp)
                  )
              }
          }

          @Composable
          fun PrimaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier,
              enabled: Boolean = true
          ) {
              Button(
                  onClick = onClick,
                  enabled = enabled,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(52.dp),
                  shape = RoundedCornerShape(15.dp),
                  colors = ButtonDefaults.buttonColors(
                      containerColor = MaterialTheme.colorScheme.primary,
                      contentColor = MaterialTheme.colorScheme.onPrimary
                  )
              ) {
                  Text(text, fontWeight = FontWeight.Bold)
              }
          }

          @Composable
          fun SecondaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier,
              enabled: Boolean = true
          ) {
              OutlinedButton(
                  onClick = onClick,
                  enabled = enabled,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(50.dp),
                  shape = RoundedCornerShape(15.dp),
                  border = BorderStroke(
                      1.dp,
                      MaterialTheme.colorScheme.primary.copy(alpha = .35f)
                  )
              ) {
                  Text(
                      text = text,
                      color = MaterialTheme.colorScheme.primary,
                      fontWeight = FontWeight.Medium
                  )
              }
          }

          @Composable
          fun Panel(
              title: String,
              subtitle: String? = null,
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit = {}
          ) {
              GlassCard(modifier = modifier) {
                  Title(title)
                  subtitle?.let { Subtitle(it) }
                  content()
              }
          }
          EOF

          cat > "$ROOT/MainActivity.kt" <<'EOF'
          package com.mrrobot.aiworkspace

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import com.mrrobot.aiworkspace.data.AppSettings
          import com.mrrobot.aiworkspace.data.SettingsStore
          import com.mrrobot.aiworkspace.ui.layout.MainWorkspaceShell
          import com.mrrobot.aiworkspace.ui.theme.MrRobotTheme

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val settingsStore = SettingsStore(applicationContext)

                  setContent {
                      val settings by settingsStore.settingsFlow.collectAsState(
                          initial = AppSettings()
                      )

                      MrRobotTheme(themeMode = settings.themeMode) {
                          MainWorkspaceShell()
                      }
                  }
              }
          }
          EOF

          cat > "$ROOT/ui/screens/SettingsScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.AppThemeMode
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.SettingsViewModel

          @Composable
          fun SettingsScreen(
              viewModel: SettingsViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()

              ScreenShell {
                  LazyColumn(
                      modifier = Modifier.fillMaxSize(),
                      contentPadding = PaddingValues(bottom = 24.dp),
                      verticalArrangement = Arrangement.spacedBy(14.dp)
                  ) {
                      item {
                          PageTitle("Settings")
                          Subtitle("Configure OpenRouter, model, and workspace appearance.")
                      }

                      item {
                          Panel(
                              title = "Theme Engine",
                              subtitle = "Auto follows your device theme. Dark and Light override it."
                          ) {
                              Row(
                                  modifier = Modifier.fillMaxWidth(),
                                  horizontalArrangement = Arrangement.spacedBy(8.dp)
                              ) {
                                  AppThemeMode.values().forEach { mode ->
                                      FilterChip(
                                          selected = state.themeMode == mode,
                                          onClick = {
                                              viewModel.updateThemeMode(mode)
                                          },
                                          label = {
                                              Text(mode.name)
                                          },
                                          modifier = Modifier.weight(1f)
                                      )
                                  }
                              }

                              Spacer(modifier = Modifier.height(4.dp))

                              StatusPill(
                                  text = "CURRENT: ${state.themeMode.name}"
                              )
                          }
                      }

                      item {
                          Panel(
                              title = "OpenRouter",
                              subtitle = "API key and model are saved with DataStore."
                          ) {
                              OutlinedTextField(
                                  value = state.apiKey,
                                  onValueChange = viewModel::updateApiKey,
                                  modifier = Modifier.fillMaxWidth(),
                                  label = { Text("API Key") },
                                  singleLine = true
                              )

                              Spacer(modifier = Modifier.height(10.dp))

                              OutlinedTextField(
                                  value = state.model,
                                  onValueChange = viewModel::updateModel,
                                  modifier = Modifier.fillMaxWidth(),
                                  label = { Text("Model") },
                                  singleLine = true
                              )

                              Spacer(modifier = Modifier.height(12.dp))

                              PrimaryButton(
                                  text = "Save Settings",
                                  onClick = {
                                      viewModel.save()
                                  }
                              )

                              Spacer(modifier = Modifier.height(8.dp))

                              SecondaryButton(
                                  text = "Clear Settings",
                                  onClick = {
                                      viewModel.clear()
                                  }
                              )

                              if (state.savedMessage.isNotBlank()) {
                                  Spacer(modifier = Modifier.height(8.dp))
                                  Subtitle(state.savedMessage)
                              }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Commit Step 14 theme-fixed revamp
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Step 14 pro UI revamp with working theme engine"

          git pull --rebase origin main

          git push origin main
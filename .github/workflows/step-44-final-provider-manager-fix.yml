                          ExposedDropdownMenuDefaults.TrailingIcon(expanded = expanded)
                      },
                      modifier = Modifier
                          .menuAnchor()
                          .fillMaxWidth()
                  )

                  ExposedDropdownMenu(
                      expanded = expanded,
                      onDismissRequest = { expanded = false }
                  ) {
                      ApiProvider.values().forEach { provider ->
                          DropdownMenuItem(
                              text = { Text(provider.displayName) },
                              onClick = {
                                  onSelected(provider)
                                  expanded = false
                              }
                          )
                      }
                  }
              }
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          private fun ModelDropdown(
              selectedProvider: ApiProvider,
              selectedModel: String,
              onSelected: (String) -> Unit
          ) {
              var expanded by remember { mutableStateOf(false) }
              val models = AiModels.byProvider(selectedProvider)
              val selected = models.firstOrNull { it.id == selectedModel }
                  ?: AiModels.defaultForProvider(selectedProvider)

              ExposedDropdownMenuBox(
                  expanded = expanded,
                  onExpandedChange = { expanded = !expanded }
              ) {
                  OutlinedTextField(
                      value = selected.name,
                      onValueChange = {},
                      readOnly = true,
                      label = { Text("Model") },
                      trailingIcon = {
                          ExposedDropdownMenuDefaults.TrailingIcon(expanded = expanded)
                      },
                      modifier = Modifier
                          .menuAnchor()
                          .fillMaxWidth()
                  )

                  ExposedDropdownMenu(
                      expanded = expanded,
                      onDismissRequest = { expanded = false }
                  ) {
                      models.forEach { model ->
                          DropdownMenuItem(
                              text = {
                                  Column {
                                      Text(model.name)
                                      Text(
                                          text = model.id,
                                          color = MaterialTheme.colorScheme.onSurfaceVariant,
                                          fontSize = 12.sp
                                      )
                                  }
                              },
                              onClick = {
                                  onSelected(model.id)
                                  expanded = false
                              }
                          )
                      }
                  }
              }
          }

          @Composable
          private fun ThemeSelectorCard(
              selected: AppThemeMode,
              onSelected: (AppThemeMode) -> Unit
          ) {
              Column(modifier = Modifier.fillMaxWidth()) {
                  Title("Theme")

                  Spacer(Modifier.height(6.dp))

                  Subtitle("Choose the app appearance and design mode.")

                  Spacer(Modifier.height(14.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      ThemeTile("Auto", AppThemeMode.Auto, selected, R.drawable.ic_lucide_sun_moon_exact, onSelected, Modifier.weight(1f))
                      ThemeTile("Light", AppThemeMode.Light, selected, R.drawable.ic_lucide_sun, onSelected, Modifier.weight(1f))
                      ThemeTile("Dark", AppThemeMode.Dark, selected, R.drawable.ic_lucide_moon, onSelected, Modifier.weight(1f))
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      ThemeTile("Cyber", AppThemeMode.Cyberpunk, selected, R.drawable.ic_lucide_cpu, onSelected, Modifier.weight(1f))
                      ThemeTile("Hacker", AppThemeMode.Hacker, selected, R.drawable.ic_lucide_terminal_square, onSelected, Modifier.weight(1f))
                  }
              }
          }

          @Composable
          private fun ThemeTile(
              title: String,
              mode: AppThemeMode,
              selected: AppThemeMode,
              @DrawableRes iconRes: Int,
              onSelected: (AppThemeMode) -> Unit,
              modifier: Modifier = Modifier
          ) {
              val isSelected = selected == mode

              Surface(
                  modifier = modifier.clickable { onSelected(mode) },
                  color = if (isSelected) {
                      MaterialTheme.colorScheme.primary.copy(alpha = 0.14f)
                  } else {
                      MaterialTheme.colorScheme.surface.copy(alpha = 0.76f)
                  },
                  border = BorderStroke(
                      1.dp,
                      if (isSelected) {
                          MaterialTheme.colorScheme.primary
                      } else {
                          MaterialTheme.colorScheme.outline.copy(alpha = 0.45f)
                      }
                  ),
                  shape = MaterialTheme.shapes.large
              ) {
                  Column(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(vertical = 16.dp, horizontal = 8.dp),
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      Icon(
                          painter = painterResource(id = iconRes),
                          contentDescription = title,
                          tint = if (isSelected) {
                              MaterialTheme.colorScheme.primary
                          } else {
                              MaterialTheme.colorScheme.onSurfaceVariant
                          },
                          modifier = Modifier.size(26.dp)
                      )

                      Text(
                          text = title,
                          color = if (isSelected) {
                              MaterialTheme.colorScheme.primary
                          } else {
                              MaterialTheme.colorScheme.onSurface
                          },
                          fontWeight = FontWeight.Bold,
                          fontSize = 13.sp,
                          maxLines = 1
                      )
                  }
              }
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("app/src/main/AndroidManifest.xml")

          if manifest.exists():
              text = manifest.read_text()
              if "android.permission.INTERNET" not in text:
                  text = text.replace(
                      "<manifest",
                      "<manifest",
                      1
                  )
                  text = text.replace(
                      ">",
                      ">\n    <uses-permission android:name=\"android.permission.INTERNET\" />",
                      1
                  )
                  manifest.write_text(text)
          PY

          cat > "docs/settings/STEP_44_FINAL_PROVIDER_MANAGER_FIX.md" <<'EOF'
          # Step 44 Final Provider Manager Fix

          This step fixes the provider manager behavior.

          ## Correct behavior

          - If no API key is saved, Settings shows `No active model`.
          - OpenRouter no longer appears as active by default without a key.
          - Saved keys appear only under `Your Keys`.
          - `Save` stores a provider key without activating it.
          - `Save & Activate` stores the key and makes that provider/model active.
          - Chat routing can use the active provider, model, and API key through ProviderChatClient.

          ## Providers

          - OpenRouter
          - OpenAI
          - Anthropic Claude
          - Google Gemini
          - Groq
          - Mistral
          - DeepSeek
          - xAI Grok
          EOF


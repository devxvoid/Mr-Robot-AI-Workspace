name: Step 23 Add Chat Attachments

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Plus Button Attachments To AI Chat
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Add chat image and file attachment support
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/viewmodel/ChatViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import android.app.Application
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.mrrobot.aiworkspace.data.ChatMessage
          import com.mrrobot.aiworkspace.data.ChatRepository
          import com.mrrobot.aiworkspace.data.SettingsStore
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow
          import kotlinx.coroutines.launch

          data class ChatAttachment(
              val id: Long = System.nanoTime(),
              val uri: String,
              val name: String,
              val mimeType: String,
              val sizeLabel: String = ""
          )

          data class ChatUiMessage(
              val id: Long = System.nanoTime(),
              val role: String,
              val content: String,
              val modelContent: String = content,
              val attachments: List<ChatAttachment> = emptyList()
          )

          data class ChatUiState(
              val input: String = "",
              val messages: List<ChatUiMessage> = listOf(
                  ChatUiMessage(
                      role = "assistant",
                      content = "Welcome to Mr. Robot AI Workspace. I can help you plan Android features, debug Gradle errors, improve Compose UI, create GitHub Actions, and turn your app into a polished product."
                  )
              ),
              val selectedAttachments: List<ChatAttachment> = emptyList(),
              val apiKey: String = "",
              val model: String = "openai/gpt-4o-mini",
              val isLoading: Boolean = false,
              val error: String = "",
              val lastUserPrompt: String = "",
              val lastAttachments: List<ChatAttachment> = emptyList()
          )

          class ChatViewModel(application: Application) : AndroidViewModel(application) {

              private val settingsStore = SettingsStore(application.applicationContext)
              private val repository = ChatRepository()
              private var activeJob: Job? = null

              private val _uiState = MutableStateFlow(ChatUiState())
              val uiState: StateFlow<ChatUiState> = _uiState.asStateFlow()

              init {
                  viewModelScope.launch {
                      settingsStore.settingsFlow.collect { settings ->
                          _uiState.value = _uiState.value.copy(
                              apiKey = settings.apiKey,
                              model = settings.model
                          )
                      }
                  }
              }

              fun updateInput(value: String) {
                  _uiState.value = _uiState.value.copy(
                      input = value,
                      error = ""
                  )
              }

              fun useSuggestion(prompt: String) {
                  _uiState.value = _uiState.value.copy(
                      input = prompt,
                      error = ""
                  )
              }

              fun addAttachments(attachments: List<ChatAttachment>) {
                  if (attachments.isEmpty()) return

                  val current = _uiState.value
                  val merged = (current.selectedAttachments + attachments)
                      .distinctBy { it.uri }
                      .take(8)

                  _uiState.value = current.copy(
                      selectedAttachments = merged,
                      error = ""
                  )
              }

              fun removeAttachment(id: Long) {
                  val current = _uiState.value

                  _uiState.value = current.copy(
                      selectedAttachments = current.selectedAttachments.filterNot { it.id == id },
                      error = ""
                  )
              }

              fun clearAttachments() {
                  _uiState.value = _uiState.value.copy(
                      selectedAttachments = emptyList(),
                      error = ""
                  )
              }

              fun send() {
                  val current = _uiState.value
                  val prompt = current.input.trim()

                  if (prompt.isBlank() || current.isLoading) return

                  sendPrompt(
                      prompt = prompt,
                      attachments = current.selectedAttachments,
                      appendUserMessage = true
                  )
              }

              fun retryLast() {
                  val current = _uiState.value

                  if (current.lastUserPrompt.isBlank() || current.isLoading) return

                  _uiState.value = current.copy(error = "")

                  sendPrompt(
                      prompt = current.lastUserPrompt,
                      attachments = current.lastAttachments,
                      appendUserMessage = false
                  )
              }

              fun regenerateLastAnswer() {
                  val current = _uiState.value

                  if (current.isLoading) return

                  val lastUserMessage = current.messages.lastOrNull { it.role == "user" }
                      ?: return

                  val trimmedMessages = current.messages.dropLastWhile {
                      it.role == "assistant"
                  }

                  _uiState.value = current.copy(
                      messages = trimmedMessages,
                      error = "",
                      lastUserPrompt = lastUserMessage.content,
                      lastAttachments = lastUserMessage.attachments
                  )

                  sendPrompt(
                      prompt = lastUserMessage.content,
                      attachments = lastUserMessage.attachments,
                      appendUserMessage = false
                  )
              }

              fun stopGeneration() {
                  activeJob?.cancel()
                  activeJob = null

                  _uiState.value = _uiState.value.copy(
                      isLoading = false,
                      error = "Generation stopped."
                  )
              }

              fun clearChat() {
                  activeJob?.cancel()
                  activeJob = null

                  _uiState.value = _uiState.value.copy(
                      input = "",
                      messages = listOf(
                          ChatUiMessage(
                              role = "assistant",
                              content = "Chat cleared. Mr. Robot is ready for the next task."
                          )
                      ),
                      selectedAttachments = emptyList(),
                      isLoading = false,
                      error = "",
                      lastUserPrompt = "",
                      lastAttachments = emptyList()
                  )
              }

              private fun sendPrompt(
                  prompt: String,
                  attachments: List<ChatAttachment>,
                  appendUserMessage: Boolean
              ) {
                  val current = _uiState.value

                  if (current.apiKey.isBlank()) {
                      _uiState.value = current.copy(
                          error = "OpenRouter API key is missing. Open Settings, paste your key, then save settings.",
                          lastUserPrompt = prompt,
                          lastAttachments = attachments
                      )
                      return
                  }

                  val modelContent = prompt + buildAttachmentContext(attachments)

                  val updatedMessages = if (appendUserMessage) {
                      current.messages + ChatUiMessage(
                          role = "user",
                          content = prompt,
                          modelContent = modelContent,
                          attachments = attachments
                      )
                  } else {
                      current.messages
                  }

                  _uiState.value = current.copy(
                      input = "",
                      selectedAttachments = if (appendUserMessage) emptyList() else current.selectedAttachments,
                      messages = updatedMessages,
                      isLoading = true,
                      error = "",
                      lastUserPrompt = prompt,
                      lastAttachments = attachments
                  )

                  activeJob = viewModelScope.launch {
                      val requestMessages = _uiState.value.messages
                          .filter { it.role == "user" || it.role == "assistant" }
                          .takeLast(12)
                          .map {
                              ChatMessage(
                                  role = it.role,
                                  content = it.modelContent
                              )
                          }

                      val result = repository.sendMessage(
                          apiKey = _uiState.value.apiKey,
                          model = _uiState.value.model,
                          messages = requestMessages
                      )

                      result
                          .onSuccess { reply ->
                              _uiState.value = _uiState.value.copy(
                                  messages = _uiState.value.messages + ChatUiMessage(
                                      role = "assistant",
                                      content = reply
                                  ),
                                  isLoading = false,
                                  error = ""
                              )
                          }
                          .onFailure { throwable ->
                              _uiState.value = _uiState.value.copy(
                                  isLoading = false,
                                  error = throwable.message ?: "Unknown chat error"
                              )
                          }
                  }
              }

              private fun buildAttachmentContext(
                  attachments: List<ChatAttachment>
              ): String {
                  if (attachments.isEmpty()) return ""

                  val attachmentLines = attachments.joinToString(separator = "\n") { attachment ->
                      "- ${attachment.name} (${attachment.mimeType}${if (attachment.sizeLabel.isNotBlank()) ", ${attachment.sizeLabel}" else ""})"
                  }

                  return """

                  Attached files selected in the app:
                  $attachmentLines

                  Note: This MVP currently sends attachment metadata to the assistant. For full file/image understanding, add a parser or multimodal image upload pipeline in the next upgrade.
                  """.trimIndent().prependIndent("\n\n")
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/ChatScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import android.content.Context
          import android.content.Intent
          import android.net.Uri
          import android.provider.OpenableColumns
          import androidx.activity.compose.rememberLauncherForActivityResult
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.horizontalScroll
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.lazy.rememberLazyListState
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.LaunchedEffect
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.rememberCoroutineScope
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.platform.LocalClipboardManager
          import androidx.compose.ui.platform.LocalContext
          import androidx.compose.ui.text.AnnotatedString
          import androidx.compose.ui.text.font.FontFamily
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.ui.components.GlassCard
          import com.mrrobot.aiworkspace.ui.components.ScreenShell
          import com.mrrobot.aiworkspace.ui.components.Subtitle
          import com.mrrobot.aiworkspace.ui.components.Title
          import com.mrrobot.aiworkspace.viewmodel.ChatAttachment
          import com.mrrobot.aiworkspace.viewmodel.ChatUiMessage
          import com.mrrobot.aiworkspace.viewmodel.ChatViewModel
          import kotlinx.coroutines.launch

          private val PromptSuggestions = listOf(
              "Improve my Android app UI professionally",
              "Fix this Gradle build error",
              "Create a GitHub Actions APK workflow",
              "Review my Jetpack Compose screen",
              "Plan the next MVP features"
          )

          @Composable
          fun ChatScreen(
              viewModel: ChatViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()
              val listState = rememberLazyListState()
              val scope = rememberCoroutineScope()
              val context = LocalContext.current

              val attachmentLauncher = rememberLauncherForActivityResult(
                  contract = ActivityResultContracts.OpenMultipleDocuments()
              ) { uris ->
                  uris.forEach { uri ->
                      runCatching {
                          context.contentResolver.takePersistableUriPermission(
                              uri,
                              Intent.FLAG_GRANT_READ_URI_PERMISSION
                          )
                      }
                  }

                  val attachments = uris.map { uri ->
                      buildChatAttachment(
                          context = context,
                          uri = uri
                      )
                  }

                  viewModel.addAttachments(attachments)
              }

              LaunchedEffect(state.messages.size, state.isLoading) {
                  if (state.messages.isNotEmpty()) {
                      scope.launch {
                          listState.animateScrollToItem(state.messages.lastIndex)
                      }
                  }
              }

              ScreenShell {
                  LazyColumn(
                      state = listState,
                      modifier = Modifier
                          .fillMaxSize()
                          .weight(1f),
                      contentPadding = PaddingValues(bottom = 14.dp),
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      item {
                          ChatHeader(
                              model = state.model,
                              apiKeyConfigured = state.apiKey.isNotBlank(),
                              attachmentCount = state.selectedAttachments.size,
                              messageCount = state.messages.count { it.role == "user" },
                              onClear = { viewModel.clearChat() }
                          )
                      }

                      item {
                          PromptSuggestionRow(
                              onSuggestionClick = viewModel::useSuggestion
                          )
                      }

                      items(
                          items = state.messages,
                          key = { it.id }
                      ) { message ->
                          ChatBubble(message = message)
                      }

                      if (state.isLoading) {
                          item {
                              ThinkingBubble()
                          }
                      }
                  }

                  if (state.error.isNotBlank()) {
                      ErrorPanel(
                          message = state.error,
                          onRetry = { viewModel.retryLast() }
                      )

                      Spacer(Modifier.height(10.dp))
                  }

                  PromptInputPanel(
                      input = state.input,
                      selectedAttachments = state.selectedAttachments,
                      isLoading = state.isLoading,
                      canRegenerate = state.messages.any { it.role == "user" },
                      onInputChange = viewModel::updateInput,
                      onAddAttachment = {
                          attachmentLauncher.launch(arrayOf("*/*"))
                      },
                      onRemoveAttachment = viewModel::removeAttachment,
                      onSend = { viewModel.send() },
                      onStop = { viewModel.stopGeneration() },
                      onRegenerate = { viewModel.regenerateLastAnswer() }
                  )
              }
          }

          @Composable
          private fun ChatHeader(
              model: String,
              apiKeyConfigured: Boolean,
              attachmentCount: Int,
              messageCount: Int,
              onClear: () -> Unit
          ) {
              Column {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.Top
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Text(
                              text = "AI Chat",
                              color = MaterialTheme.colorScheme.onBackground,
                              fontSize = 32.sp,
                              fontWeight = FontWeight.ExtraBold
                          )

                          Spacer(Modifier.height(4.dp))

                          Text(
                              text = "Ask, attach files, generate fixes, and coordinate Android development work.",
                              color = MaterialTheme.colorScheme.onSurfaceVariant,
                              fontSize = 14.sp,
                              lineHeight = 20.sp
                          )
                      }

                      Text(
                          text = "Clear",
                          color = MaterialTheme.colorScheme.primary,
                          fontWeight = FontWeight.Bold,
                          modifier = Modifier.clickable { onClear() }
                      )
                  }

                  Spacer(Modifier.height(14.dp))

                  GlassCard {
                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.SpaceBetween,
                          verticalAlignment = Alignment.CenterVertically
                      ) {
                          Column(modifier = Modifier.weight(1f)) {
                              Text(
                                  text = "Assistant Status",
                                  color = MaterialTheme.colorScheme.onSurface,
                                  fontWeight = FontWeight.Bold
                              )

                              Spacer(Modifier.height(6.dp))

                              Text(
                                  text = if (apiKeyConfigured) {
                                      "OpenRouter connected and ready"
                                  } else {
                                      "OpenRouter key required in Settings"
                                  },
                                  color = MaterialTheme.colorScheme.onSurfaceVariant
                              )
                          }

                          StatusBadge(
                              text = if (apiKeyConfigured) "ONLINE" else "SETUP",
                              active = apiKeyConfigured
                          )
                      }

                      Spacer(Modifier.height(12.dp))

                      HorizontalDivider(
                          color = MaterialTheme.colorScheme.primary.copy(alpha = 0.12f)
                      )

                      Spacer(Modifier.height(12.dp))

                      MetadataRow("Model", model)
                      MetadataRow("User messages", messageCount.toString())
                      MetadataRow("Queued attachments", attachmentCount.toString())
                  }
              }
          }

          @Composable
          private fun PromptSuggestionRow(
              onSuggestionClick: (String) -> Unit
          ) {
              Column {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Title("Prompt Starters")
                      Subtitle("Tap one")
                  }

                  Spacer(Modifier.height(8.dp))

                  Row(
                      modifier = Modifier
                          .fillMaxWidth()
                          .horizontalScroll(rememberScrollState()),
                      horizontalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      PromptSuggestions.forEach { prompt ->
                          AssistChip(
                              onClick = { onSuggestionClick(prompt) },
                              label = {
                                  Text(prompt)
                              }
                          )
                      }
                  }
              }
          }

          @Composable
          private fun ChatBubble(
              message: ChatUiMessage
          ) {
              val clipboard = LocalClipboardManager.current
              val isUser = message.role == "user"

              Row(
                  modifier = Modifier.fillMaxWidth(),
                  horizontalArrangement = if (isUser) Arrangement.End else Arrangement.Start
              ) {
                  Surface(
                      modifier = Modifier.fillMaxWidth(if (isUser) 0.88f else 0.96f),
                      color = if (isUser) {
                          MaterialTheme.colorScheme.primary.copy(alpha = 0.14f)
                      } else {
                          MaterialTheme.colorScheme.surface.copy(alpha = 0.98f)
                      },
                      border = BorderStroke(
                          width = 1.dp,
                          color = if (isUser) {
                              MaterialTheme.colorScheme.primary.copy(alpha = 0.30f)
                          } else {
                              MaterialTheme.colorScheme.secondary.copy(alpha = 0.20f)
                          }
                      ),
                      shape = RoundedCornerShape(
                          topStart = 24.dp,
                          topEnd = 24.dp,
                          bottomStart = if (isUser) 24.dp else 6.dp,
                          bottomEnd = if (isUser) 6.dp else 24.dp
                      )
                  ) {
                      Column(
                          modifier = Modifier.padding(16.dp)
                      ) {
                          Row(
                              modifier = Modifier.fillMaxWidth(),
                              horizontalArrangement = Arrangement.SpaceBetween,
                              verticalAlignment = Alignment.CenterVertically
                          ) {
                              Text(
                                  text = if (isUser) "You" else "Mr. Robot",
                                  color = if (isUser) {
                                      MaterialTheme.colorScheme.primary
                                  } else {
                                      MaterialTheme.colorScheme.secondary
                                  },
                                  fontWeight = FontWeight.Bold
                              )

                              Text(
                                  text = "Copy",
                                  color = MaterialTheme.colorScheme.onSurfaceVariant,
                                  fontWeight = FontWeight.SemiBold,
                                  modifier = Modifier.clickable {
                                      clipboard.setText(
                                          AnnotatedString(message.content)
                                      )
                                  }
                              )
                          }

                          Spacer(Modifier.height(10.dp))

                          MessageText(
                              content = message.content,
                              textColor = MaterialTheme.colorScheme.onSurface
                          )

                          if (message.attachments.isNotEmpty()) {
                              Spacer(Modifier.height(12.dp))

                              AttachmentTray(
                                  attachments = message.attachments,
                                  removable = false,
                                  onRemove = {}
                              )
                          }
                      }
                  }
              }
          }

          @Composable
          private fun MessageText(
              content: String,
              textColor: Color
          ) {
              val isCodeLike =
                  content.contains("```") ||
                      content.lines().any {
                          val line = it.trim()
                          line.startsWith("fun ") ||
                              line.startsWith("class ") ||
                              line.startsWith("val ") ||
                              line.startsWith("var ") ||
                              line.startsWith("import ") ||
                              line.startsWith("package ") ||
                              line.startsWith("plugins ") ||
                              line.startsWith("implementation(") ||
                              line.startsWith("android {") ||
                              line.startsWith("name:")
                      }

              Text(
                  text = content.replace("```", ""),
                  color = textColor,
                  fontFamily = if (isCodeLike) FontFamily.Monospace else FontFamily.Default,
                  fontSize = 16.sp,
                  lineHeight = 24.sp
              )
          }

          @Composable
          private fun ThinkingBubble() {
              Surface(
                  modifier = Modifier.fillMaxWidth(0.96f),
                  color = MaterialTheme.colorScheme.surface.copy(alpha = 0.98f),
                  border = BorderStroke(
                      width = 1.dp,
                      color = MaterialTheme.colorScheme.primary.copy(alpha = 0.20f)
                  ),
                  shape = RoundedCornerShape(
                      topStart = 24.dp,
                      topEnd = 24.dp,
                      bottomStart = 6.dp,
                      bottomEnd = 24.dp
                  )
              ) {
                  Row(
                      modifier = Modifier.padding(16.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      CircularProgressIndicator(
                          modifier = Modifier.size(18.dp),
                          strokeWidth = 2.dp,
                          color = MaterialTheme.colorScheme.primary
                      )

                      Spacer(Modifier.width(12.dp))

                      Text(
                          text = "Mr. Robot is thinking...",
                          color = MaterialTheme.colorScheme.onSurfaceVariant,
                          fontWeight = FontWeight.Medium
                      )
                  }
              }
          }

          @Composable
          private fun ErrorPanel(
              message: String,
              onRetry: () -> Unit
          ) {
              Card(
                  modifier = Modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(22.dp),
                  colors = CardDefaults.cardColors(
                      containerColor = MaterialTheme.colorScheme.errorContainer
                  )
              ) {
                  Column(
                      modifier = Modifier.padding(16.dp)
                  ) {
                      Text(
                          text = "Request failed",
                          color = MaterialTheme.colorScheme.onErrorContainer,
                          fontWeight = FontWeight.Bold
                      )

                      Spacer(Modifier.height(6.dp))

                      Text(
                          text = message,
                          color = MaterialTheme.colorScheme.onErrorContainer
                      )

                      Spacer(Modifier.height(10.dp))

                      OutlinedButton(onClick = onRetry) {
                          Text("Retry last prompt")
                      }
                  }
              }
          }

          @Composable
          private fun PromptInputPanel(
              input: String,
              selectedAttachments: List<ChatAttachment>,
              isLoading: Boolean,
              canRegenerate: Boolean,
              onInputChange: (String) -> Unit,
              onAddAttachment: () -> Unit,
              onRemoveAttachment: (Long) -> Unit,
              onSend: () -> Unit,
              onStop: () -> Unit,
              onRegenerate: () -> Unit
          ) {
              Surface(
                  modifier = Modifier.fillMaxWidth(),
                  color = MaterialTheme.colorScheme.surface.copy(alpha = 0.96f),
                  shape = RoundedCornerShape(24.dp),
                  border = BorderStroke(
                      width = 1.dp,
                      color = MaterialTheme.colorScheme.primary.copy(alpha = 0.22f)
                  )
              ) {
                  Column(
                      modifier = Modifier.padding(12.dp)
                  ) {
                      if (selectedAttachments.isNotEmpty()) {
                          AttachmentTray(
                              attachments = selectedAttachments,
                              removable = true,
                              onRemove = onRemoveAttachment
                          )

                          Spacer(Modifier.height(10.dp))
                      }

                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.spacedBy(10.dp),
                          verticalAlignment = Alignment.Top
                      ) {
                          Surface(
                              modifier = Modifier
                                  .size(56.dp)
                                  .clickable { onAddAttachment() },
                              color = MaterialTheme.colorScheme.primary.copy(alpha = 0.12f),
                              border = BorderStroke(
                                  width = 1.dp,
                                  color = MaterialTheme.colorScheme.primary.copy(alpha = 0.35f)
                              ),
                              shape = RoundedCornerShape(18.dp)
                          ) {
                              Box(contentAlignment = Alignment.Center) {
                                  Text(
                                      text = "+",
                                      color = MaterialTheme.colorScheme.primary,
                                      fontSize = 30.sp,
                                      fontWeight = FontWeight.Bold
                                  )
                              }
                          }

                          OutlinedTextField(
                              value = input,
                              onValueChange = onInputChange,
                              placeholder = {
                                  Text("Ask Mr. Robot or attach files...")
                              },
                              modifier = Modifier.weight(1f),
                              minLines = 1,
                              maxLines = 5,
                              textStyle = MaterialTheme.typography.bodyLarge.copy(
                                  color = MaterialTheme.colorScheme.onSurface
                              )
                          )
                      }

                      Spacer(Modifier.height(10.dp))

                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.spacedBy(10.dp)
                      ) {
                          Button(
                              onClick = {
                                  if (isLoading) {
                                      onStop()
                                  } else {
                                      onSend()
                                  }
                              },
                              modifier = Modifier
                                  .weight(1f)
                                  .height(52.dp),
                              colors = ButtonDefaults.buttonColors(
                                  containerColor = if (isLoading) {
                                      MaterialTheme.colorScheme.tertiary
                                  } else {
                                      MaterialTheme.colorScheme.primary
                                  },
                                  contentColor = if (isLoading) {
                                      MaterialTheme.colorScheme.onTertiary
                                  } else {
                                      MaterialTheme.colorScheme.onPrimary
                                  }
                              ),
                              shape = RoundedCornerShape(18.dp)
                          ) {
                              Text(
                                  text = if (isLoading) "Stop" else "Send",
                                  fontWeight = FontWeight.Bold
                              )
                          }

                          OutlinedButton(
                              onClick = onRegenerate,
                              enabled = canRegenerate && !isLoading,
                              modifier = Modifier
                                  .weight(1f)
                                  .height(52.dp),
                              shape = RoundedCornerShape(18.dp)
                          ) {
                              Text("Regenerate")
                          }
                      }
                  }
              }
          }

          @Composable

name: Step 17 Final UI Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Apply final UI compile fixes
        shell: bash
        run: |
          set -euo pipefail

          COMPONENTS="app/src/main/java/com/mrrobot/aiworkspace/ui/components/UiComponents.kt"

          cat > "$COMPONENTS" <<'EOF'
          package com.mrrobot.aiworkspace.ui.components

          import androidx.compose.foundation.BorderStroke
          import androidx.compose.foundation.background
          import androidx.compose.foundation.border
          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          @Composable
          fun ScreenShell(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              Column(
                  modifier = modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  Color(0xFF020617),
                                  Color(0xFF071226),
                                  Color(0xFF020617)
                              )
                          )
                      )
                      .padding(20.dp),
                  content = content
              )
          }

          @Composable
          fun GlassCard(
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit
          ) {
              Column(
                  modifier = modifier
                      .fillMaxWidth()
                      .clip(RoundedCornerShape(28.dp))
                      .background(Color(0xAA0B1020))
                      .border(
                          BorderStroke(
                              1.dp,
                              Color(0xFF00D4FF).copy(alpha = 0.35f)
                          ),
                          RoundedCornerShape(28.dp)
                      )
                      .padding(20.dp),
                  verticalArrangement = Arrangement.spacedBy(12.dp),
                  content = content
              )
          }

          @Composable
          fun PageTitle(text: String) {
              Text(
                  text = text,
                  color = Color.White,
                  fontWeight = FontWeight.Bold,
                  fontSize = 36.sp,
                  lineHeight = 40.sp
              )
          }

          @Composable
          fun Subtitle(text: String) {
              Text(
                  text = text,
                  color = Color(0xFF94A3B8),
                  fontSize = 17.sp,
                  lineHeight = 25.sp
              )
          }

          @Composable
          fun SoftText(
              text: String,
              modifier: Modifier = Modifier
          ) {
              Text(
                  text = text,
                  modifier = modifier,
                  color = Color(0xFFCBD5E1),
                  fontSize = 15.sp,
                  lineHeight = 22.sp
              )
          }

          @Composable
          fun StatusPill(
              text: String,
              color: Color = Color(0xFF00D4FF)
          ) {
              Box(
                  modifier = Modifier
                      .clip(RoundedCornerShape(50))
                      .background(color.copy(alpha = 0.15f))
                      .border(
                          BorderStroke(1.dp, color.copy(alpha = 0.45f)),
                          RoundedCornerShape(50)
                      )
                      .padding(horizontal = 14.dp, vertical = 7.dp)
              ) {
                  Text(
                      text = text,
                      color = color,
                      fontSize = 12.sp,
                      fontWeight = FontWeight.SemiBold
                  )
              }
          }

          @Composable
          fun PrimaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              Button(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(58.dp),
                  shape = RoundedCornerShape(18.dp),
                  colors = ButtonDefaults.buttonColors(
                      containerColor = Color(0xFF06D6F9),
                      contentColor = Color.Black
                  )
              ) {
                  Text(
                      text = text,
                      fontWeight = FontWeight.Bold,
                      fontSize = 16.sp
                  )
              }
          }

          @Composable
          fun SecondaryButton(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              OutlinedButton(
                  onClick = onClick,
                  modifier = modifier
                      .fillMaxWidth()
                      .height(56.dp),
                  shape = RoundedCornerShape(18.dp),
                  border = BorderStroke(
                      1.dp,
                      Color.White.copy(alpha = .2f)
                  ),
                  colors = ButtonDefaults.outlinedButtonColors(
                      contentColor = Color(0xFF00D4FF)
                  )
              ) {
                  Text(
                      text = text,
                      fontWeight = FontWeight.Medium
                  )
              }
          }

          @Composable
          fun Panel(
              title: String,
              subtitle: String? = null,
              modifier: Modifier = Modifier,
              content: @Composable ColumnScope.() -> Unit = {}
          ) {
              GlassCard(modifier = modifier) {
                  Text(
                      text = title,
                      color = Color.White,
                      fontSize = 22.sp,
                      fontWeight = FontWeight.Bold,
                      maxLines = 1,
                      overflow = TextOverflow.Ellipsis
                  )

                  subtitle?.let {
                      SoftText(it)
                  }

                  content()
              }
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/screens")

          for file in root.glob("*.kt"):
              text = file.read_text()

              text = re.sub(
                  r'PrimaryButton\(\s*"([^"]+)"\s*\)\s*\{',
                  r'PrimaryButton(text = "\1", onClick = {',
                  text
              )

              text = re.sub(
                  r'SecondaryButton\(\s*"([^"]+)"\s*\)\s*\{',
                  r'SecondaryButton(text = "\1", onClick = {',
                  text
              )

              text = text.replace("})\n            }", "})")

              file.write_text(text)
          PY

      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Step 17 final UI compile fixes"

          git pull --rebase origin main

          git push origin main
name: Generate Android Project Structure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Android Compose project structure
        shell: bash
        run: |
          set -e

          mkdir -p app/src/main/java/com/mrrobot/aiworkspace
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Mr-Robot-AI-Workspace"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.mrrobot.aiworkspace"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.mrrobot.aiworkspace"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")
              implementation("androidx.compose.ui:ui:1.7.2")
              implementation("androidx.compose.ui:ui-tooling-preview:1.7.2")
              implementation("androidx.compose.material3:material3:1.3.0")
              implementation("androidx.navigation:navigation-compose:2.8.1")
              debugImplementation("androidx.compose.ui:ui-tooling:1.7.2")
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:theme="@style/Theme.MrRobot"
                  android:label="Mr. Robot AI">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="Theme.MrRobot" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt <<'EOF'
          package com.mrrobot.aiworkspace

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      MrRobotApp()
                  }
              }
          }

          @Composable
          fun MrRobotApp() {
              Box(
                  modifier = Modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  Color(0xFF05070A),
                                  Color(0xFF10131A),
                                  Color(0xFF111827)
                              )
                          )
                      ),
                  contentAlignment = Alignment.Center
              ) {
                  Card(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(24.dp),
                      shape = RoundedCornerShape(28.dp),
                      colors = CardDefaults.cardColors(
                          containerColor = Color(0xFF151A22)
                      )
                  ) {
                      Column(
                          modifier = Modifier.padding(28.dp),
                          horizontalAlignment = Alignment.Start
                      ) {
                          Text(
                              text = "Mr. Robot AI Workspace",
                              color = Color.White,
                              fontSize = 30.sp,
                              fontWeight = FontWeight.Bold
                          )

                          Spacer(modifier = Modifier.height(12.dp))

                          Text(
                              text = "Premium Android MVP generated from your Google Stitch design.",
                              color = Color(0xFFB8C0CC),
                              fontSize = 16.sp
                          )

                          Spacer(modifier = Modifier.height(24.dp))

                          Button(
                              onClick = {},
                              colors = ButtonDefaults.buttonColors(
                                  containerColor = Color(0xFF00E5FF),
                                  contentColor = Color.Black
                              )
                          ) {
                              Text("Launch Workspace")
                          }
                      }
                  }
              }
          }
          EOF

          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > gradlew <<'EOF'
          #!/usr/bin/env sh
          exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"
          EOF

          chmod +x gradlew

          cat > gradlew.bat <<'EOF'
          @echo off
          java -jar gradle\wrapper\gradle-wrapper.jar %*
          EOF

      - name: Commit generated Android project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Generate Android project structure" || echo "No changes to commit"
          git push

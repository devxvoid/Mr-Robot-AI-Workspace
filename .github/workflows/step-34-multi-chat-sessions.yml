name: Step 34 Multi Chat Sessions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sessions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Build stable multi-chat sessions
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/session"
          mkdir -p "$ROOT/viewmodel"
          mkdir -p "$ROOT/ui/chat"

          cat > "$ROOT/session/ChatSession.kt" <<'EOF'
          package com.mrrobot.aiworkspace.session

          import com.mrrobot.aiworkspace.data.ChatMessage
          import java.util.UUID

          data class ChatSession(
              val id: String = UUID.randomUUID().toString(),
              val title: String,
              val messages: List<ChatMessage> = emptyList()
          )
          EOF

          cat > "$ROOT/viewmodel/ChatViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import android.app.Application
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.setValue
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.mrrobot.aiworkspace.ai.OpenRouterRepository
          import com.mrrobot.aiworkspace.data.ChatMessage
          import com.mrrobot.aiworkspace.session.ChatSession
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.launch

          class ChatViewModel(
              application: Application
          ) : AndroidViewModel(application) {

              private val repository = OpenRouterRepository()

              var apiKey by mutableStateOf("")
              var selectedModel by mutableStateOf("openai/gpt-4o-mini")
              var input by mutableStateOf("")
              var loading by mutableStateOf(false)

              var sessions by mutableStateOf(
                  listOf(
                      ChatSession(
                          title = "Main Chat",
                          messages = listOf(
                              ChatMessage(
                                  role = "assistant",
                                  content = "Welcome to Mr. Robot AI Workspace."
                              )
                          )
                      )
                  )
              )

              var selectedSessionId by mutableStateOf(
                  sessions.first().id
              )

              val currentMessages: List<ChatMessage>
                  get() =
                      sessions
                          .firstOrNull { it.id == selectedSessionId }
                          ?.messages
                          ?: emptyList()

              fun createSession() {
                  val session = ChatSession(
                      title = "Chat ${sessions.size + 1}",
                      messages = listOf(
                          ChatMessage(
                              role = "assistant",
                              content = "New workspace chat created."
                          )
                      )
                  )

                  sessions = listOf(session) + sessions
                  selectedSessionId = session.id
              }

              fun switchSession(id: String) {
                  selectedSessionId = id
                  input = ""
              }

              fun deleteCurrentSession() {
                  if (sessions.size <= 1) return

                  sessions = sessions.filterNot {
                      it.id == selectedSessionId
                  }

                  selectedSessionId = sessions.first().id
              }

              fun clearCurrentChat() {
                  updateCurrentMessages(
                      listOf(
                          ChatMessage(
                              role = "assistant",
                              content = "Chat cleared. Mr. Robot is ready."
                          )
                      )
                  )
              }

              fun sendMessage() {
                  val prompt = input.trim()

                  if (prompt.isBlank() || loading) return

                  if (apiKey.isBlank()) {
                      appendMessage(
                          ChatMessage(
                              role = "assistant",
                              content = "Please enter your OpenRouter API key first."
                          )
                      )
                      return
                  }

                  appendMessage(
                      ChatMessage(
                          role = "user",
                          content = prompt
                      )
                  )

                  input = ""
                  loading = true

                  viewModelScope.launch {
                      val result = repository.sendMessage(
                          apiKey = apiKey,
                          model = selectedModel,
                          messages = currentMessages
                      )

                      loading = false

                      result.onSuccess { response ->
                          appendStreamingResponse(response)
                      }

                      result.onFailure { error ->
                          appendMessage(
                              ChatMessage(
                                  role = "assistant",
                                  content = "Error: ${error.message ?: "Unknown error"}"
                              )
                          )
                      }
                  }
              }

              private suspend fun appendStreamingResponse(response: String) {
                  appendMessage(
                      ChatMessage(
                          role = "assistant",
                          content = ""
                      )
                  )

                  var streamed = ""

                  response.forEach { char ->
                      delay(6)
                      streamed += char

                      val messages = currentMessages.toMutableList()

                      if (messages.isNotEmpty()) {
                          messages[messages.lastIndex] =
                              ChatMessage(
                                  role = "assistant",
                                  content = streamed
                              )
                          updateCurrentMessages(messages)
                      }
                  }
              }

              private fun appendMessage(message: ChatMessage) {
                  updateCurrentMessages(
                      currentMessages + message
                  )
              }

              private fun updateCurrentMessages(
                  messages: List<ChatMessage>
              ) {
                  sessions = sessions.map { session ->
                      if (session.id == selectedSessionId) {
                          session.copy(messages = messages)
                      } else {
                          session
                      }
                  }
              }
          }
          EOF

          cat > "$ROOT/ui/chat/ChatScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.chat

          import androidx.compose.foundation.background
          import androidx.compose.foundation.horizontalScroll
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.ai.OpenRouterModels
          import com.mrrobot.aiworkspace.ui.markdown.MarkdownRenderer
          import com.mrrobot.aiworkspace.viewmodel.ChatViewModel

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun ChatScreen(
              vm: ChatViewModel = viewModel()
          ) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .background(
                          Brush.verticalGradient(
                              listOf(
                                  Color(0xFF020617),
                                  Color(0xFF071427),
                                  Color(0xFF020617)
                              )
                          )
                      )
                      .padding(18.dp)
              ) {
                  Text(
                      text = "AI Workspace",
                      color = Color.White,
                      fontSize = 34.sp,
                      fontWeight = FontWeight.ExtraBold
                  )

                  Spacer(modifier = Modifier.height(6.dp))

                  Text(
                      text = "Multi-session OpenRouter AI chat.",
                      color = Color(0xFF94A3B8)
                  )

                  Spacer(modifier = Modifier.height(14.dp))

                  Row(
                      horizontalArrangement = Arrangement.spacedBy(10.dp),
                      modifier = Modifier.fillMaxWidth()
                  ) {
                      Button(
                          onClick = { vm.createSession() },
                          modifier = Modifier.weight(1f),
                          shape = RoundedCornerShape(14.dp)
                      ) {
                          Text("New Chat")
                      }

                      OutlinedButton(
                          onClick = { vm.clearCurrentChat() },
                          modifier = Modifier.weight(1f),
                          shape = RoundedCornerShape(14.dp)
                      ) {
                          Text("Clear")
                      }

                      OutlinedButton(
                          onClick = { vm.deleteCurrentSession() },
                          modifier = Modifier.weight(1f),
                          shape = RoundedCornerShape(14.dp)
                      ) {
                          Text("Delete")
                      }
                  }

                  Spacer(modifier = Modifier.height(12.dp))

                  Row(
                      horizontalArrangement = Arrangement.spacedBy(8.dp),
                      modifier = Modifier
                          .fillMaxWidth()
                          .horizontalScroll(rememberScrollState())
                  ) {
                      vm.sessions.forEach { session ->
                          FilterChip(
                              selected = session.id == vm.selectedSessionId,
                              onClick = { vm.switchSession(session.id) },
                              label = {
                                  Text(session.title)
                              }
                          )
                      }
                  }

                  Spacer(modifier = Modifier.height(14.dp))

                  OutlinedTextField(
                      value = vm.apiKey,
                      onValueChange = { vm.apiKey = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("OpenRouter API Key") },
                      singleLine = true,
                      shape = RoundedCornerShape(18.dp)
                  )

                  Spacer(modifier = Modifier.height(12.dp))

                  var expanded by remember { mutableStateOf(false) }

                  ExposedDropdownMenuBox(
                      expanded = expanded,
                      onExpandedChange = { expanded = !expanded }
                  ) {
                      OutlinedTextField(
                          value = vm.selectedModel,
                          onValueChange = {},
                          readOnly = true,
                          modifier = Modifier
                              .menuAnchor()
                              .fillMaxWidth(),
                          label = { Text("AI Model") },
                          shape = RoundedCornerShape(18.dp)
                      )

                      ExposedDropdownMenu(
                          expanded = expanded,
                          onDismissRequest = { expanded = false }
                      ) {
                          OpenRouterModels.models.forEach { model ->
                              DropdownMenuItem(
                                  text = { Text(model.title) },
                                  onClick = {
                                      vm.selectedModel = model.id
                                      expanded = false
                                  }
                              )
                          }
                      }
                  }

                  Spacer(modifier = Modifier.height(14.dp))

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      verticalArrangement = Arrangement.spacedBy(14.dp)
                  ) {
                      items(vm.currentMessages) { msg ->
                          Surface(
                              modifier = Modifier.fillMaxWidth(),
                              shape = RoundedCornerShape(22.dp),
                              color =
                                  if (msg.role == "user")
                                      Color(0x2200D4FF)
                                  else
                                      Color(0x2200FFB2)
                          ) {
                              Column(
                                  modifier = Modifier.padding(16.dp)
                              ) {
                                  Text(
                                      text = msg.role.uppercase(),
                                      color =
                                          if (msg.role == "user")
                                              Color(0xFF00D4FF)
                                          else
                                              Color(0xFF00FFB2),
                                      fontWeight = FontWeight.Bold
                                  )

                                  Spacer(modifier = Modifier.height(10.dp))

                                  MarkdownRenderer(
                                      markdown = msg.content
                                  )
                              }
                          }
                      }
                  }

                  if (vm.loading) {
                      Spacer(modifier = Modifier.height(10.dp))
                      LinearProgressIndicator(
                          modifier = Modifier.fillMaxWidth(),
                          color = Color(0xFF00D4FF)
                      )
                  }

                  Spacer(modifier = Modifier.height(12.dp))

                  OutlinedTextField(
                      value = vm.input,
                      onValueChange = { vm.input = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("Message") },
                      minLines = 1,
                      maxLines = 5,
                      shape = RoundedCornerShape(18.dp)
                  )

                  Spacer(modifier = Modifier.height(12.dp))

                  Button(
                      onClick = { vm.sendMessage() },
                      enabled = !vm.loading,
                      modifier = Modifier
                          .fillMaxWidth()
                          .height(56.dp),
                      shape = RoundedCornerShape(18.dp),
                      colors = ButtonDefaults.buttonColors(
                          containerColor = Color(0xFF00D4FF),
                          contentColor = Color.Black
                      )
                  ) {
                      Text(
                          text = if (vm.loading) "Generating..." else "Send Message",
                          fontWeight = FontWeight.Bold
                      )
                  }
              }
          }
          EOF

      - name: Ensure navigation uses production chat screen
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("app/src/main/java/com/mrrobot/aiworkspace/navigation/AppNavigation.kt")
          text = p.read_text()

          if "ui.chat.ChatScreen" not in text:
              text = text.replace(
                  "import com.mrrobot.aiworkspace.ui.screens.*",
                  "import com.mrrobot.aiworkspace.ui.screens.*\nimport com.mrrobot.aiworkspace.ui.chat.ChatScreen"
              )

          p.write_text(text)
          PY

      - name: Commit multi-chat workspace
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Step 34 add stable multi-chat sessions"

          git pull --rebase origin main

          git push origin main
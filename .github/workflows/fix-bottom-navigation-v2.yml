name: Fix Bottom Navigation V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-navigation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Detect shell file
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          SHELL_FILE=$(find app/src/main/java -name "*WorkspaceShell.kt" | head -n 1 || true)

          if [ -z "$SHELL_FILE" ]; then
            SHELL_FILE=$(find app/src/main/java -name "*MainScreen.kt" | head -n 1 || true)
          fi

          if [ -z "$SHELL_FILE" ]; then
            echo "No shell file found"
            exit 1
          fi

          echo "shell_file=$SHELL_FILE" >> $GITHUB_OUTPUT

      - name: Fix bottom navigation
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          SHELL_FILE="${{ steps.detect.outputs.shell_file }}"

          python3 - <<PY
          from pathlib import Path

          shell_file = Path("$SHELL_FILE")

          text = shell_file.read_text()

          text = text.replace(
              'val bottomItems = listOf(',
              'val bottomItems = listOf('
          )

          replacements = {
              'AppRoutes.Agents,': '',
              'AppRoutes.Workflow,': '',
              'AppRoutes.Terminal,': '',
              'AppRoutes.Files,': '',
              'AppRoutes.Profile,': '',
          }

          for old, new in replacements.items():
              text = text.replace(old, new)

          shell_file.write_text(text)
          PY

      - name: Replace SettingsScreen
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS=$(find app/src/main/java -name "SettingsScreen.kt" | head -n 1)

          cat > "$SETTINGS" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import androidx.navigation.NavController
          import com.mrrobot.aiworkspace.data.AppThemeMode
          import com.mrrobot.aiworkspace.navigation.AppRoutes
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.SettingsViewModel

          @Composable
          fun SettingsScreen(
              navController: NavController,
              viewModel: SettingsViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()

              ScreenShell {
                  LazyColumn(
                      modifier = Modifier.fillMaxSize(),
                      contentPadding = PaddingValues(bottom = 24.dp),
                      verticalArrangement = Arrangement.spacedBy(14.dp)
                  ) {

                      item {
                          PageTitle("Settings")

                          Subtitle(
                              "Workspace preferences and modules."
                          )
                      }

                      item {
                          Panel(
                              title = "Theme",
                              subtitle = "Auto, Dark, Light"
                          ) {

                              Row(
                                  modifier = Modifier.fillMaxWidth(),
                                  horizontalArrangement = Arrangement.spacedBy(8.dp)
                              ) {
                                  AppThemeMode.values().forEach { mode ->

                                      FilterChip(
                                          selected = state.themeMode == mode,
                                          onClick = {
                                              viewModel.updateThemeMode(mode)
                                          },
                                          label = {
                                              Text(mode.name)
                                          },
                                          modifier = Modifier.weight(1f)
                                      )
                                  }
                              }

                              Spacer(modifier = Modifier.height(12.dp))

                              PrimaryButton(
                                  text = "Save Settings",
                                  onClick = {
                                      viewModel.save()
                                  }
                              )
                          }
                      }

                      item {
                          Panel(
                              title = "Workspace Modules",
                              subtitle = "Moved from bottom navigation."
                          ) {

                              SecondaryButton(
                                  text = "Agents",
                                  onClick = {
                                      navController.navigate(
                                          AppRoutes.Agents.route
                                      )
                                  }
                              )

                              Spacer(modifier = Modifier.height(8.dp))

                              SecondaryButton(
                                  text = "Workflow",
                                  onClick = {
                                      navController.navigate(
                                          AppRoutes.Workflow.route
                                      )
                                  }
                              )

                              Spacer(modifier = Modifier.height(8.dp))

                              SecondaryButton(
                                  text = "Terminal",
                                  onClick = {
                                      navController.navigate(
                                          AppRoutes.Terminal.route
                                      )
                                  }
                              )

                              Spacer(modifier = Modifier.height(8.dp))

                              SecondaryButton(
                                  text = "Files",
                                  onClick = {
                                      navController.navigate(
                                          AppRoutes.Files.route
                                      )
                                  }
                              )

                              Spacer(modifier = Modifier.height(8.dp))

                              SecondaryButton(
                                  text = "Profile",
                                  onClick = {
                                      navController.navigate(
                                          AppRoutes.Profile.route
                                      )
                                  }
                              )
                          }
                      }
                  }
              }
          }
          EOF

      - name: Commit navigation fix
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Fix simplified bottom navigation"

          git pull --rebase origin main

          git push origin main
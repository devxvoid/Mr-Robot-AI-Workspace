name: Step 42 AI Provider Key Manager

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Video Style AI Provider Key Manager
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Replace settings with provider key manager
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"
          DRAWABLE_DIR="app/src/main/res/drawable"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/components"
          mkdir -p "$APP_DIR/ui/screens"
          mkdir -p "$DRAWABLE_DIR"
          mkdir -p "docs/settings"

          cat > "$APP_DIR/data/AiModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          enum class ApiProvider(
              val displayName: String,
              val shortName: String,
              val keyLabel: String,
              val keyPlaceholder: String,
              val helpText: String
          ) {
              OpenRouter(
                  displayName = "OpenRouter",
                  shortName = "OR",
                  keyLabel = "OpenRouter API Key",
                  keyPlaceholder = "sk-or-v1-...",
                  helpText = "One key for many hosted models."
              ),
              OpenAI(
                  displayName = "OpenAI",
                  shortName = "OpenAI",
                  keyLabel = "OpenAI API Key",
                  keyPlaceholder = "sk-...",
                  helpText = "Use official OpenAI models directly."
              ),
              Anthropic(
                  displayName = "Anthropic",
                  shortName = "Claude",
                  keyLabel = "Anthropic API Key",
                  keyPlaceholder = "sk-ant-...",
                  helpText = "Use Claude models directly."
              ),
              Gemini(
                  displayName = "Google",
                  shortName = "Gemini",
                  keyLabel = "Gemini API Key",
                  keyPlaceholder = "AIza...",
                  helpText = "Use Google Gemini models directly."
              ),
              Groq(
                  displayName = "Groq",
                  shortName = "Groq",
                  keyLabel = "Groq API Key",
                  keyPlaceholder = "gsk_...",
                  helpText = "Fast OpenAI-compatible inference."
              ),
              Mistral(
                  displayName = "Mistral",
                  shortName = "Mistral",
                  keyLabel = "Mistral API Key",
                  keyPlaceholder = "Enter Mistral API key",
                  helpText = "Use Mistral and Codestral models."
              ),
              DeepSeek(
                  displayName = "DeepSeek",
                  shortName = "DeepSeek",
                  keyLabel = "DeepSeek API Key",
                  keyPlaceholder = "sk-...",
                  helpText = "Use DeepSeek chat and reasoning models."
              ),
              XAI(
                  displayName = "xAI",
                  shortName = "Grok",
                  keyLabel = "xAI API Key",
                  keyPlaceholder = "xai-...",
                  helpText = "Use Grok models directly."
              )
          }

          data class AiModel(
              val id: String,
              val name: String,
              val provider: String,
              val description: String,
              val apiProvider: ApiProvider
          )

          object AiModels {

              val supported = listOf(
                  AiModel("openai/gpt-4o-mini", "GPT-4o Mini", "OpenRouter", "Fast general model through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("anthropic/claude-3.5-sonnet", "Claude 3.5 Sonnet", "OpenRouter", "Claude through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("google/gemini-2.0-flash-001", "Gemini Flash", "OpenRouter", "Fast Gemini model through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("meta-llama/llama-3.1-70b-instruct", "Llama 3.1 70B", "OpenRouter", "Open model through OpenRouter.", ApiProvider.OpenRouter),
                  AiModel("deepseek/deepseek-chat", "DeepSeek Chat", "OpenRouter", "DeepSeek through OpenRouter.", ApiProvider.OpenRouter),

                  AiModel("gpt-4o-mini", "GPT-4o Mini", "OpenAI", "Fast official OpenAI model.", ApiProvider.OpenAI),
                  AiModel("gpt-4o", "GPT-4o", "OpenAI", "Flagship OpenAI model.", ApiProvider.OpenAI),
                  AiModel("o3-mini", "o3 Mini", "OpenAI", "Reasoning-focused OpenAI model.", ApiProvider.OpenAI),

                  AiModel("claude-3-5-sonnet-latest", "Claude 3.5 Sonnet", "Anthropic", "Strong Claude model for coding and reasoning.", ApiProvider.Anthropic),
                  AiModel("claude-3-5-haiku-latest", "Claude 3.5 Haiku", "Anthropic", "Fast Claude model for everyday tasks.", ApiProvider.Anthropic),

                  AiModel("gemini-1.5-flash", "Gemini 1.5 Flash", "Google", "Fast Gemini model.", ApiProvider.Gemini),
                  AiModel("gemini-1.5-pro", "Gemini 1.5 Pro", "Google", "Advanced Gemini model.", ApiProvider.Gemini),
                  AiModel("gemini-2.0-flash", "Gemini 2.0 Flash", "Google", "Newer fast Gemini model.", ApiProvider.Gemini),

                  AiModel("llama-3.3-70b-versatile", "Llama 3.3 70B", "Groq", "Fast Llama model on Groq.", ApiProvider.Groq),
                  AiModel("mixtral-8x7b-32768", "Mixtral 8x7B", "Groq", "Fast Mixtral model on Groq.", ApiProvider.Groq),

                  AiModel("mistral-large-latest", "Mistral Large", "Mistral", "Advanced Mistral model.", ApiProvider.Mistral),
                  AiModel("codestral-latest", "Codestral", "Mistral", "Coding model from Mistral.", ApiProvider.Mistral),

                  AiModel("deepseek-chat", "DeepSeek Chat", "DeepSeek", "DeepSeek general chat model.", ApiProvider.DeepSeek),
                  AiModel("deepseek-reasoner", "DeepSeek Reasoner", "DeepSeek", "DeepSeek reasoning model.", ApiProvider.DeepSeek),

                  AiModel("grok-2-latest", "Grok 2", "xAI", "xAI Grok model.", ApiProvider.XAI),
                  AiModel("grok-beta", "Grok Beta", "xAI", "Beta Grok model.", ApiProvider.XAI)
              )

              fun byProvider(provider: ApiProvider): List<AiModel> {
                  return supported.filter { it.apiProvider == provider }
              }

              fun defaultForProvider(provider: ApiProvider): AiModel {
                  return byProvider(provider).firstOrNull() ?: supported.first()
              }

              fun byIdOrNull(id: String): AiModel? {
                  return supported.firstOrNull { it.id == id }
              }

              fun findById(id: String): AiModel {
                  return byIdOrNull(id) ?: supported.first()
              }
          }
          EOF

          cat > "$APP_DIR/data/SettingsStore.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          import android.content.Context
          import androidx.datastore.preferences.core.edit
          import androidx.datastore.preferences.core.stringPreferencesKey
          import androidx.datastore.preferences.preferencesDataStore
          import kotlinx.coroutines.flow.Flow
          import kotlinx.coroutines.flow.map

          private val Context.settingsDataStore by preferencesDataStore(name = "mr_robot_settings")

          enum class AppThemeMode {
              Auto,
              Dark,
              Light,
              Cyberpunk,
              Hacker
          }

          data class AppSettings(
              val apiKey: String = "",
              val model: String = "openai/gpt-4o-mini",
              val themeMode: AppThemeMode = AppThemeMode.Auto,
              val selectedProvider: ApiProvider = ApiProvider.OpenRouter,
              val openRouterApiKey: String = "",
              val openAiApiKey: String = "",
              val anthropicApiKey: String = "",
              val geminiApiKey: String = "",
              val groqApiKey: String = "",
              val mistralApiKey: String = "",
              val deepSeekApiKey: String = "",
              val xAiApiKey: String = ""
          ) {
              fun keyFor(provider: ApiProvider): String {
                  return when (provider) {
                      ApiProvider.OpenRouter -> openRouterApiKey.ifBlank { apiKey }
                      ApiProvider.OpenAI -> openAiApiKey
                      ApiProvider.Anthropic -> anthropicApiKey
                      ApiProvider.Gemini -> geminiApiKey
                      ApiProvider.Groq -> groqApiKey
                      ApiProvider.Mistral -> mistralApiKey
                      ApiProvider.DeepSeek -> deepSeekApiKey
                      ApiProvider.XAI -> xAiApiKey
                  }
              }

              fun activeApiKey(): String {
                  return keyFor(selectedProvider)
              }
          }

          class SettingsStore(private val context: Context) {

              private object Keys {
                  val API_KEY = stringPreferencesKey("openrouter_api_key")
                  val MODEL = stringPreferencesKey("selected_model")
                  val THEME_MODE = stringPreferencesKey("theme_mode")
                  val SELECTED_PROVIDER = stringPreferencesKey("selected_provider")
                  val OPENROUTER_API_KEY = stringPreferencesKey("api_key_openrouter")
                  val OPENAI_API_KEY = stringPreferencesKey("api_key_openai")
                  val ANTHROPIC_API_KEY = stringPreferencesKey("api_key_anthropic")
                  val GEMINI_API_KEY = stringPreferencesKey("api_key_gemini")
                  val GROQ_API_KEY = stringPreferencesKey("api_key_groq")
                  val MISTRAL_API_KEY = stringPreferencesKey("api_key_mistral")
                  val DEEPSEEK_API_KEY = stringPreferencesKey("api_key_deepseek")
                  val XAI_API_KEY = stringPreferencesKey("api_key_xai")
              }

              val settingsFlow: Flow<AppSettings> =
                  context.settingsDataStore.data.map { prefs ->
                      val legacyOpenRouterKey = prefs[Keys.API_KEY] ?: ""
                      val provider = runCatching {
                          ApiProvider.valueOf(
                              prefs[Keys.SELECTED_PROVIDER] ?: ApiProvider.OpenRouter.name
                          )
                      }.getOrDefault(ApiProvider.OpenRouter)

                      val openRouterKey = prefs[Keys.OPENROUTER_API_KEY] ?: legacyOpenRouterKey

                      val requestedModel = prefs[Keys.MODEL]
                          ?: AiModels.defaultForProvider(provider).id

                      val normalizedModel = AiModels.byIdOrNull(requestedModel)
                          ?.takeIf { it.apiProvider == provider }
                          ?.id
                          ?: AiModels.defaultForProvider(provider).id

                      AppSettings(
                          apiKey = openRouterKey,
                          model = normalizedModel,
                          themeMode = runCatching {
                              AppThemeMode.valueOf(
                                  prefs[Keys.THEME_MODE] ?: AppThemeMode.Auto.name
                              )
                          }.getOrDefault(AppThemeMode.Auto),
                          selectedProvider = provider,
                          openRouterApiKey = openRouterKey,
                          openAiApiKey = prefs[Keys.OPENAI_API_KEY] ?: "",
                          anthropicApiKey = prefs[Keys.ANTHROPIC_API_KEY] ?: "",
                          geminiApiKey = prefs[Keys.GEMINI_API_KEY] ?: "",
                          groqApiKey = prefs[Keys.GROQ_API_KEY] ?: "",
                          mistralApiKey = prefs[Keys.MISTRAL_API_KEY] ?: "",
                          deepSeekApiKey = prefs[Keys.DEEPSEEK_API_KEY] ?: "",
                          xAiApiKey = prefs[Keys.XAI_API_KEY] ?: ""
                      )
                  }

              suspend fun saveSettings(
                  apiKey: String,
                  model: String,
                  themeMode: AppThemeMode
              ) {
                  context.settingsDataStore.edit { prefs ->
                      prefs[Keys.SELECTED_PROVIDER] = ApiProvider.OpenRouter.name
                      prefs[Keys.API_KEY] = apiKey.trim()
                      prefs[Keys.OPENROUTER_API_KEY] = apiKey.trim()
                      prefs[Keys.MODEL] = model.trim().ifBlank {
                          AiModels.defaultForProvider(ApiProvider.OpenRouter).id
                      }
                      prefs[Keys.THEME_MODE] = themeMode.name
                  }
              }

              suspend fun saveAllSettings(
                  selectedProvider: ApiProvider,
                  model: String,
                  themeMode: AppThemeMode,
                  openRouterApiKey: String,
                  openAiApiKey: String,
                  anthropicApiKey: String,
                  geminiApiKey: String,
                  groqApiKey: String,
                  mistralApiKey: String,
                  deepSeekApiKey: String,
                  xAiApiKey: String
              ) {
                  val safeModel = AiModels.byIdOrNull(model)
                      ?.takeIf { it.apiProvider == selectedProvider }
                      ?.id
                      ?: AiModels.defaultForProvider(selectedProvider).id

                  context.settingsDataStore.edit { prefs ->
                      prefs[Keys.SELECTED_PROVIDER] = selectedProvider.name
                      prefs[Keys.MODEL] = safeModel
                      prefs[Keys.THEME_MODE] = themeMode.name
                      prefs[Keys.OPENROUTER_API_KEY] = openRouterApiKey.trim()
                      prefs[Keys.API_KEY] = openRouterApiKey.trim()
                      prefs[Keys.OPENAI_API_KEY] = openAiApiKey.trim()
                      prefs[Keys.ANTHROPIC_API_KEY] = anthropicApiKey.trim()
                      prefs[Keys.GEMINI_API_KEY] = geminiApiKey.trim()
                      prefs[Keys.GROQ_API_KEY] = groqApiKey.trim()
                      prefs[Keys.MISTRAL_API_KEY] = mistralApiKey.trim()
                      prefs[Keys.DEEPSEEK_API_KEY] = deepSeekApiKey.trim()
                      prefs[Keys.XAI_API_KEY] = xAiApiKey.trim()
                  }
              }

              suspend fun clearSettings() {
                  context.settingsDataStore.edit { prefs ->
                      prefs.clear()
                  }
              }
          }
          EOF

          cat > "$APP_DIR/viewmodel/SettingsViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import android.app.Application
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.mrrobot.aiworkspace.data.AiModels
          import com.mrrobot.aiworkspace.data.ApiProvider
          import com.mrrobot.aiworkspace.data.AppSettings
          import com.mrrobot.aiworkspace.data.AppThemeMode
          import com.mrrobot.aiworkspace.data.SettingsStore
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow
          import kotlinx.coroutines.launch

          data class SettingsUiState(
              val apiKey: String = "",
              val model: String = "openai/gpt-4o-mini",
              val themeMode: AppThemeMode = AppThemeMode.Auto,
              val selectedProvider: ApiProvider = ApiProvider.OpenRouter,
              val openRouterApiKey: String = "",
              val openAiApiKey: String = "",
              val anthropicApiKey: String = "",
              val geminiApiKey: String = "",
              val groqApiKey: String = "",
              val mistralApiKey: String = "",
              val deepSeekApiKey: String = "",
              val xAiApiKey: String = "",
              val savedMessage: String = "",
              val isLoaded: Boolean = false
          ) {
              fun keyFor(provider: ApiProvider): String {
                  return when (provider) {
                      ApiProvider.OpenRouter -> openRouterApiKey.ifBlank { apiKey }
                      ApiProvider.OpenAI -> openAiApiKey
                      ApiProvider.Anthropic -> anthropicApiKey
                      ApiProvider.Gemini -> geminiApiKey
                      ApiProvider.Groq -> groqApiKey
                      ApiProvider.Mistral -> mistralApiKey
                      ApiProvider.DeepSeek -> deepSeekApiKey
                      ApiProvider.XAI -> xAiApiKey
                  }
              }

              val configuredProviders: List<ApiProvider>
                  get() = ApiProvider.values().filter { keyFor(it).isNotBlank() }
          }

          class SettingsViewModel(application: Application) : AndroidViewModel(application) {

              private val store = SettingsStore(application.applicationContext)

              private val _uiState = MutableStateFlow(SettingsUiState())
              val uiState: StateFlow<SettingsUiState> = _uiState.asStateFlow()

              init {
                  viewModelScope.launch {
                      store.settingsFlow.collect { settings: AppSettings ->
                          _uiState.value = _uiState.value.copy(
                              apiKey = settings.apiKey,
                              model = settings.model,
                              themeMode = settings.themeMode,
                              selectedProvider = settings.selectedProvider,
                              openRouterApiKey = settings.openRouterApiKey,
                              openAiApiKey = settings.openAiApiKey,
                              anthropicApiKey = settings.anthropicApiKey,
                              geminiApiKey = settings.geminiApiKey,
                              groqApiKey = settings.groqApiKey,
                              mistralApiKey = settings.mistralApiKey,
                              deepSeekApiKey = settings.deepSeekApiKey,
                              xAiApiKey = settings.xAiApiKey,
                              isLoaded = true
                          )
                      }
                  }
              }

              fun updateThemeMode(value: AppThemeMode) {
                  _uiState.value = _uiState.value.copy(
                      themeMode = value,
                      savedMessage = ""
                  )
              }

              fun updateModel(value: String) {
                  _uiState.value = _uiState.value.copy(
                      model = value,
                      savedMessage = ""
                  )
              }

              fun updateSelectedProvider(value: ApiProvider) {
                  val current = _uiState.value
                  val safeModel = AiModels.defaultForProvider(value).id

                  _uiState.value = current.copy(
                      selectedProvider = value,
                      model = safeModel,
                      savedMessage = ""
                  )
              }

              fun updateApiKey(value: String) {
                  val current = _uiState.value

                  _uiState.value = when (current.selectedProvider) {
                      ApiProvider.OpenRouter -> current.copy(apiKey = value, openRouterApiKey = value, savedMessage = "")
                      ApiProvider.OpenAI -> current.copy(openAiApiKey = value, savedMessage = "")
                      ApiProvider.Anthropic -> current.copy(anthropicApiKey = value, savedMessage = "")
                      ApiProvider.Gemini -> current.copy(geminiApiKey = value, savedMessage = "")
                      ApiProvider.Groq -> current.copy(groqApiKey = value, savedMessage = "")
                      ApiProvider.Mistral -> current.copy(mistralApiKey = value, savedMessage = "")
                      ApiProvider.DeepSeek -> current.copy(deepSeekApiKey = value, savedMessage = "")
                      ApiProvider.XAI -> current.copy(xAiApiKey = value, savedMessage = "")
                  }
              }

              fun saveProviderConfiguration(
                  provider: ApiProvider,
                  model: String,
                  apiKey: String,
                  activate: Boolean
              ) {
                  viewModelScope.launch {
                      val current = applyProviderKey(
                          state = _uiState.value,
                          provider = provider,
                          apiKey = apiKey
                      )

                      val targetProvider = if (activate) provider else current.selectedProvider
                      val targetModel = if (activate) model else current.model

                      store.saveAllSettings(
                          selectedProvider = targetProvider,
                          model = targetModel,
                          themeMode = current.themeMode,
                          openRouterApiKey = current.openRouterApiKey,
                          openAiApiKey = current.openAiApiKey,
                          anthropicApiKey = current.anthropicApiKey,
                          geminiApiKey = current.geminiApiKey,
                          groqApiKey = current.groqApiKey,
                          mistralApiKey = current.mistralApiKey,
                          deepSeekApiKey = current.deepSeekApiKey,
                          xAiApiKey = current.xAiApiKey
                      )

                      _uiState.value = current.copy(
                          selectedProvider = targetProvider,
                          model = targetModel,
                          savedMessage = if (activate) {
                              "${provider.displayName} saved and activated"
                          } else {
                              "${provider.displayName} key saved"
                          }
                      )
                  }
              }

              fun save() {
                  viewModelScope.launch {
                      val current = _uiState.value

                      store.saveAllSettings(
                          selectedProvider = current.selectedProvider,
                          model = current.model,
                          themeMode = current.themeMode,
                          openRouterApiKey = current.openRouterApiKey,
                          openAiApiKey = current.openAiApiKey,
                          anthropicApiKey = current.anthropicApiKey,
                          geminiApiKey = current.geminiApiKey,
                          groqApiKey = current.groqApiKey,
                          mistralApiKey = current.mistralApiKey,
                          deepSeekApiKey = current.deepSeekApiKey,
                          xAiApiKey = current.xAiApiKey
                      )

                      _uiState.value = current.copy(
                          savedMessage = "Settings saved successfully"
                      )
                  }
              }

              fun saveThemeOnly(themeMode: AppThemeMode) {
                  viewModelScope.launch {
                      val current = _uiState.value.copy(themeMode = themeMode)

                      store.saveAllSettings(
                          selectedProvider = current.selectedProvider,
                          model = current.model,
                          themeMode = current.themeMode,
                          openRouterApiKey = current.openRouterApiKey,
                          openAiApiKey = current.openAiApiKey,
                          anthropicApiKey = current.anthropicApiKey,
                          geminiApiKey = current.geminiApiKey,
                          groqApiKey = current.groqApiKey,
                          mistralApiKey = current.mistralApiKey,
                          deepSeekApiKey = current.deepSeekApiKey,
                          xAiApiKey = current.xAiApiKey
                      )

                      _uiState.value = current.copy(
                          savedMessage = "Theme updated"
                      )
                  }
              }

              fun clear() {
                  viewModelScope.launch {
                      store.clearSettings()

                      _uiState.value = SettingsUiState(
                          savedMessage = "Settings cleared",
                          isLoaded = true
                      )
                  }
              }

              private fun applyProviderKey(
                  state: SettingsUiState,
                  provider: ApiProvider,
                  apiKey: String
              ): SettingsUiState {
                  return when (provider) {
                      ApiProvider.OpenRouter -> state.copy(apiKey = apiKey, openRouterApiKey = apiKey)
                      ApiProvider.OpenAI -> state.copy(openAiApiKey = apiKey)
                      ApiProvider.Anthropic -> state.copy(anthropicApiKey = apiKey)
                      ApiProvider.Gemini -> state.copy(geminiApiKey = apiKey)
                      ApiProvider.Groq -> state.copy(groqApiKey = apiKey)
                      ApiProvider.Mistral -> state.copy(mistralApiKey = apiKey)
                      ApiProvider.DeepSeek -> state.copy(deepSeekApiKey = apiKey)
                      ApiProvider.XAI -> state.copy(xAiApiKey = apiKey)
                  }
              }
          }
          EOF


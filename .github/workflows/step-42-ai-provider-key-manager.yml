                          }

                          CyberButtonMini(
                              text = "Test & Activate",
                              onClick = onTestAndActivate,
                              modifier = Modifier.weight(1f)
                          )
                      }
                  }
              }
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          private fun ProviderDropdown(
              selected: ApiProvider,
              onSelected: (ApiProvider) -> Unit
          ) {
              var expanded by remember { mutableStateOf(false) }

              ExposedDropdownMenuBox(
                  expanded = expanded,
                  onExpandedChange = { expanded = !expanded }
              ) {
                  OutlinedTextField(
                      value = selected.displayName,
                      onValueChange = {},
                      readOnly = true,
                      label = { Text("Provider") },
                      trailingIcon = {
                          ExposedDropdownMenuDefaults.TrailingIcon(expanded = expanded)
                      },
                      modifier = Modifier
                          .menuAnchor()
                          .fillMaxWidth()
                  )

                  ExposedDropdownMenu(
                      expanded = expanded,
                      onDismissRequest = { expanded = false }
                  ) {
                      ApiProvider.values().forEach { provider ->
                          DropdownMenuItem(
                              text = { Text(provider.displayName) },
                              onClick = {
                                  onSelected(provider)
                                  expanded = false
                              }
                          )
                      }
                  }
              }
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          private fun ModelDropdown(
              selectedProvider: ApiProvider,
              selectedModel: String,
              onSelected: (String) -> Unit
          ) {
              var expanded by remember { mutableStateOf(false) }
              val models = AiModels.byProvider(selectedProvider)
              val selected = models.firstOrNull { it.id == selectedModel }
                  ?: AiModels.defaultForProvider(selectedProvider)

              ExposedDropdownMenuBox(
                  expanded = expanded,
                  onExpandedChange = { expanded = !expanded }
              ) {
                  OutlinedTextField(
                      value = selected.name,
                      onValueChange = {},
                      readOnly = true,
                      label = { Text("Model") },
                      trailingIcon = {
                          ExposedDropdownMenuDefaults.TrailingIcon(expanded = expanded)
                      },
                      modifier = Modifier
                          .menuAnchor()
                          .fillMaxWidth()
                  )

                  ExposedDropdownMenu(
                      expanded = expanded,
                      onDismissRequest = { expanded = false }
                  ) {
                      models.forEach { model ->
                          DropdownMenuItem(
                              text = {
                                  Column {
                                      Text(model.name)
                                      Text(
                                          text = model.id,
                                          color = MaterialTheme.colorScheme.onSurfaceVariant,
                                          fontSize = 12.sp
                                      )
                                  }
                              },
                              onClick = {
                                  onSelected(model.id)
                                  expanded = false
                              }
                          )
                      }
                  }
              }
          }

          @Composable
          private fun ThemeSelectorCard(
              selected: AppThemeMode,
              onSelected: (AppThemeMode) -> Unit
          ) {
              Column(modifier = Modifier.fillMaxWidth()) {
                  Title("Theme")

                  Spacer(Modifier.height(6.dp))

                  Subtitle("Choose the app appearance and design mode.")

                  Spacer(Modifier.height(14.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      ThemeTile(
                          title = "Auto",
                          mode = AppThemeMode.Auto,
                          selected = selected,
                          iconRes = R.drawable.ic_lucide_sun_moon_exact,
                          onSelected = onSelected,
                          modifier = Modifier.weight(1f)
                      )

                      ThemeTile(
                          title = "Light",
                          mode = AppThemeMode.Light,
                          selected = selected,
                          iconRes = R.drawable.ic_lucide_sun,
                          onSelected = onSelected,
                          modifier = Modifier.weight(1f)
                      )

                      ThemeTile(
                          title = "Dark",
                          mode = AppThemeMode.Dark,
                          selected = selected,
                          iconRes = R.drawable.ic_lucide_moon,
                          onSelected = onSelected,
                          modifier = Modifier.weight(1f)
                      )
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      ThemeTile(
                          title = "Cyber",
                          mode = AppThemeMode.Cyberpunk,
                          selected = selected,
                          iconRes = R.drawable.ic_lucide_cpu,
                          onSelected = onSelected,
                          modifier = Modifier.weight(1f)
                      )

                      ThemeTile(
                          title = "Hacker",
                          mode = AppThemeMode.Hacker,
                          selected = selected,
                          iconRes = R.drawable.ic_lucide_terminal_square,
                          onSelected = onSelected,
                          modifier = Modifier.weight(1f)
                      )
                  }
              }
          }

          @Composable
          private fun ThemeTile(
              title: String,
              mode: AppThemeMode,
              selected: AppThemeMode,
              @DrawableRes iconRes: Int,
              onSelected: (AppThemeMode) -> Unit,
              modifier: Modifier = Modifier
          ) {
              val isSelected = selected == mode

              Surface(
                  modifier = modifier.clickable { onSelected(mode) },
                  color = if (isSelected) {
                      MaterialTheme.colorScheme.primary.copy(alpha = 0.14f)
                  } else {
                      MaterialTheme.colorScheme.surface.copy(alpha = 0.76f)
                  },
                  border = BorderStroke(
                      1.dp,
                      if (isSelected) {
                          MaterialTheme.colorScheme.primary
                      } else {
                          MaterialTheme.colorScheme.outline.copy(alpha = 0.45f)
                      }
                  ),
                  shape = MaterialTheme.shapes.large
              ) {
                  Column(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(vertical = 16.dp, horizontal = 8.dp),
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      Icon(
                          painter = painterResource(id = iconRes),
                          contentDescription = title,
                          tint = if (isSelected) {
                              MaterialTheme.colorScheme.primary
                          } else {
                              MaterialTheme.colorScheme.onSurfaceVariant
                          },
                          modifier = Modifier.size(26.dp)
                      )

                      Text(
                          text = title,
                          color = if (isSelected) {
                              MaterialTheme.colorScheme.primary
                          } else {
                              MaterialTheme.colorScheme.onSurface
                          },
                          fontWeight = FontWeight.Bold,
                          fontSize = 13.sp,
                          maxLines = 1
                      )
                  }
              }
          }

          @Composable
          private fun CyberButtonMini(
              text: String,
              onClick: () -> Unit,
              modifier: Modifier = Modifier
          ) {
              androidx.compose.material3.Button(
                  onClick = onClick,
                  colors = androidx.compose.material3.ButtonDefaults.buttonColors(
                      containerColor = MaterialTheme.colorScheme.primary,
                      contentColor = MaterialTheme.colorScheme.onPrimary
                  ),
                  shape = MaterialTheme.shapes.medium,
                  modifier = modifier.height(48.dp)
              ) {
                  Text(
                      text = text,
                      fontWeight = FontWeight.Bold,
                      fontSize = 12.sp,
                      maxLines = 1
                  )
              }
          }

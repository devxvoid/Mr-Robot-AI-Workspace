name: Step 33 Fix Auto Theme Lucide Icon

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Replace Auto Theme Icon With Clean Lucide Sun Moon
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Replace overlapping Auto icon
        shell: bash
        run: |
          set -euo pipefail

          DRAWABLE_DIR="app/src/main/res/drawable"
          mkdir -p "$DRAWABLE_DIR"

          cat > "$DRAWABLE_DIR/ic_lucide_sun_moon.xml" <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">

              <!-- Lucide-style sun-moon icon.
                   Fixed version: no separate full moon overlay, so it will not overlap. -->

              <path
                  android:pathData="M12,8C13.1,8 14,8.9 14,10C14,11.1 13.1,12 12,12C14.2,12 16,10.2 16,8C17.2,8.7 18,10.2 18,12C18,15.3 15.3,18 12,18C8.7,18 6,15.3 6,12C6,8.7 8.7,6 12,6C12.7,6 13.3,6.1 13.9,6.4C12.8,6.7 12,7.3 12,8Z"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round"
                  android:strokeLineJoin="round" />

              <path
                  android:pathData="M12,2V3.5"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M12,20.5V22"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M4.93,4.93L6.0,6.0"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M18.0,18.0L19.07,19.07"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M2,12H3.5"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M20.5,12H22"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M4.93,19.07L6.0,18.0"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />

              <path
                  android:pathData="M18.0,6.0L19.07,4.93"
                  android:fillColor="@android:color/transparent"
                  android:strokeColor="@android:color/white"
                  android:strokeWidth="2"
                  android:strokeLineCap="round" />
          </vector>
          EOF

      - name: Verify Auto icon no longer has old overlapping moon path
        shell: bash
        run: |
          set -euo pipefail

          if grep -q "M21,14.5" app/src/main/res/drawable/ic_lucide_sun_moon.xml; then
            echo "Old overlapping moon path still exists."
            exit 1
          fi

          if grep -q "A6.5,6.5" app/src/main/res/drawable/ic_lucide_sun_moon.xml; then
            echo "Old arc overlay still exists."
            exit 1
          fi

          echo "Auto sun-moon icon fixed."

      - name: Commit Step 33
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/res/drawable/ic_lucide_sun_moon.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 33 fix Auto theme Lucide sun moon icon"

          git pull --rebase origin main
          git push origin main

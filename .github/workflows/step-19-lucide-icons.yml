          cat > "$APP_DIR/navigation/AppNavGraph.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          import androidx.annotation.DrawableRes
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material3.Icon
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.NavigationBar
          import androidx.compose.material3.NavigationBarItem
          import androidx.compose.material3.NavigationBarItemDefaults
          import androidx.compose.material3.Scaffold
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.res.painterResource
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.currentBackStackEntryAsState
          import androidx.navigation.compose.rememberNavController
          import com.mrrobot.aiworkspace.R
          import com.mrrobot.aiworkspace.ui.screens.AgentsScreen
          import com.mrrobot.aiworkspace.ui.screens.ChatScreen
          import com.mrrobot.aiworkspace.ui.screens.FileManagerScreen
          import com.mrrobot.aiworkspace.ui.screens.MarketplaceScreen
          import com.mrrobot.aiworkspace.ui.screens.MoreScreen
          import com.mrrobot.aiworkspace.ui.screens.ProfileScreen
          import com.mrrobot.aiworkspace.ui.screens.SettingsScreen
          import com.mrrobot.aiworkspace.ui.screens.TerminalScreen
          import com.mrrobot.aiworkspace.ui.screens.WelcomeScreen
          import com.mrrobot.aiworkspace.ui.screens.WorkflowScreen

          sealed class Route(
              val path: String,
              val label: String,
              @DrawableRes val iconRes: Int
          ) {
              object Welcome : Route(
                  path = "welcome",
                  label = "Home",
                  iconRes = R.drawable.ic_lucide_home
              )

              object Chat : Route(
                  path = "chat",
                  label = "AI",
                  iconRes = R.drawable.ic_lucide_sparkles
              )

              object Agents : Route(
                  path = "agents",
                  label = "Agents",
                  iconRes = R.drawable.ic_lucide_bot
              )

              object Workflow : Route(
                  path = "workflow",
                  label = "Flow",
                  iconRes = R.drawable.ic_lucide_workflow
              )

              object More : Route(
                  path = "more",
                  label = "More",
                  iconRes = R.drawable.ic_lucide_menu
              )

              object Terminal : Route(
                  path = "terminal",
                  label = "Terminal",
                  iconRes = R.drawable.ic_lucide_terminal
              )

              object Files : Route(
                  path = "files",
                  label = "Files",
                  iconRes = R.drawable.ic_lucide_folder
              )

              object Market : Route(
                  path = "market",
                  label = "Store",
                  iconRes = R.drawable.ic_lucide_store
              )

              object Settings : Route(
                  path = "settings",
                  label = "Settings",
                  iconRes = R.drawable.ic_lucide_settings
              )

              object Profile : Route(
                  path = "profile",
                  label = "Profile",
                  iconRes = R.drawable.ic_lucide_user
              )
          }

          @Composable
          fun AppNavGraph() {
              val navController = rememberNavController()

              val bottomItems = listOf(
                  Route.Welcome,
                  Route.Chat,
                  Route.Agents,
                  Route.Workflow,
                  Route.More
              )

              Scaffold(
                  containerColor = Color.Transparent,
                  bottomBar = {
                      val currentRoute =
                          navController.currentBackStackEntryAsState().value?.destination?.route

                      NavigationBar(
                          containerColor = MaterialTheme.colorScheme.surface.copy(alpha = 0.98f),
                          tonalElevation = androidx.compose.ui.unit.Dp.Hairline
                      ) {
                          bottomItems.forEach { route ->
                              NavigationBarItem(
                                  selected = isBottomItemSelected(
                                      currentRoute = currentRoute,
                                      route = route
                                  ),
                                  onClick = {
                                      navController.navigate(route.path) {
                                          launchSingleTop = true
                                          restoreState = true
                                          popUpTo(navController.graph.startDestinationId) {
                                              saveState = true
                                          }
                                      }
                                  },
                                  icon = {
                                      Icon(
                                          painter = painterResource(id = route.iconRes),
                                          contentDescription = route.label
                                      )
                                  },
                                  label = {
                                      Text(
                                          text = route.label,
                                          maxLines = 1
                                      )
                                  },
                                  colors = NavigationBarItemDefaults.colors(
                                      selectedIconColor = MaterialTheme.colorScheme.primary,
                                      selectedTextColor = MaterialTheme.colorScheme.primary,
                                      indicatorColor = MaterialTheme.colorScheme.primary.copy(alpha = 0.15f),
                                      unselectedIconColor = MaterialTheme.colorScheme.onSurfaceVariant,
                                      unselectedTextColor = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              )
                          }
                      }
                  }
              ) { innerPadding ->
                  NavHost(
                      navController = navController,
                      startDestination = Route.Welcome.path,
                      modifier = Modifier.padding(innerPadding)
                  ) {
                      composable(Route.Welcome.path) {
                          WelcomeScreen(navController)
                      }

                      composable(Route.Chat.path) {
                          ChatScreen()
                      }

                      composable(Route.Agents.path) {
                          AgentsScreen()
                      }

                      composable(Route.Workflow.path) {
                          WorkflowScreen()
                      }

                      composable(Route.More.path) {
                          MoreScreen(navController)
                      }

                      composable(Route.Terminal.path) {
                          TerminalScreen()
                      }

                      composable(Route.Files.path) {
                          FileManagerScreen()
                      }

                      composable(Route.Market.path) {
                          MarketplaceScreen()
                      }

                      composable(Route.Settings.path) {
                          SettingsScreen()
                      }

                      composable(Route.Profile.path) {
                          ProfileScreen()
                      }
                  }
              }
          }

          private fun isBottomItemSelected(
              currentRoute: String?,
              route: Route
          ): Boolean {
              if (currentRoute == route.path) return true

              val moreRoutes = setOf(
                  Route.Terminal.path,
                  Route.Files.path,
                  Route.Market.path,
                  Route.Settings.path,
                  Route.Profile.path
              )

              return route == Route.More && currentRoute in moreRoutes
          }
          EOF

          cat > "$APP_DIR/ui/screens/MoreScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.annotation.DrawableRes
          import androidx.compose.foundation.layout.Arrangement
          import androidx.compose.foundation.layout.PaddingValues
          import androidx.compose.foundation.layout.Row
          import androidx.compose.foundation.layout.Spacer
          import androidx.compose.foundation.layout.fillMaxSize
          import androidx.compose.foundation.layout.fillMaxWidth
          import androidx.compose.foundation.layout.height
          import androidx.compose.foundation.layout.size
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.material3.Icon
          import androidx.compose.material3.OutlinedButton
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.res.painterResource
          import androidx.compose.ui.unit.dp
          import androidx.navigation.NavController
          import com.mrrobot.aiworkspace.navigation.Route
          import com.mrrobot.aiworkspace.ui.components.GlassCard
          import com.mrrobot.aiworkspace.ui.components.ScreenShell
          import com.mrrobot.aiworkspace.ui.components.Subtitle
          import com.mrrobot.aiworkspace.ui.components.Title

          @Composable
          fun MoreScreen(navController: NavController) {
              ScreenShell {
                  LazyColumn(
                      modifier = Modifier.fillMaxSize(),
                      contentPadding = PaddingValues(bottom = 18.dp)
                  ) {
                      item {
                          Title("More")
                          Subtitle("Access workspace tools, files, marketplace, settings, and profile.")

                          Spacer(Modifier.height(14.dp))

                          MoreCard(
                              iconRes = Route.Terminal.iconRes,
                              title = "Live Terminal",
                              subtitle = "View simulated build logs and command output.",
                              button = "Open Terminal",
                              onClick = { navController.navigate(Route.Terminal.path) }
                          )

                          MoreCard(
                              iconRes = Route.Files.iconRes,
                              title = "File Manager",
                              subtitle = "Browse project files and Stitch design references.",
                              button = "Open Files",
                              onClick = { navController.navigate(Route.Files.path) }
                          )

                          MoreCard(
                              iconRes = Route.Market.iconRes,
                              title = "Marketplace",
                              subtitle = "Manage models, tools, agents, workflows, and integrations.",
                              button = "Open Marketplace",
                              onClick = { navController.navigate(Route.Market.path) }
                          )

                          MoreCard(
                              iconRes = Route.Settings.iconRes,
                              title = "Settings",
                              subtitle = "Configure OpenRouter, model selection, and Auto/Dark/Light theme.",
                              button = "Open Settings",
                              onClick = { navController.navigate(Route.Settings.path) }
                          )

                          MoreCard(
                              iconRes = Route.Profile.iconRes,
                              title = "Profile",
                              subtitle = "View workspace identity, stats, and export summary.",
                              button = "Open Profile",
                              onClick = { navController.navigate(Route.Profile.path) }
                          )
                      }
                  }
              }
          }

          @Composable
          private fun MoreCard(
              @DrawableRes iconRes: Int,
              title: String,
              subtitle: String,
              button: String,
              onClick: () -> Unit
          ) {
              GlassCard {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(14.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Icon(
                          painter = painterResource(id = iconRes),
                          contentDescription = title,
                          modifier = Modifier.size(28.dp)
                      )

                      Title(title)
                  }

                  Spacer(Modifier.height(8.dp))

                  Subtitle(subtitle)

                  Spacer(Modifier.height(12.dp))

                  OutlinedButton(onClick = onClick) {
                      Text(button)
                  }
              }

              Spacer(Modifier.height(12.dp))
          }
          EOF

      - name: Commit Lucide icon upgrade
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .


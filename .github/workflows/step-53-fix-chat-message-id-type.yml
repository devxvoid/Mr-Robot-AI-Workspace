name: Step 53 Fix Chat Message ID Type

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Fix ChatScreen ChatUiMessage ID Type
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch ChatScreen message ID
        shell: bash
        run: |
          set -euo pipefail

          CHAT_SCREEN="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt"

          if [ ! -f "$CHAT_SCREEN" ]; then
            echo "ChatScreen.kt not found at $CHAT_SCREEN"
            exit 1
          fi

          python3 -c '
from pathlib import Path
import re

path = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt")
text = path.read_text()
original = text

text = text.replace("id = \"welcome\"", "id = 0L")
text = text.replace("id = \"assistant-welcome\"", "id = 0L")
text = text.replace("id = \"mr-robot-welcome\"", "id = 0L")

# Extra safety: only inside ChatUiMessage constructors, convert any string literal assigned to id into a stable Long.
text = re.sub(
    r"(ChatUiMessage\\s*\\(\\s*id\\s*=\\s*)\"[^\"]+\"",
    r"\\g<1>0L",
    text,
    flags=re.DOTALL
)

path.write_text(text)

if text == original:
    print("No string ChatUiMessage id found. File may already be fixed.")
else:
    print("Fixed ChatUiMessage string id to Long id.")
'

      - name: Verify ID type fix
        shell: bash
        run: |
          set -euo pipefail

          CHAT_SCREEN="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt"

          if grep -n 'id = "welcome"' "$CHAT_SCREEN"; then
            echo "String welcome id still exists."
            exit 1
          fi

          if grep -n 'id = "assistant-welcome"' "$CHAT_SCREEN"; then
            echo "String assistant welcome id still exists."
            exit 1
          fi

          if grep -n 'id = "mr-robot-welcome"' "$CHAT_SCREEN"; then
            echo "String Mr. Robot welcome id still exists."
            exit 1
          fi

          grep -n "ChatUiMessage" "$CHAT_SCREEN" || true

          echo "ChatScreen ID type verification passed."

      - name: Commit Step 53
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt

          echo "Staged diff:"
          git diff --cached --stat || true

          if git diff --cached --quiet; then
            echo "No changes to commit. Step 55 is already applied."
            exit 0
          fi

          git commit -m "Step 53 fix ChatScreen message id type"
          git pull --rebase origin main
          git push origin main

name: Step 6 Workflow Builder Logic

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Functional Workflow Builder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Add workflow builder logic
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/data/WorkflowModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          data class WorkflowStep(
              val id: Long,
              val title: String,
              val description: String,
              val agent: String,
              val status: WorkflowStatus = WorkflowStatus.Pending
          )

          enum class WorkflowStatus {
              Pending,
              Running,
              Completed,
              Failed
          }

          object WorkflowTemplates {
              fun androidAppBuild(): List<WorkflowStep> {
                  return listOf(
                      WorkflowStep(
                          id = 1,
                          title = "Analyze App Request",
                          description = "Read requirements, detect screens, features, architecture, and build constraints.",
                          agent = "Android Architect"
                      ),
                      WorkflowStep(
                          id = 2,
                          title = "Design UI System",
                          description = "Create premium Material 3 cyberpunk UI components and navigation.",
                          agent = "UI/UX Strategist"
                      ),
                      WorkflowStep(
                          id = 3,
                          title = "Generate Android Code",
                          description = "Create Compose screens, ViewModels, repositories, and Gradle configuration.",
                          agent = "Android Architect"
                      ),
                      WorkflowStep(
                          id = 4,
                          title = "Add Backend/API Layer",
                          description = "Wire OpenRouter, DataStore, network requests, and persistence.",
                          agent = "Backend Engineer"
                      ),
                      WorkflowStep(
                          id = 5,
                          title = "Debug Build",
                          description = "Fix Gradle, Kotlin, dependency, and runtime errors.",
                          agent = "Debugging Specialist"
                      ),
                      WorkflowStep(
                          id = 6,
                          title = "Create APK Workflow",
                          description = "Generate GitHub Actions workflow to build and upload APK artifacts.",
                          agent = "Workflow Builder"
                      )
                  )
              }

              fun aiWorkspaceUpgrade(): List<WorkflowStep> {
                  return listOf(
                      WorkflowStep(
                          id = 1,
                          title = "Inspect Existing App",
                          description = "Review current package structure, screens, and missing capabilities.",
                          agent = "Debugging Specialist"
                      ),
                      WorkflowStep(
                          id = 2,
                          title = "Upgrade Chat System",
                          description = "Add streaming, copy, retry, regenerate, and model selection.",
                          agent = "Backend Engineer"
                      ),
                      WorkflowStep(
                          id = 3,
                          title = "Upgrade Agents",
                          description = "Add functional agents, prompt generation, and task routing.",
                          agent = "Android Architect"
                      ),
                      WorkflowStep(
                          id = 4,
                          title = "Upgrade UI Polish",
                          description = "Add animations, glass cards, glow, icons, and responsive polish.",
                          agent = "UI/UX Strategist"
                      )
                  )
              }

              fun empty(): List<WorkflowStep> = emptyList()
          }
          EOF

          cat > "$APP_DIR/viewmodel/WorkflowViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import androidx.lifecycle.ViewModel
          import com.mrrobot.aiworkspace.data.WorkflowStatus
          import com.mrrobot.aiworkspace.data.WorkflowStep
          import com.mrrobot.aiworkspace.data.WorkflowTemplates
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow

          data class WorkflowUiState(
              val workflowName: String = "Mr. Robot Build Pipeline",
              val customTitle: String = "",
              val customDescription: String = "",
              val customAgent: String = "Android Architect",
              val steps: List<WorkflowStep> = WorkflowTemplates.androidAppBuild(),
              val generatedPrompt: String = ""
          )

          class WorkflowViewModel : ViewModel() {

              private val _uiState = MutableStateFlow(WorkflowUiState())
              val uiState: StateFlow<WorkflowUiState> = _uiState.asStateFlow()

              fun updateWorkflowName(value: String) {
                  _uiState.value = _uiState.value.copy(workflowName = value)
              }

              fun updateCustomTitle(value: String) {
                  _uiState.value = _uiState.value.copy(customTitle = value)
              }

              fun updateCustomDescription(value: String) {
                  _uiState.value = _uiState.value.copy(customDescription = value)
              }

              fun updateCustomAgent(value: String) {
                  _uiState.value = _uiState.value.copy(customAgent = value)
              }

              fun loadAndroidTemplate() {
                  _uiState.value = _uiState.value.copy(
                      workflowName = "Android App Build Pipeline",
                      steps = WorkflowTemplates.androidAppBuild(),
                      generatedPrompt = ""
                  )
              }

              fun loadAiWorkspaceTemplate() {
                  _uiState.value = _uiState.value.copy(
                      workflowName = "AI Workspace Upgrade Pipeline",
                      steps = WorkflowTemplates.aiWorkspaceUpgrade(),
                      generatedPrompt = ""
                  )
              }

              fun clearSteps() {
                  _uiState.value = _uiState.value.copy(
                      steps = emptyList(),
                      generatedPrompt = ""
                  )
              }

              fun addCustomStep() {
                  val state = _uiState.value

                  if (state.customTitle.isBlank()) return

                  val nextId = (state.steps.maxOfOrNull { it.id } ?: 0L) + 1L

                  val step = WorkflowStep(
                      id = nextId,
                      title = state.customTitle.trim(),
                      description = state.customDescription.trim().ifBlank {
                          "Custom workflow task."
                      },
                      agent = state.customAgent.trim().ifBlank {
                          "Android Architect"
                      }
                  )

                  _uiState.value = state.copy(
                      steps = state.steps + step,
                      customTitle = "",
                      customDescription = "",
                      generatedPrompt = ""
                  )
              }

              fun removeStep(id: Long) {
                  _uiState.value = _uiState.value.copy(
                      steps = _uiState.value.steps.filterNot { it.id == id },
                      generatedPrompt = ""
                  )
              }

              fun moveStepUp(id: Long) {
                  val steps = _uiState.value.steps.toMutableList()
                  val index = steps.indexOfFirst { it.id == id }

                  if (index > 0) {
                      val item = steps.removeAt(index)
                      steps.add(index - 1, item)
                      _uiState.value = _uiState.value.copy(
                          steps = steps,
                          generatedPrompt = ""
                      )
                  }
              }

              fun moveStepDown(id: Long) {
                  val steps = _uiState.value.steps.toMutableList()
                  val index = steps.indexOfFirst { it.id == id }

                  if (index >= 0 && index < steps.lastIndex) {
                      val item = steps.removeAt(index)
                      steps.add(index + 1, item)
                      _uiState.value = _uiState.value.copy(
                          steps = steps,
                          generatedPrompt = ""
                      )
                  }
              }

              fun markStepRunning(id: Long) {
                  updateStatus(id, WorkflowStatus.Running)
              }

              fun markStepCompleted(id: Long) {
                  updateStatus(id, WorkflowStatus.Completed)
              }

              fun markStepFailed(id: Long) {
                  updateStatus(id, WorkflowStatus.Failed)
              }

              private fun updateStatus(id: Long, status: WorkflowStatus) {
                  _uiState.value = _uiState.value.copy(
                      steps = _uiState.value.steps.map {
                          if (it.id == id) it.copy(status = status) else it
                      },
                      generatedPrompt = ""
                  )
              }

              fun generatePrompt() {
                  val state = _uiState.value

                  val stepText = state.steps.mapIndexed { index, step ->
                      """
                      ## Step ${index + 1}: ${step.title}
                      Agent: ${step.agent}
                      Status: ${step.status}
                      Task: ${step.description}
                      """.trimIndent()
                  }.joinToString(separator = "\n\n")

                  val prompt = """
                  # ${state.workflowName}

                  You are Mr. Robot AI Workspace.

                  Execute this workflow as a coordinated multi-agent Android development pipeline.

                  Requirements:
                  - Provide complete implementation-ready output.
                  - Use exact file paths.
                  - Provide full code when code is needed.
                  - Avoid vague placeholders.
                  - Prioritize production-ready Android MVP quality.
                  - Use Kotlin, Jetpack Compose, Material 3, MVVM, Coroutines, DataStore, and GitHub Actions where relevant.

                  $stepText

                  Final Output:
                  - Summarize completed work.
                  - Provide next action.
                  - Mention risks or missing requirements.
                  """.trimIndent()

                  _uiState.value = state.copy(generatedPrompt = prompt)
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/WorkflowScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.itemsIndexed
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.platform.LocalClipboardManager
          import androidx.compose.ui.text.AnnotatedString
          import androidx.compose.ui.text.font.FontFamily
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.WorkflowStatus
          import com.mrrobot.aiworkspace.data.WorkflowStep
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.WorkflowViewModel

          @Composable
          fun WorkflowScreen(
              viewModel: WorkflowViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()
              val clipboard = LocalClipboardManager.current

              ScreenShell {
                  Title("Workflow Builder")
                  Subtitle("Create, reorder, simulate, and export multi-agent workflows.")
                  Spacer(Modifier.height(14.dp))

                  GlassCard {
                      Subtitle("Workflow Name")
                      Spacer(Modifier.height(8.dp))
                      OutlinedTextField(
                          value = state.workflowName,
                          onValueChange = viewModel::updateWorkflowName,
                          modifier = Modifier.fillMaxWidth(),
                          singleLine = true
                      )

                      Spacer(Modifier.height(12.dp))

                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.spacedBy(8.dp)
                      ) {
                          OutlinedButton(
                              onClick = { viewModel.loadAndroidTemplate() },
                              modifier = Modifier.weight(1f)
                          ) {
                              Text("Android")
                          }

                          OutlinedButton(
                              onClick = { viewModel.loadAiWorkspaceTemplate() },
                              modifier = Modifier.weight(1f)
                          ) {
                              Text("AI Upgrade")
                          }

                          OutlinedButton(
                              onClick = { viewModel.clearSteps() },
                              modifier = Modifier.weight(1f)
                          ) {
                              Text("Clear")
                          }
                      }
                  }

                  Spacer(Modifier.height(12.dp))

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      contentPadding = PaddingValues(bottom = 12.dp)
                  ) {
                      itemsIndexed(
                          items = state.steps,
                          key = { _, step -> step.id }
                      ) { index, step ->
                          WorkflowStepCard(
                              index = index,
                              step = step,
                              onUp = { viewModel.moveStepUp(step.id) },
                              onDown = { viewModel.moveStepDown(step.id) },
                              onRun = { viewModel.markStepRunning(step.id) },
                              onDone = { viewModel.markStepCompleted(step.id) },
                              onFail = { viewModel.markStepFailed(step.id) },
                              onRemove = { viewModel.removeStep(step.id) }
                          )
                      }

                      item {
                          AddStepCard(
                              title = state.customTitle,
                              description = state.customDescription,
                              agent = state.customAgent,
                              onTitleChange = viewModel::updateCustomTitle,
                              onDescriptionChange = viewModel::updateCustomDescription,
                              onAgentChange = viewModel::updateCustomAgent,
                              onAdd = { viewModel.addCustomStep() }
                          )
                      }

                      item {
                          GlassCard(modifier = Modifier.padding(top = 12.dp)) {
                              CyberButton("Generate Workflow Prompt") {
                                  viewModel.generatePrompt()
                              }

                              if (state.generatedPrompt.isNotBlank()) {
                                  Spacer(Modifier.height(14.dp))
                                  Subtitle("Generated Prompt")
                                  Spacer(Modifier.height(8.dp))

                                  Text(
                                      text = state.generatedPrompt,
                                      color = Color.White,
                                      fontFamily = FontFamily.Monospace
                                  )

                                  Spacer(Modifier.height(12.dp))

                                  CyberButton("Copy Workflow Prompt") {
                                      clipboard.setText(AnnotatedString(state.generatedPrompt))
                                  }
                              }
                          }

                          Spacer(Modifier.height(80.dp))
                      }
                  }
              }
          }

          @Composable
          private fun WorkflowStepCard(
              index: Int,
              step: WorkflowStep,
              onUp: () -> Unit,
              onDown: () -> Unit,
              onRun: () -> Unit,
              onDone: () -> Unit,
              onFail: () -> Unit,
              onRemove: () -> Unit
          ) {
              GlassCard(modifier = Modifier.padding(bottom = 12.dp)) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.Top
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Title("${index + 1}. ${step.title}")
                          Subtitle(step.agent)
                          Spacer(Modifier.height(8.dp))
                          Subtitle(step.description)
                          Spacer(Modifier.height(8.dp))
                          StatusChip(step.status)
                      }

                      TextButton(onClick = onRemove) {
                          Text("Remove")
                      }
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(6.dp)
                  ) {
                      OutlinedButton(
                          onClick = onUp,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("↑")
                      }

                      OutlinedButton(
                          onClick = onDown,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("↓")
                      }

                      OutlinedButton(
                          onClick = onRun,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("Run")
                      }

                      OutlinedButton(
                          onClick = onDone,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("Done")
                      }

                      OutlinedButton(
                          onClick = onFail,
                          modifier = Modifier.weight(1f)
                      ) {
                          Text("Fail")
                      }
                  }
              }
          }

          @Composable
          private fun StatusChip(status: WorkflowStatus) {
              val color = when (status) {
                  WorkflowStatus.Pending -> SoftText
                  WorkflowStatus.Running -> NeonCyan
                  WorkflowStatus.Completed -> Color(0xFF4ADE80)
                  WorkflowStatus.Failed -> Color(0xFFFF6B6B)
              }

              AssistChip(
                  onClick = {},
                  label = {
                      Text(
                          text = status.name,
                          color = color,
                          fontWeight = FontWeight.Bold
                      )
                  }
              )
          }

          @Composable
          private fun AddStepCard(
              title: String,
              description: String,
              agent: String,
              onTitleChange: (String) -> Unit,
              onDescriptionChange: (String) -> Unit,
              onAgentChange: (String) -> Unit,
              onAdd: () -> Unit
          ) {
              GlassCard {
                  Title("Add Custom Step")
                  Spacer(Modifier.height(10.dp))

                  OutlinedTextField(
                      value = title,
                      onValueChange = onTitleChange,
                      placeholder = { Text("Step title") },
                      modifier = Modifier.fillMaxWidth(),
                      singleLine = true
                  )

                  Spacer(Modifier.height(8.dp))

                  OutlinedTextField(
                      value = description,
                      onValueChange = onDescriptionChange,
                      placeholder = { Text("Step description") },
                      modifier = Modifier.fillMaxWidth(),
                      minLines = 2,
                      maxLines = 4
                  )

                  Spacer(Modifier.height(8.dp))

                  OutlinedTextField(
                      value = agent,
                      onValueChange = onAgentChange,
                      placeholder = { Text("Assigned agent") },
                      modifier = Modifier.fillMaxWidth(),
                      singleLine = true
                  )

                  Spacer(Modifier.height(12.dp))

                  CyberButton("Add Step") {
                      onAdd()
                  }
              }
          }
          EOF

      - name: Commit Step 6 upgrade
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Step 6 add workflow builder logic" || echo "No changes to commit"
          git push
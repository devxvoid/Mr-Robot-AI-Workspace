name: Step 4 Model Selector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Real Model Selector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Upgrade settings with model selector
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/data/AiModels.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          data class AiModelOption(
              val id: String,
              val name: String,
              val provider: String,
              val description: String
          )

          object AiModels {
              val supported = listOf(
                  AiModelOption(
                      id = "openai/gpt-4o-mini",
                      name = "GPT-4o Mini",
                      provider = "OpenAI",
                      description = "Fast, affordable, reliable general-purpose model."
                  ),
                  AiModelOption(
                      id = "google/gemini-2.0-flash-001",
                      name = "Gemini 2.0 Flash",
                      provider = "Google",
                      description = "Fast multimodal model with strong reasoning speed."
                  ),
                  AiModelOption(
                      id = "anthropic/claude-3.5-sonnet",
                      name = "Claude 3.5 Sonnet",
                      provider = "Anthropic",
                      description = "High-quality reasoning and writing model."
                  ),
                  AiModelOption(
                      id = "deepseek/deepseek-chat",
                      name = "DeepSeek Chat",
                      provider = "DeepSeek",
                      description = "Efficient chat and coding assistant."
                  ),
                  AiModelOption(
                      id = "meta-llama/llama-3.1-8b-instruct",
                      name = "Llama 3.1 8B Instruct",
                      provider = "Meta",
                      description = "Open-weight fast instruct model."
                  ),
                  AiModelOption(
                      id = "mistralai/mistral-small",
                      name = "Mistral Small",
                      provider = "Mistral",
                      description = "Balanced model for lightweight AI workflows."
                  )
              )

              fun findById(id: String): AiModelOption {
                  return supported.firstOrNull { it.id == id } ?: supported.first()
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/SettingsScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.foundation.verticalScroll
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.input.PasswordVisualTransformation
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.AiModels
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.SettingsViewModel

          @Composable
          fun SettingsScreen(
              viewModel: SettingsViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()
              val selectedModel = AiModels.findById(state.model)

              ScreenShell {
                  Column(
                      modifier = Modifier
                          .fillMaxSize()
                          .verticalScroll(rememberScrollState())
                  ) {
                      Title("Settings")
                      Subtitle("Configure OpenRouter, model selection, and workspace preferences.")
                      Spacer(Modifier.height(16.dp))

                      GlassCard {
                          Subtitle("OpenRouter API Key")

                          Spacer(Modifier.height(8.dp))

                          OutlinedTextField(
                              value = state.apiKey,
                              onValueChange = viewModel::updateApiKey,
                              placeholder = { Text("sk-or-v1-...") },
                              visualTransformation = PasswordVisualTransformation(),
                              singleLine = true,
                              modifier = Modifier.fillMaxWidth()
                          )

                          Spacer(Modifier.height(18.dp))

                          Subtitle("Selected Model")

                          Spacer(Modifier.height(8.dp))

                          ModelSelector(
                              selectedModelId = state.model,
                              onModelSelected = viewModel::updateModel
                          )

                          Spacer(Modifier.height(14.dp))

                          GlassCard {
                              Title(selectedModel.name)
                              Subtitle("${selectedModel.provider} • ${selectedModel.id}")
                              Spacer(Modifier.height(6.dp))
                              Subtitle(selectedModel.description)
                          }

                          Spacer(Modifier.height(16.dp))

                          CyberButton("Save Settings") {
                              viewModel.save()
                          }

                          Spacer(Modifier.height(10.dp))

                          OutlinedButton(
                              onClick = { viewModel.clear() },
                              modifier = Modifier.fillMaxWidth()
                          ) {
                              Text("Clear Settings")
                          }

                          if (state.savedMessage.isNotBlank()) {
                              Spacer(Modifier.height(12.dp))
                              Subtitle(state.savedMessage)
                          }
                      }

                      Spacer(Modifier.height(16.dp))

                      GlassCard {
                          Title("Model Catalog")
                          Spacer(Modifier.height(8.dp))

                          AiModels.supported.forEach { model ->
                              Column(
                                  modifier = Modifier
                                      .fillMaxWidth()
                                      .clickable {
                                          viewModel.updateModel(model.id)
                                      }
                                      .padding(vertical = 10.dp)
                              ) {
                                  Subtitle("${model.name} — ${model.provider}")
                                  Subtitle(model.id)
                              }

                              Divider()
                          }
                      }

                      Spacer(Modifier.height(80.dp))
                  }
              }
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          private fun ModelSelector(
              selectedModelId: String,
              onModelSelected: (String) -> Unit
          ) {
              var expanded by remember { mutableStateOf(false) }
              val selected = AiModels.findById(selectedModelId)

              ExposedDropdownMenuBox(
                  expanded = expanded,
                  onExpandedChange = { expanded = !expanded }
              ) {
                  OutlinedTextField(
                      value = "${selected.name} • ${selected.provider}",
                      onValueChange = {},
                      readOnly = true,
                      label = { Text("AI Model") },
                      trailingIcon = {
                          ExposedDropdownMenuDefaults.TrailingIcon(expanded = expanded)
                      },
                      modifier = Modifier
                          .menuAnchor()
                          .fillMaxWidth()
                  )

                  ExposedDropdownMenu(
                      expanded = expanded,
                      onDismissRequest = { expanded = false }
                  ) {
                      AiModels.supported.forEach { model ->
                          DropdownMenuItem(
                              text = {
                                  Column {
                                      Text(model.name)
                                      Text(model.provider)
                                  }
                              },
                              onClick = {
                                  onModelSelected(model.id)
                                  expanded = false
                              }
                          )
                      }
                  }
              }
          }
          EOF

      - name: Commit Step 4 upgrade
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Step 4 add model selector" || echo "No changes to commit"
          git push
name: Step 35 Remove Conflicts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Remove duplicate conflicting files
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          rm -f "$ROOT/ui/screens/ChatScreen.kt"
          rm -f "$ROOT/data/ChatRepository.kt"
          rm -f "$ROOT/ui/components/GlassCard.kt"
          rm -f "$ROOT/ui/theme/PremiumColors.kt"

          python3 - <<'PY'
          from pathlib import Path

          nav = Path(
              "app/src/main/java/com/mrrobot/aiworkspace/navigation/AppNavigation.kt"
          )

          text = nav.read_text()

          text = text.replace(
              "import com.mrrobot.aiworkspace.ui.screens.*\nimport com.mrrobot.aiworkspace.ui.chat.ChatScreen",
              "import com.mrrobot.aiworkspace.ui.screens.*\nimport com.mrrobot.aiworkspace.ui.chat.ChatScreen"
          )

          text = text.replace(
              "composable(\n                      AppRoutes.Chat.route\n                  ) {\n                      ChatScreen()\n                  }",
              """composable(
                      AppRoutes.Chat.route
                  ) {
                      ChatScreen()
                  }"""
          )

          nav.write_text(text)
          PY

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Remove duplicate Compose conflicts"

          git pull --rebase origin main

          git push origin main
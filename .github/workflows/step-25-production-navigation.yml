name: Step 25 Production Navigation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  navigation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Build production navigation shell
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/navigation"
          mkdir -p "$ROOT/ui/layout"

          cat > "$ROOT/navigation/AppRoutes.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          sealed class AppRoutes(
              val route: String
          ) {

              data object Dashboard : AppRoutes("dashboard")
              data object Chat : AppRoutes("chat")
              data object Agents : AppRoutes("agents")
              data object Workflow : AppRoutes("workflow")
              data object Terminal : AppRoutes("terminal")
              data object Files : AppRoutes("files")
              data object Marketplace : AppRoutes("marketplace")
              data object Settings : AppRoutes("settings")
              data object Profile : AppRoutes("profile")
          }
          EOF

          cat > "$ROOT/navigation/AppNavigation.kt" <<'EOF'
          package com.mrrobot.aiworkspace.navigation

          import androidx.compose.runtime.Composable
          import androidx.navigation.NavHostController
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import com.mrrobot.aiworkspace.ui.dashboard.DashboardScreen
          import com.mrrobot.aiworkspace.ui.screens.*

          @Composable
          fun AppNavigation(
              navController: NavHostController
          ) {

              NavHost(
                  navController = navController,
                  startDestination = AppRoutes.Dashboard.route
              ) {

                  composable(
                      AppRoutes.Dashboard.route
                  ) {
                      DashboardScreen()
                  }

                  composable(
                      AppRoutes.Chat.route
                  ) {
                      ChatScreen()
                  }

                  composable(
                      AppRoutes.Agents.route
                  ) {
                      AgentsScreen()
                  }

                  composable(
                      AppRoutes.Workflow.route
                  ) {
                      WorkflowScreen()
                  }

                  composable(
                      AppRoutes.Terminal.route
                  ) {
                      TerminalScreen()
                  }

                  composable(
                      AppRoutes.Files.route
                  ) {
                      FileManagerScreen()
                  }

                  composable(
                      AppRoutes.Marketplace.route
                  ) {
                      MarketplaceScreen()
                  }

                  composable(
                      AppRoutes.Settings.route
                  ) {
                      SettingsScreen()
                  }

                  composable(
                      AppRoutes.Profile.route
                  ) {
                      ProfileScreen()
                  }
              }
          }
          EOF

          cat > "$ROOT/ui/layout/MainWorkspaceShell.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.layout

          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material3.NavigationBar
          import androidx.compose.material3.NavigationBarItem
          import androidx.compose.material3.Scaffold
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.getValue
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.navigation.compose.currentBackStackEntryAsState
          import androidx.navigation.compose.rememberNavController
          import com.mrrobot.aiworkspace.navigation.AppNavigation
          import com.mrrobot.aiworkspace.navigation.AppRoutes

          @Composable
          fun MainWorkspaceShell() {

              val navController = rememberNavController()

              val items = listOf(
                  AppRoutes.Dashboard,
                  AppRoutes.Chat,
                  AppRoutes.Agents,
                  AppRoutes.Workflow,
                  AppRoutes.Terminal,
                  AppRoutes.Files,
                  AppRoutes.Marketplace,
                  AppRoutes.Settings,
                  AppRoutes.Profile
              )

              val backStack by
                  navController.currentBackStackEntryAsState()

              val currentRoute =
                  backStack?.destination?.route

              Scaffold(

                  containerColor = Color(0xFF020617),

                  bottomBar = {

                      NavigationBar(
                          containerColor = Color(0xFF071427)
                      ) {

                          items.forEach { screen ->

                              NavigationBarItem(

                                  selected =
                                      currentRoute == screen.route,

                                  onClick = {

                                      navController.navigate(
                                          screen.route
                                      ) {
                                          launchSingleTop = true
                                      }
                                  },

                                  icon = {},

                                  label = {

                                      Text(
                                          text = screen.route
                                              .replaceFirstChar {
                                                  it.uppercase()
                                              }
                                      )
                                  }
                              )
                          }
                      }
                  }

              ) { padding ->

                  androidx.compose.foundation.layout.Box(
                      modifier = Modifier
                          .padding(padding)
                          .background(Color(0xFF020617))
                  ) {

                      AppNavigation(navController)
                  }
              }
          }
          EOF

          MAIN_ACTIVITY="$ROOT/MainActivity.kt"

          cat > "$MAIN_ACTIVITY" <<'EOF'
          package com.mrrobot.aiworkspace

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.activity.enableEdgeToEdge
          import com.mrrobot.aiworkspace.ui.layout.MainWorkspaceShell

          class MainActivity : ComponentActivity() {

              override fun onCreate(
                  savedInstanceState: Bundle?
              ) {

                  super.onCreate(savedInstanceState)

                  enableEdgeToEdge()

                  setContent {

                      MainWorkspaceShell()
                  }
              }
          }
          EOF

      - name: Commit navigation architecture
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Build production workspace navigation shell"

          git pull --rebase origin main

          git push origin main
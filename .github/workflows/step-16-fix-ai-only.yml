name: Step 16 Fix AI Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Fix AI only without changing UI
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/data"
          mkdir -p "$ROOT/ai"
          mkdir -p "$ROOT/viewmodel"

          cat > "$ROOT/data/ChatMessage.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          data class ChatMessage(
              val role: String,
              val content: String
          )
          EOF

          cat > "$ROOT/ai/OpenRouterRepository.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ai

          import com.mrrobot.aiworkspace.data.ChatMessage
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import okhttp3.MediaType.Companion.toMediaType
          import okhttp3.OkHttpClient
          import okhttp3.Request
          import okhttp3.RequestBody.Companion.toRequestBody
          import org.json.JSONArray
          import org.json.JSONObject
          import java.util.concurrent.TimeUnit

          class OpenRouterRepository {

              private val client =
                  OkHttpClient.Builder()
                      .connectTimeout(30, TimeUnit.SECONDS)
                      .readTimeout(90, TimeUnit.SECONDS)
                      .writeTimeout(90, TimeUnit.SECONDS)
                      .build()

              suspend fun sendMessage(
                  apiKey: String,
                  model: String,
                  messages: List<ChatMessage>
              ): Result<String> {
                  return withContext(Dispatchers.IO) {
                      try {
                          val jsonMessages = JSONArray()

                          messages.forEach { msg ->
                              jsonMessages.put(
                                  JSONObject()
                                      .put("role", msg.role)
                                      .put("content", msg.content)
                              )
                          }

                          val body = JSONObject()
                              .put("model", model.ifBlank { "openai/gpt-4o-mini" })
                              .put("messages", jsonMessages)
                              .put("temperature", 0.7)

                          val request = Request.Builder()
                              .url("https://openrouter.ai/api/v1/chat/completions")
                              .addHeader("Authorization", "Bearer ${apiKey.trim()}")
                              .addHeader("Content-Type", "application/json")
                              .addHeader("HTTP-Referer", "https://github.com/devxvoid/Mr-Robot-AI-Workspace")
                              .addHeader("X-Title", "Mr. Robot AI Workspace")
                              .post(
                                  body.toString()
                                      .toRequestBody("application/json".toMediaType())
                              )
                              .build()

                          client.newCall(request).execute().use { response ->
                              val responseText = response.body?.string().orEmpty()

                              if (!response.isSuccessful) {
                                  return@withContext Result.failure(
                                      Exception("OpenRouter error ${response.code}: $responseText")
                                  )
                              }

                              val json = JSONObject(responseText)

                              val content =
                                  json.getJSONArray("choices")
                                      .getJSONObject(0)
                                      .getJSONObject("message")
                                      .getString("content")

                              Result.success(content)
                          }
                      } catch (e: Exception) {
                          Result.failure(e)
                      }
                  }
              }
          }
          EOF

          cat > "$ROOT/viewmodel/ChatViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import android.app.Application
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.setValue
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import com.mrrobot.aiworkspace.ai.OpenRouterRepository
          import com.mrrobot.aiworkspace.data.ChatMessage
          import com.mrrobot.aiworkspace.data.SettingsStore
          import kotlinx.coroutines.launch

          class ChatViewModel(
              application: Application
          ) : AndroidViewModel(application) {

              private val repository = OpenRouterRepository()
              private val settingsStore = SettingsStore(application.applicationContext)

              var apiKey by mutableStateOf("")
              var selectedModel by mutableStateOf("openai/gpt-4o-mini")
              var input by mutableStateOf("")
              var loading by mutableStateOf(false)
              var errorMessage by mutableStateOf("")

              var messages by mutableStateOf(
                  listOf(
                      ChatMessage(
                          role = "assistant",
                          content = "Mr. Robot online. Add your OpenRouter API key in Settings, then send a message."
                      )
                  )
              )

              val currentMessages: List<ChatMessage>
                  get() = messages

              init {
                  viewModelScope.launch {
                      settingsStore.settingsFlow.collect { settings ->
                          apiKey = settings.apiKey
                          selectedModel = settings.model.ifBlank {
                              "openai/gpt-4o-mini"
                          }
                      }
                  }
              }

              fun sendMessage() {
                  val prompt = input.trim()

                  if (prompt.isBlank() || loading) return

                  if (apiKey.isBlank()) {
                      messages = messages + ChatMessage(
                          role = "assistant",
                          content = "API key missing. Open Settings and save your OpenRouter API key."
                      )
                      return
                  }

                  val userMessage = ChatMessage(
                      role = "user",
                      content = prompt
                  )

                  messages = messages + userMessage
                  input = ""
                  loading = true
                  errorMessage = ""

                  viewModelScope.launch {
                      val result = repository.sendMessage(
                          apiKey = apiKey,
                          model = selectedModel,
                          messages = messages
                      )

                      loading = false

                      result.onSuccess { reply ->
                          messages = messages + ChatMessage(
                              role = "assistant",
                              content = reply
                          )
                      }

                      result.onFailure { error ->
                          val message =
                              error.message ?: "Unknown AI error"

                          errorMessage = message

                          messages = messages + ChatMessage(
                              role = "assistant",
                              content = "AI error: $message"
                          )
                      }
                  }
              }

              fun clear() {
                  messages = listOf(
                      ChatMessage(
                          role = "assistant",
                          content = "Chat cleared. Mr. Robot is ready."
                      )
                  )
              }

              fun clearChat() = clear()
              fun clearMessages() = clear()

              fun regenerate() {
                  val lastUser =
                      messages.lastOrNull { it.role == "user" } ?: return

                  input = lastUser.content
                  sendMessage()
              }

              fun regenerateLast() = regenerate()
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path

          # Add INTERNET permission
          manifest = Path("app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  "<manifest",
                  '<manifest'
              )
              text = text.replace(
                  ">",
                  '>\n    <uses-permission android:name="android.permission.INTERNET" />',
                  1
              )

          manifest.write_text(text)

          # Add needed dependencies if missing
          gradle = Path("app/build.gradle.kts")
          g = gradle.read_text()

          deps = [
              'implementation("com.squareup.okhttp3:okhttp:4.12.0")',
              'implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7")',
              'implementation("androidx.datastore:datastore-preferences:1.1.1")'
          ]

          for dep in deps:
              if dep not in g:
                  g = g.replace(
                      "dependencies {",
                      "dependencies {\n    " + dep
                  )

          gradle.write_text(g)
          PY

      - name: Commit AI-only fix
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Fix AI integration only"
          git pull --rebase origin main
          git push origin main
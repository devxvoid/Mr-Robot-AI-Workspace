name: Step 15 Final No Error Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Fix exact Kotlin error
        shell: bash
        run: |
          set -euo pipefail

          FILE="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/WelcomeScreen.kt"

          python3 - <<'PY'
          from pathlib import Path

          file = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/screens/WelcomeScreen.kt")
          text = file.read_text()

          if "import androidx.compose.ui.Modifier" not in text:
              text = text.replace(
                  "import androidx.compose.runtime.Composable",
                  "import androidx.compose.runtime.Composable\nimport androidx.compose.ui.Modifier"
              )

          file.write_text(text)
          PY

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix WelcomeScreen Modifier import"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Make Gradle executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build Debug APK
        shell: bash
        run: |
          set +e

          ./gradlew clean assembleDebug --stacktrace --no-daemon > build-log.txt 2>&1
          code=$?

          cat build-log.txt

          echo "===== APK SEARCH ====="
          find . -type f -name "*.apk" | sort || true

          exit $code

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-15-final-build-logs
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mr-robot-ai-workspace-debug-apk
          path: "**/*.apk"
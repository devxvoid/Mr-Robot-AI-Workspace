name: Step 53 Restore Mic Voice Input Safe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Restore Mic Voice Input Safely
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Restore mic voice input
        shell: bash
        run: |
          set -euo pipefail

          CHAT_SCREEN="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt"
          MANIFEST="app/src/main/AndroidManifest.xml"

          if [ ! -f "$CHAT_SCREEN" ]; then
            echo "ChatScreen.kt not found"
            exit 1
          fi

          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found"
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt")
          text = path.read_text()

          def add_import(text, line, anchor):
              if line in text:
                  return text
              if anchor in text:
                  return text.replace(anchor, anchor + line + "\n", 1)
              return text

          text = add_import(
              text,
              "import android.app.Activity",
              "package com.mrrobot.aiworkspace.ui.screens\n\n"
          )

          text = add_import(
              text,
              "import android.content.Intent",
              "import android.content.Context\n"
          )

          text = add_import(
              text,
              "import android.speech.RecognizerIntent",
              "import android.provider.OpenableColumns\n"
          )

          text = add_import(
              text,
              "import android.widget.Toast",
              "import android.speech.RecognizerIntent\n"
          )

          text = add_import(
              text,
              "import java.util.Locale",
              "import java.io.InputStreamReader\n"
          )

          if "val speechLauncher = rememberLauncherForActivityResult" not in text:
              marker = "              LaunchedEffect(state.messages.size, state.isLoading) {"

              speech_code = """              val speechLauncher = rememberLauncherForActivityResult(
                  contract = ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == Activity.RESULT_OK) {
                      val spokenText = result.data
                          ?.getStringArrayListExtra(RecognizerIntent.EXTRA_RESULTS)
                          ?.firstOrNull()
                          .orEmpty()
                          .trim()

                      if (spokenText.isNotBlank()) {
                          val currentInput = state.input.trim()

                          val newInput = if (currentInput.isBlank()) {
                              spokenText
                          } else {
                              "$currentInput $spokenText"
                          }

                          viewModel.updateInput(newInput)
                      }
                  }
              }

"""

              if marker not in text:
                  raise SystemExit("LaunchedEffect marker not found")

              text = text.replace(marker, speech_code + marker, 1)

          if "onMicClick = {" not in text:
              target = """                      onPickFiles = {
                          attachmentLauncher.launch(
                              arrayOf(
                                  "text/*",
                                  "image/*",
                                  "application/pdf",
                                  "application/json",
                                  "application/xml",
                                  "application/zip",
                                  "*/*"
                              )
                          )
                      },
"""

              replacement = """                      onPickFiles = {
                          attachmentLauncher.launch(
                              arrayOf(
                                  "text/*",
                                  "image/*",
                                  "application/pdf",
                                  "application/json",
                                  "application/xml",
                                  "application/zip",
                                  "*/*"
                              )
                          )
                      },
                      onMicClick = {
                          launchSpeechInput(
                              context = context,
                              launcher = speechLauncher::launch
                          )
                      },
"""

              if target not in text:
                  raise SystemExit("onPickFiles block not found")

              text = text.replace(target, replacement, 1)

          if "onMicClick: () -> Unit" not in text:
              target = """              onInputChange: (String) -> Unit,
              onPickFiles: () -> Unit,
              onRemoveAttachment: (ChatAttachment) -> Unit,
"""

              replacement = """              onInputChange: (String) -> Unit,
              onPickFiles: () -> Unit,
              onMicClick: () -> Unit,
              onRemoveAttachment: (ChatAttachment) -> Unit,
"""

              if target not in text:
                  raise SystemExit("PremiumPromptInputBar signature not found")

              text = text.replace(target, replacement, 1)

          text = text.replace(
              """                      PremiumIconButton(
                          icon = R.drawable.ic_lucide_mic,
                          contentDescription = "Voice input",
                          onClick = {}
                      )
""",
              """                      PremiumIconButton(
                          icon = R.drawable.ic_lucide_mic,
                          contentDescription = "Voice input",
                          onClick = onMicClick
                      )
"""
          )

          text = re.sub(
              r'(PremiumIconButton\(\s*icon\s*=\s*R\.drawable\.ic_lucide_mic,\s*contentDescription\s*=\s*"Voice input",\s*)onClick\s*=\s*\{\s*\}(\s*\))',
              r'\1onClick = onMicClick\2',
              text,
              flags=re.DOTALL,
              count=1
          )

          if "private fun launchSpeechInput(" not in text:
              helper = """          private fun launchSpeechInput(
              context: Context,
              launcher: (Intent) -> Unit
          ) {
              val intent = Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {
                  putExtra(
                      RecognizerIntent.EXTRA_LANGUAGE_MODEL,
                      RecognizerIntent.LANGUAGE_MODEL_FREE_FORM
                  )
                  putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault())
                  putExtra(RecognizerIntent.EXTRA_PROMPT, "Speak to Mr. Robot")
              }

              runCatching {
                  launcher(intent)
              }.onFailure {
                  Toast.makeText(
                      context,
                      "Voice input is not available on this device.",
                      Toast.LENGTH_SHORT
                  ).show()
              }
          }

"""

              marker = "          private fun createAttachmentFromUri(\n"

              if marker not in text:
                  raise SystemExit("createAttachmentFromUri marker not found")

              text = text.replace(marker, helper + marker, 1)

          path.write_text(text)
          PY

      - name: Add RECORD_AUDIO permission
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/src/main/AndroidManifest.xml")
          text = path.read_text()

          if "android.permission.RECORD_AUDIO" not in text:
              match = re.search(r"<manifest\b[^>]*>", text)

              if not match:
                  raise SystemExit("Manifest opening tag not found")

              insert_at = match.end()

              text = (
                  text[:insert_at]
                  + '\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />'
                  + text[insert_at:]
              )

          path.write_text(text)
          PY

      - name: Verify mic repair
        shell: bash
        run: |
          set -euo pipefail

          CHAT_SCREEN="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt"
          MANIFEST="app/src/main/AndroidManifest.xml"

          grep -q "ActivityResultContracts.StartActivityForResult" "$CHAT_SCREEN"
          grep -q "RecognizerIntent.ACTION_RECOGNIZE_SPEECH" "$CHAT_SCREEN"
          grep -q "RecognizerIntent.EXTRA_RESULTS" "$CHAT_SCREEN"
          grep -q "val speechLauncher" "$CHAT_SCREEN"
          grep -q "onMicClick" "$CHAT_SCREEN"
          grep -q "launchSpeechInput" "$CHAT_SCREEN"
          grep -q "Speak to Mr. Robot" "$CHAT_SCREEN"
          grep -q "android.permission.RECORD_AUDIO" "$MANIFEST"

          if grep -A 8 'contentDescription = "Voice input"' "$CHAT_SCREEN" | grep -q 'onClick = {}'; then
            echo "Mic still has empty click handler"
            exit 1
          fi

          echo "Mic voice input repair verified"

      - name: Commit mic repair
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt
          git add app/src/main/AndroidManifest.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 53 restore mic voice input"
          git pull --rebase origin main
          git push origin main

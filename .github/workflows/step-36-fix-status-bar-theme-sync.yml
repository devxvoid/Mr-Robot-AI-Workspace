name: Step 36 Fix Status Bar Theme Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Force Status And Navigation Bars To Follow App Theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Replace MainActivity system bar handling
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"
          VALUES_DIR="app/src/main/res/values"
          VALUES_NIGHT_DIR="app/src/main/res/values-night"

          mkdir -p "$APP_DIR"
          mkdir -p "$VALUES_DIR"
          mkdir -p "$VALUES_NIGHT_DIR"

          cat > "$APP_DIR/MainActivity.kt" <<'EOF'
          package com.mrrobot.aiworkspace

          import android.graphics.Color
          import android.os.Build
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.isSystemInDarkTheme
          import androidx.compose.runtime.SideEffect
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.remember
          import androidx.compose.runtime.setValue
          import androidx.compose.ui.platform.LocalView
          import androidx.core.view.WindowCompat
          import androidx.core.view.WindowInsetsControllerCompat
          import com.mrrobot.aiworkspace.data.AppSettings
          import com.mrrobot.aiworkspace.data.AppThemeMode
          import com.mrrobot.aiworkspace.data.SettingsStore
          import com.mrrobot.aiworkspace.navigation.AppNavGraph
          import com.mrrobot.aiworkspace.ui.screens.SplashScreen
          import com.mrrobot.aiworkspace.ui.theme.MrRobotTheme
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.flow.first
          import kotlinx.coroutines.runBlocking

          class MainActivity : ComponentActivity() {

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  WindowCompat.setDecorFitsSystemWindows(window, true)

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      window.isStatusBarContrastEnforced = false
                      window.isNavigationBarContrastEnforced = false
                  }

                  val settingsStore = SettingsStore(applicationContext)

                  val initialSettings = runCatching {
                      runBlocking(Dispatchers.IO) {
                          settingsStore.settingsFlow.first()
                      }
                  }.getOrDefault(AppSettings())

                  applySystemBars(
                      themeMode = initialSettings.themeMode,
                      systemDark = false,
                      splashMode = false
                  )

                  setContent {
                      val settings by settingsStore.settingsFlow.collectAsState(
                          initial = initialSettings
                      )

                      val systemDark = isSystemInDarkTheme()
                      val view = LocalView.current
                      var showSplash by remember { mutableStateOf(true) }

                      SideEffect {
                          applySystemBars(
                              themeMode = settings.themeMode,
                              systemDark = systemDark,
                              splashMode = showSplash,
                              view = view
                          )
                      }

                      if (showSplash) {
                          SplashScreen(
                              themeMode = settings.themeMode,
                              systemDark = systemDark,
                              onFinished = {
                                  showSplash = false
                              }
                          )
                      } else {
                          MrRobotTheme(themeMode = settings.themeMode) {
                              AppNavGraph()
                          }
                      }
                  }
              }

              private fun applySystemBars(
                  themeMode: AppThemeMode,
                  systemDark: Boolean,
                  splashMode: Boolean,
                  view: android.view.View? = null
              ) {
                  val darkUi = isDarkUi(
                      themeMode = themeMode,
                      systemDark = systemDark
                  )

                  val barColor = when {
                      splashMode && darkUi -> Color.BLACK
                      splashMode && !darkUi -> Color.WHITE
                      darkUi -> Color.rgb(3, 7, 18)
                      else -> Color.rgb(248, 250, 252)
                  }

                  window.statusBarColor = barColor
                  window.navigationBarColor = barColor
                  window.decorView.setBackgroundColor(barColor)

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                      window.navigationBarDividerColor = barColor
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      window.isStatusBarContrastEnforced = false
                      window.isNavigationBarContrastEnforced = false
                  }

                  val targetView = view ?: window.decorView
                  val controller = WindowInsetsControllerCompat(window, targetView)

                  controller.isAppearanceLightStatusBars = !darkUi
                  controller.isAppearanceLightNavigationBars = !darkUi
              }

              private fun isDarkUi(
                  themeMode: AppThemeMode,
                  systemDark: Boolean
              ): Boolean {
                  return when (themeMode) {
                      AppThemeMode.Auto -> systemDark
                      AppThemeMode.Dark -> true
                      AppThemeMode.Light -> false
                      AppThemeMode.Cyberpunk -> false
                      AppThemeMode.Hacker -> true
                  }
              }
          }
          EOF

          cat > "$VALUES_DIR/styles.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>

              <style name="Theme.MrRobot" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">true</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:windowLightNavigationBar">true</item>
                  <item name="android:statusBarColor">#F8FAFC</item>
                  <item name="android:navigationBarColor">#F8FAFC</item>
                  <item name="android:windowBackground">#F8FAFC</item>
                  <item name="android:colorAccent">#008C99</item>
                  <item name="android:enforceStatusBarContrast">false</item>
                  <item name="android:enforceNavigationBarContrast">false</item>
              </style>

          </resources>
          EOF

          cat > "$VALUES_NIGHT_DIR/styles.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>

              <style name="Theme.MrRobot" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">true</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
                  <item name="android:statusBarColor">#030712</item>
                  <item name="android:navigationBarColor">#030712</item>
                  <item name="android:windowBackground">#030712</item>
                  <item name="android:colorAccent">#00DFF7</item>
                  <item name="android:enforceStatusBarContrast">false</item>
                  <item name="android:enforceNavigationBarContrast">false</item>
              </style>

          </resources>
          EOF

      - name: Verify MainActivity controls bars by app theme
        shell: bash
        run: |
          set -euo pipefail

          grep -R "AppThemeMode.Dark -> true" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          grep -R "AppThemeMode.Light -> false" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          grep -R "AppThemeMode.Cyberpunk -> false" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          grep -R "AppThemeMode.Hacker -> true" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          grep -R "window.statusBarColor = barColor" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          grep -R "isAppearanceLightStatusBars = !darkUi" app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt

          echo "System bar theme sync verified."

      - name: Commit Step 36
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/java/com/mrrobot/aiworkspace/MainActivity.kt
          git add app/src/main/res/values/styles.xml
          git add app/src/main/res/values-night/styles.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 36 fix status bar theme sync"

          git pull --rebase origin main
          git push origin main

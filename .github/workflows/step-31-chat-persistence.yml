name: Step 31 Chat Persistence

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  persistence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Add persistent chat memory
        shell: bash
        run: |
          set -euo pipefail

          ROOT="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$ROOT/storage"

          cat > "$ROOT/storage/ChatStorage.kt" <<'EOF'
          package com.mrrobot.aiworkspace.storage

          import android.content.Context
          import androidx.datastore.preferences.core.edit
          import androidx.datastore.preferences.core.stringPreferencesKey
          import androidx.datastore.preferences.preferencesDataStore
          import com.mrrobot.aiworkspace.data.ChatMessage
          import kotlinx.coroutines.flow.first
          import org.json.JSONArray
          import org.json.JSONObject

          private val Context.dataStore by preferencesDataStore(
              name = "chat_memory"
          )

          object ChatStorage {

              private val CHAT_KEY =
                  stringPreferencesKey("messages")

              suspend fun saveMessages(
                  context: Context,
                  messages: List<ChatMessage>
              ) {

                  val array = JSONArray()

                  messages.forEach {

                      val obj = JSONObject()

                      obj.put("role", it.role)
                      obj.put("content", it.content)

                      array.put(obj)
                  }

                  context.dataStore.edit {

                      it[CHAT_KEY] = array.toString()
                  }
              }

              suspend fun loadMessages(
                  context: Context
              ): List<ChatMessage> {

                  return try {

                      val prefs =
                          context.dataStore.data.first()

                      val raw =
                          prefs[CHAT_KEY] ?: return emptyList()

                      val array = JSONArray(raw)

                      buildList {

                          for (i in 0 until array.length()) {

                              val obj =
                                  array.getJSONObject(i)

                              add(
                                  ChatMessage(
                                      role =
                                          obj.getString("role"),

                                      content =
                                          obj.getString("content")
                                  )
                              )
                          }
                      }

                  } catch (e: Exception) {

                      emptyList()
                  }
              }
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path

          p = Path(
              "app/src/main/java/com/mrrobot/aiworkspace/viewmodel/ChatViewModel.kt"
          )

          text = p.read_text()

          if "ChatStorage" not in text:

              text = text.replace(
                  "import kotlinx.coroutines.launch",
                  "import kotlinx.coroutines.launch\nimport android.app.Application\nimport androidx.lifecycle.AndroidViewModel\nimport com.mrrobot.aiworkspace.storage.ChatStorage"
              )

              text = text.replace(
                  "class ChatViewModel : ViewModel() {",
                  "class ChatViewModel(application: Application) : AndroidViewModel(application) {"
              )

              text = text.replace(
                  "messages = messages + ChatMessage(",
                  '''
                          messages = messages + ChatMessage(
                  '''
              )

              inject = '''

              init {

                  viewModelScope.launch {

                      val saved =
                          ChatStorage.loadMessages(
                              getApplication()
                          )

                      if (saved.isNotEmpty()) {

                          messages = saved
                      }
                  }
              }

              '''

              text = text.replace(
                  "fun sendMessage() {",
                  inject + "\nfun sendMessage() {"
              )

              old = '''
                              result.onSuccess {

                                  messages =
                                      messages + ChatMessage(
                                          "assistant",
                                          it
                                      )
                              }
              '''

              new = '''
                              result.onSuccess {

                                  messages =
                                      messages + ChatMessage(
                                          "assistant",
                                          it
                                      )

                                  ChatStorage.saveMessages(
                                      getApplication(),
                                      messages
                                  )
                              }
              '''

              text = text.replace(old, new)

              p.write_text(text)
          PY

      - name: Commit persistence system
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Add persistent chat memory"

          git pull --rebase origin main

          git push origin main
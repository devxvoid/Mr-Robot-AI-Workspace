name: Step 5 Agent System

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Functional Agent System
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Add functional agents
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"

          cat > "$APP_DIR/data/Agent.kt" <<'EOF'
          package com.mrrobot.aiworkspace.data

          data class Agent(
              val id: String,
              val name: String,
              val role: String,
              val status: String,
              val description: String,
              val systemPrompt: String,
              val skills: List<String>
          )

          object AgentCatalog {
              val agents = listOf(
                  Agent(
                      id = "android_architect",
                      name = "Android Architect",
                      role = "Mobile Architecture",
                      status = "Ready",
                      description = "Builds production-grade Android app structures using Kotlin, Compose, MVVM, and clean architecture.",
                      systemPrompt = "You are an elite Android architect. Produce production-ready Kotlin and Jetpack Compose solutions.",
                      skills = listOf("Kotlin", "Jetpack Compose", "MVVM", "Gradle", "Navigation")
                  ),
                  Agent(
                      id = "ui_ux_strategist",
                      name = "UI/UX Strategist",
                      role = "Premium Interface Design",
                      status = "Ready",
                      description = "Improves visual hierarchy, cyberpunk styling, accessibility, and app-store-ready UI polish.",
                      systemPrompt = "You are a senior UI/UX strategist. Improve mobile UI into premium, polished, market-ready experiences.",
                      skills = listOf("Material 3", "Glassmorphism", "Animations", "Design Systems")
                  ),
                  Agent(
                      id = "backend_engineer",
                      name = "Backend Engineer",
                      role = "API & Data Systems",
                      status = "Ready",
                      description = "Designs APIs, repositories, networking layers, data persistence, and AI backend flows.",
                      systemPrompt = "You are a backend engineer. Build stable APIs, repositories, networking, and persistence systems.",
                      skills = listOf("REST APIs", "OkHttp", "DataStore", "Repositories", "Security")
                  ),
                  Agent(
                      id = "debug_specialist",
                      name = "Debugging Specialist",
                      role = "Crash & Build Fixing",
                      status = "Ready",
                      description = "Analyzes Gradle errors, Android crashes, dependency issues, and broken workflows.",
                      systemPrompt = "You are a debugging specialist. Find root causes first, then provide exact fixes.",
                      skills = listOf("Gradle", "GitHub Actions", "Crash Logs", "Dependency Fixes")
                  ),
                  Agent(
                      id = "workflow_builder",
                      name = "Workflow Builder",
                      role = "Automation & CI/CD",
                      status = "Ready",
                      description = "Creates GitHub Actions, build pipelines, release workflows, and automated upgrade scripts.",
                      systemPrompt = "You are a CI/CD automation engineer. Create reliable GitHub Actions and build workflows.",
                      skills = listOf("GitHub Actions", "APK Builds", "Artifacts", "Release Pipelines")
                  )
              )

              fun findById(id: String): Agent {
                  return agents.firstOrNull { it.id == id } ?: agents.first()
              }
          }
          EOF

          cat > "$APP_DIR/viewmodel/AgentsViewModel.kt" <<'EOF'
          package com.mrrobot.aiworkspace.viewmodel

          import androidx.lifecycle.ViewModel
          import com.mrrobot.aiworkspace.data.Agent
          import com.mrrobot.aiworkspace.data.AgentCatalog
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow

          data class AgentsUiState(
              val agents: List<Agent> = AgentCatalog.agents,
              val selectedAgent: Agent = AgentCatalog.agents.first(),
              val generatedPrompt: String = "",
              val taskInput: String = ""
          )

          class AgentsViewModel : ViewModel() {

              private val _uiState = MutableStateFlow(AgentsUiState())
              val uiState: StateFlow<AgentsUiState> = _uiState.asStateFlow()

              fun selectAgent(agent: Agent) {
                  _uiState.value = _uiState.value.copy(
                      selectedAgent = agent,
                      generatedPrompt = ""
                  )
              }

              fun updateTask(value: String) {
                  _uiState.value = _uiState.value.copy(
                      taskInput = value,
                      generatedPrompt = ""
                  )
              }

              fun generatePrompt() {
                  val state = _uiState.value
                  val agent = state.selectedAgent
                  val task = state.taskInput.ifBlank {
                      "Improve the Mr. Robot AI Workspace Android app."
                  }

                  val prompt = """
                  # Agent Task

                  You are ${agent.name}.

                  ## Role
                  ${agent.role}

                  ## System Behavior
                  ${agent.systemPrompt}

                  ## Task
                  $task

                  ## Required Output
                  - Give production-ready implementation.
                  - Provide full code, not snippets.
                  - Explain exact file paths.
                  - Avoid placeholders.
                  - Optimize for Android MVP quality.

                  ## Skills To Apply
                  ${agent.skills.joinToString(separator = "\n") { "- $it" }}
                  """.trimIndent()

                  _uiState.value = state.copy(
                      generatedPrompt = prompt
                  )
              }

              fun clear() {
                  _uiState.value = _uiState.value.copy(
                      taskInput = "",
                      generatedPrompt = ""
                  )
              }
          }
          EOF

          cat > "$APP_DIR/ui/screens/AgentsScreen.kt" <<'EOF'
          package com.mrrobot.aiworkspace.ui.screens

          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.rememberScrollState
          import androidx.compose.foundation.verticalScroll
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.platform.LocalClipboardManager
          import androidx.compose.ui.text.AnnotatedString
          import androidx.compose.ui.text.font.FontFamily
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.mrrobot.aiworkspace.data.Agent
          import com.mrrobot.aiworkspace.ui.components.*
          import com.mrrobot.aiworkspace.viewmodel.AgentsViewModel

          @Composable
          fun AgentsScreen(
              viewModel: AgentsViewModel = viewModel()
          ) {
              val state by viewModel.uiState.collectAsState()
              val clipboard = LocalClipboardManager.current

              ScreenShell {
                  Title("Agents")
                  Subtitle("Build specialized prompts and execution roles for your AI workspace.")
                  Spacer(Modifier.height(16.dp))

                  LazyColumn(
                      modifier = Modifier.weight(1f),
                      contentPadding = PaddingValues(bottom = 12.dp)
                  ) {
                      items(state.agents) { agent ->
                          AgentCard(
                              agent = agent,
                              selected = agent.id == state.selectedAgent.id,
                              onClick = { viewModel.selectAgent(agent) }
                          )
                      }
                  }

                  GlassCard {
                      Title(state.selectedAgent.name)
                      Subtitle("${state.selectedAgent.role} • ${state.selectedAgent.status}")
                      Spacer(Modifier.height(8.dp))
                      Subtitle(state.selectedAgent.description)

                      Spacer(Modifier.height(14.dp))

                      Subtitle("Task for this agent")

                      Spacer(Modifier.height(8.dp))

                      OutlinedTextField(
                          value = state.taskInput,
                          onValueChange = viewModel::updateTask,
                          placeholder = { Text("Example: Build the OpenRouter streaming chat screen...") },
                          modifier = Modifier.fillMaxWidth(),
                          minLines = 2,
                          maxLines = 5
                      )

                      Spacer(Modifier.height(12.dp))

                      Row(
                          modifier = Modifier.fillMaxWidth(),
                          horizontalArrangement = Arrangement.spacedBy(10.dp)
                      ) {
                          Button(
                              onClick = { viewModel.generatePrompt() },
                              modifier = Modifier.weight(1f)
                          ) {
                              Text("Generate Prompt")
                          }

                          OutlinedButton(
                              onClick = { viewModel.clear() },
                              modifier = Modifier.weight(1f)
                          ) {
                              Text("Clear")
                          }
                      }

                      if (state.generatedPrompt.isNotBlank()) {
                          Spacer(Modifier.height(16.dp))

                          Subtitle("Generated Agent Prompt")

                          Spacer(Modifier.height(8.dp))

                          Text(
                              text = state.generatedPrompt,
                              color = androidx.compose.ui.graphics.Color.White,
                              fontFamily = FontFamily.Monospace
                          )

                          Spacer(Modifier.height(12.dp))

                          CyberButton("Copy Prompt") {
                              clipboard.setText(AnnotatedString(state.generatedPrompt))
                          }
                      }
                  }

                  Spacer(Modifier.height(70.dp))
              }
          }

          @Composable
          private fun AgentCard(
              agent: Agent,
              selected: Boolean,
              onClick: () -> Unit
          ) {
              GlassCard(
                  modifier = Modifier
                      .padding(bottom = 12.dp)
                      .clickable { onClick() }
              ) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween
                  ) {
                      Column(modifier = Modifier.weight(1f)) {
                          Title(agent.name)
                          Subtitle(agent.role)
                          Spacer(Modifier.height(6.dp))
                          Subtitle(agent.description)
                      }

                      Text(
                          text = if (selected) "ACTIVE" else agent.status,
                          color = if (selected) NeonCyan else SoftText
                      )
                  }

                  Spacer(Modifier.height(10.dp))

                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(8.dp)
                  ) {
                      agent.skills.take(3).forEach { skill ->
                          AssistChip(
                              onClick = {},
                              label = { Text(skill) }
                          )
                      }
                  }
              }
          }
          EOF

      - name: Commit Step 5 upgrade
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Step 5 add functional agent system" || echo "No changes to commit"
          git push
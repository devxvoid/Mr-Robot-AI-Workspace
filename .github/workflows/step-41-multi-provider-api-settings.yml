          # Multi Provider API Settings

          Step 41 adds provider-aware API key storage and model selection.

          ## Providers

          - OpenRouter
          - OpenAI
          - Anthropic Claude
          - Google Gemini
          - Groq
          - Mistral
          - DeepSeek
          - xAI Grok

          ## Backward Compatibility

          The old `openrouter_api_key` preference is preserved and mapped into the new OpenRouter key slot.

          ## Current Scope

          This step upgrades Settings, DataStore, ViewModel, and model catalog.
          Chat request routing can be wired in the next step if the app still sends all requests through the old OpenRouter-only client.
          EOF


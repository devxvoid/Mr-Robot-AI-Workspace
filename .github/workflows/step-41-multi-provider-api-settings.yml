name: Step 41 Multi Provider API Settings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    name: Add Multi Provider API Key Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Add multi-provider API settings and model catalog
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="app/src/main/java/com/mrrobot/aiworkspace"
          DRAWABLE_DIR="app/src/main/res/drawable"

          mkdir -p "$APP_DIR/data"
          mkdir -p "$APP_DIR/viewmodel"
          mkdir -p "$APP_DIR/ui/screens"
          mkdir -p "$APP_DIR/ui/components"
          mkdir -p "$DRAWABLE_DIR"
          mkdir -p "docs/settings"

          COMPONENT_FILE="$APP_DIR/ui/components/UiComponents.kt"

          if [ -f "$COMPONENT_FILE" ]; then
            python3 - <<'PY'
            from pathlib import Path

            path = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/components/UiComponents.kt")
            text = path.read_text()

            constants = """
            // Backward-compatible shared colors.
            // Older screens still import these symbols directly, so keep them available.
            val NeonCyan = Color(0xFF00DFF7)
            val NeonPurple = Color(0xFF8B5CF6)
            val NeonGreen = Color(0xFF22C55E)
            val DeepBg = Color(0xFF030712)
            val Panel = Color(0xFF111827)
            val PanelSoft = Color(0xFF0B1020)
            val SoftText = Color(0xFFB8C0CC)
            val Danger = Color(0xFFFF6B6B)

            """

            if "val NeonCyan" not in text:
                marker = "@Composable\nfun ScreenShell"
                if marker in text:
                    text = text.replace(marker, constants + marker)

            path.write_text(text)
            PY
          fi

          cat > "$DRAWABLE_DIR/ic_lucide_sun_moon_exact.xml" <<'EOF'

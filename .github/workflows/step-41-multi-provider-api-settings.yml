          git add app/src/main/java/com/mrrobot/aiworkspace/data/AiModels.kt
          git add app/src/main/java/com/mrrobot/aiworkspace/data/SettingsStore.kt
          git add app/src/main/java/com/mrrobot/aiworkspace/viewmodel/SettingsViewModel.kt

name: Step 52 Restore Mic Voice Input

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-mic:
    name: Restore Mic Voice Input
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch ChatScreen and AndroidManifest
        shell: python
        run: |
          from pathlib import Path
          import re

          chat_path = Path("app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt")
          manifest_path = Path("app/src/main/AndroidManifest.xml")

          if not chat_path.exists():
              raise SystemExit(f"Missing file: {chat_path}")

          if not manifest_path.exists():
              raise SystemExit(f"Missing file: {manifest_path}")

          text = chat_path.read_text()

          def ensure_import(source: str, import_line: str, anchor: str) -> str:
              if import_line in source:
                  return source
              if anchor not in source:
                  raise SystemExit(f"Import anchor not found for {import_line}: {anchor!r}")
              return source.replace(anchor, anchor + import_line + "\n", 1)

          text = ensure_import(
              text,
              "import android.app.Activity",
              "package com.mrrobot.aiworkspace.ui.screens\n\n"
          )

          text = ensure_import(
              text,
              "import android.content.Intent",
              "import android.content.Context\n"
          )

          text = ensure_import(
              text,
              "import android.speech.RecognizerIntent",
              "import android.provider.OpenableColumns\n"
          )

          text = ensure_import(
              text,
              "import android.widget.Toast",
              "import android.speech.RecognizerIntent\n"
          )

          text = ensure_import(
              text,
              "import java.util.Locale",
              "import java.io.InputStreamReader\n"
          )

          if "val speechLauncher = rememberLauncherForActivityResult" not in text:
              marker = "              LaunchedEffect(state.messages.size, state.isLoading) {"

              speech_launcher = '''              val speechLauncher = rememberLauncherForActivityResult(
                  contract = ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == Activity.RESULT_OK) {
                      val spokenText = result.data
                          ?.getStringArrayListExtra(RecognizerIntent.EXTRA_RESULTS)
                          ?.firstOrNull()
                          .orEmpty()
                          .trim()

                      if (spokenText.isNotBlank()) {
                          val currentInput = state.input.trim()

                          val newInput = if (currentInput.isBlank()) {
                              spokenText
                          } else {
                              "$currentInput $spokenText"
                          }

                          viewModel.updateInput(newInput)
                      }
                  }
              }

'''

              if marker not in text:
                  raise SystemExit("Could not find LaunchedEffect marker in ChatScreen.kt")

              text = text.replace(marker, speech_launcher + marker, 1)

          if "onMicClick = {" not in text:
              target = '''                      onPickFiles = {
                          attachmentLauncher.launch(
                              arrayOf(
                                  "text/*",
                                  "image/*",
                                  "application/pdf",
                                  "application/json",
                                  "application/xml",
                                  "application/zip",
                                  "*/*"
                              )
                          )
                      },
'''

              replacement = '''                      onPickFiles = {
                          attachmentLauncher.launch(
                              arrayOf(
                                  "text/*",
                                  "image/*",
                                  "application/pdf",
                                  "application/json",
                                  "application/xml",
                                  "application/zip",
                                  "*/*"
                              )
                          )
                      },
                      onMicClick = {
                          launchSpeechInput(
                              context = context,
                              launcher = speechLauncher::launch
                          )
                      },
'''

              if target not in text:
                  raise SystemExit("Could not find onPickFiles argument block in ChatScreen.kt")

              text = text.replace(target, replacement, 1)

          if "onMicClick: () -> Unit" not in text:
              target = '''              onInputChange: (String) -> Unit,
              onPickFiles: () -> Unit,
              onRemoveAttachment: (ChatAttachment) -> Unit,
'''

              replacement = '''              onInputChange: (String) -> Unit,
              onPickFiles: () -> Unit,
              onMicClick: () -> Unit,
              onRemoveAttachment: (ChatAttachment) -> Unit,
'''

              if target not in text:
                  raise SystemExit("Could not find PremiumPromptInputBar signature block in ChatScreen.kt")

              text = text.replace(target, replacement, 1)

          text = text.replace(
              '''                      PremiumIconButton(
                          icon = R.drawable.ic_lucide_mic,
                          contentDescription = "Voice input",
                          onClick = {}
                      )
''',
              '''                      PremiumIconButton(
                          icon = R.drawable.ic_lucide_mic,
                          contentDescription = "Voice input",
                          onClick = onMicClick
                      )
'''
          )

          text = re.sub(
              r'(PremiumIconButton\(\s*icon\s*=\s*R\.drawable\.ic_lucide_mic,\s*contentDescription\s*=\s*"Voice input",\s*)onClick\s*=\s*\{\s*\}(\s*\))',
              r'\1onClick = onMicClick\2',
              text,
              flags=re.DOTALL,
              count=1
          )

          if "private fun launchSpeechInput(" not in text:
              helper = '''          private fun launchSpeechInput(
              context: Context,
              launcher: (Intent) -> Unit
          ) {
              val intent = Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {
                  putExtra(
                      RecognizerIntent.EXTRA_LANGUAGE_MODEL,
                      RecognizerIntent.LANGUAGE_MODEL_FREE_FORM
                  )
                  putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault())
                  putExtra(RecognizerIntent.EXTRA_PROMPT, "Speak to Mr. Robot")
              }

              runCatching {
                  launcher(intent)
              }.onFailure {
                  Toast.makeText(
                      context,
                      "Voice input is not available on this device.",
                      Toast.LENGTH_SHORT
                  ).show()
              }
          }

'''

              marker = "          private fun createAttachmentFromUri(\n"

              if marker not in text:
                  raise SystemExit("Could not find createAttachmentFromUri marker in ChatScreen.kt")

              text = text.replace(marker, helper + marker, 1)

          chat_path.write_text(text)

          manifest = manifest_path.read_text()

          if "android.permission.RECORD_AUDIO" not in manifest:
              match = re.search(r"<manifest\b[^>]*>", manifest)

              if not match:
                  raise SystemExit("Could not find opening <manifest> tag")

              manifest = (
                  manifest[:match.end()]
                  + '\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />'
                  + manifest[match.end():]
              )

          manifest_path.write_text(manifest)

      - name: Verify mic patch
        shell: bash
        run: |
          set -euo pipefail

          CHAT_SCREEN="app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt"
          MANIFEST="app/src/main/AndroidManifest.xml"

          grep -q "import android.app.Activity" "$CHAT_SCREEN"
          grep -q "import android.content.Intent" "$CHAT_SCREEN"
          grep -q "import android.speech.RecognizerIntent" "$CHAT_SCREEN"
          grep -q "import android.widget.Toast" "$CHAT_SCREEN"
          grep -q "import java.util.Locale" "$CHAT_SCREEN"
          grep -q "ActivityResultContracts.StartActivityForResult" "$CHAT_SCREEN"
          grep -q "RecognizerIntent.ACTION_RECOGNIZE_SPEECH" "$CHAT_SCREEN"
          grep -q "RecognizerIntent.EXTRA_RESULTS" "$CHAT_SCREEN"
          grep -q "val speechLauncher" "$CHAT_SCREEN"
          grep -q "onMicClick" "$CHAT_SCREEN"
          grep -q "launchSpeechInput" "$CHAT_SCREEN"
          grep -q "Speak to Mr. Robot" "$CHAT_SCREEN"
          grep -q "android.permission.RECORD_AUDIO" "$MANIFEST"

          if grep -A 8 'contentDescription = "Voice input"' "$CHAT_SCREEN" | grep -q 'onClick = {}'; then
            echo "Mic button still has empty onClick"
            exit 1
          fi

      - name: Commit mic patch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/java/com/mrrobot/aiworkspace/ui/screens/ChatScreen.kt
          git add app/src/main/AndroidManifest.xml

          if git diff --cached --quiet; then
            echo "No changes to commit. Mic patch is already applied."
            exit 0
          fi

          git commit -m "Step 52 restore mic voice input"
          git pull --rebase origin main
          git push origin main

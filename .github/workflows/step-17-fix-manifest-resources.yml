name: Step 17 Fix Manifest Resources

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Fix Android Manifest Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Fix missing manifest resources
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/res/values

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:label="Mr. Robot AI"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MrRobot">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>

              <style name="Theme.MrRobot" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
                  <item name="android:colorAccent">#00DFF7</item>
                  <item name="android:windowBackground">#030712</item>
              </style>

          </resources>
          EOF

      - name: Commit manifest resource fix
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Step 17 fix manifest resources"

          git pull --rebase origin main

          git push origin main
